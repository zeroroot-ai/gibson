name: gibson-images

# Collapses gibson's six independent image-build workflows into ONE matrix
# workflow (Epic: cicd-efficiency, board #44, slice S4, gibson#1129). See
# docs/architecture/CICD-CONTEXT.md decision #8 and
# docs/adr/0060-ci-runner-split-hosted-default-ephemeral-metal.md.
#
# Superseded workflows (deleted by this change):
#   - build.yaml                        (its image-build portion; the
#                                        embedded `test` job moved to
#                                        go-ci.yml's merge_group tier)
#   - gibson-daemon.yml
#   - gibson-component-images.yml
#   - gibson-bootstrap-image.yml
#   - gibson-bootstrap-runner-image.yml
#   - gibson-belief-sidecar.yml
#
# Trigger discipline (decision #8): push:main + push:v*.*.* tags (release-please
# cuts vX.Y.Z tags; reusable-image-build's `type=match,pattern=v(.*)` metadata
# rule derives the semver image tag from that tag push) + workflow_dispatch for
# manual backfill/force-rebuild, and for (re)publishing a specific tag that
# doesn't match `v*.*.*` (e.g. `gibson-bootstrap-v1.0.0`) by dispatching with
# `--ref <tag>`, e.g. `gh workflow run gibson-images.yml --ref v1.2.3` -- the
# same escape hatch gibson-bootstrap-image.yml / gibson-bootstrap-runner-image.yml
# / gibson-belief-sidecar.yml already documented, now extended uniformly. NO
# `pull_request` trigger -- image builds no longer run on every PR push.
#
# All images build on every push to main (no per-component path filter): this
# keeps parity simple and correct regardless of which component's files
# changed, and slice S3's merge queue already bounds push:main frequency to
# one push per landed PR, so the matrix no longer fires per-push-per-workflow
# six times over.
#
# One checkout/buildx bootstrap per image job (the reusable's own steps), but
# ONE workflow definition/trigger surface and ONE `type=gha` cache backend
# call-site instead of six independently-triggered workflows -- this is what
# "one coherent cache scope" means here; the reusable
# (zeroroot-ai/.github/reusable-image-build.yml) does not expose a
# configurable `scope=` cache key, so per-image cache partitioning is
# unchanged, but the six duplicate trigger surfaces (and their independent
# checkout/free-disk-space/buildx-bootstrap overhead firing on every push) are
# gone.

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      ref:
        description: >-
          Optional tag to (re)publish -- select it via the branch/tag dropdown
          or pass `--ref <tag>` to `gh workflow run` (e.g. v1.2.3,
          gibson-bootstrap-v1.0.0, gibson-bootstrap-runner-v1.0.0,
          gibson-belief-sidecar-v1.0.0). Informational: the actual ref built is
          whatever ref the dispatch runs against, not this input.
        required: false
        type: string

concurrency:
  group: gibson-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- the seven interchangeable images: one matrix, one reusable call site ----
  images:
    name: ${{ matrix.component }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: gibson
            dockerfile: Dockerfile
            path: .
            image: ghcr.io/zeroroot-ai/gibson
            tag_pattern: (v.*)
            # spec setec-sandbox-prod-default R1.1: production GHCR images
            # compile in the Setec gRPC adapter by default. COMMIT + BUILD_TIME
            # populate pkg/version.GitCommit / BuildTime via ldflags (gibson#251).
            build_args: |
              BUILD_TAGS=setec_integration
              COMMIT=${{ github.sha }}
              BUILD_TIME=${{ github.event.head_commit.timestamp }}
          - component: ext-authz
            dockerfile: build/ext-authz.Dockerfile
            path: .
            image: ghcr.io/zeroroot-ai/ext-authz
            tag_pattern: (v.*)
            build_args: ""
          - component: tenant-operator
            dockerfile: build/tenant-operator.Dockerfile
            path: .
            image: ghcr.io/zeroroot-ai/tenant-operator
            tag_pattern: (v.*)
            build_args: ""
          - component: platform-operator
            dockerfile: build/platform-operator.Dockerfile
            path: .
            image: ghcr.io/zeroroot-ai/platform-operator
            tag_pattern: (v.*)
            build_args: ""
          - component: spiffe-jwks-exporter
            dockerfile: build/spiffe-jwks-exporter.Dockerfile
            path: .
            image: ghcr.io/zeroroot-ai/spiffe-jwks-exporter
            tag_pattern: (v.*)
            build_args: ""
          - component: gibson-bootstrap
            dockerfile: tools/gibson-bootstrap/Dockerfile
            path: .
            image: ghcr.io/zeroroot-ai/gibson-bootstrap
            tag_pattern: gibson-bootstrap-v(.*)
            build_args: ""
          - component: gibson-bootstrap-runner
            dockerfile: tools/gibson-bootstrap/Dockerfile.runner
            path: .
            image: ghcr.io/zeroroot-ai/gibson-bootstrap-runner
            tag_pattern: gibson-bootstrap-runner-v(.*)
            build_args: ""
    uses: zeroroot-ai/.github/.github/workflows/reusable-image-build.yml@main
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      security-events: write
      actions: read
    with:
      component_name: ${{ matrix.component }}
      component_path: ${{ matrix.path }}
      dockerfile_path: ${{ matrix.dockerfile }}
      image_name: ${{ matrix.image }}
      tag_pattern: ${{ matrix.tag_pattern }}
      build_args: ${{ matrix.build_args }}
    secrets:
      # GH_PAT_GIBSON_RO is passed uniformly (harmless for Dockerfiles that
      # don't mount it) so `go mod download` can fetch private zeroroot-ai
      # modules (platform-sdk, platform-clients, etc.) for whichever images
      # need it -- same PAT the previous six workflows used.
      ghtoken: ${{ secrets.GH_PAT_GIBSON_RO }}

  # ---- gibson-belief-sidecar: kept as its own job (distinct pytest gate) ----
  # test_model.py uses pytest.importorskip, so a CI without the pinned pgmpy
  # deps installed would silently skip the very tests that construct a
  # BeliefModel -- which is exactly how the gibson#982 startup ImportError
  # shipped (the image build never runs the container; the import is lazy).
  # Gating the image build on this makes a runtime-broken sidecar
  # un-publishable. Kept out of the `images` matrix so a sidecar test failure
  # never blocks the other seven (unrelated) images from publishing.
  belief-sidecar-test:
    name: gibson-belief-sidecar python tests (pinned pgmpy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pinned deps + pytest
        working-directory: sidecar/belief
        run: pip install -r requirements.txt pytest
      - name: Unit + pgmpy exact-inference tests
        working-directory: sidecar/belief
        run: python -m pytest test_model.py -q

  belief-sidecar-image:
    name: gibson-belief-sidecar
    needs: belief-sidecar-test
    uses: zeroroot-ai/.github/.github/workflows/reusable-image-build.yml@main
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      security-events: write
      actions: read
    with:
      component_name: gibson-belief-sidecar
      component_path: sidecar/belief
      dockerfile_path: sidecar/belief/Dockerfile
      image_name: ghcr.io/zeroroot-ai/gibson-belief-sidecar
      tag_pattern: gibson-belief-sidecar-(v.*)
    # No ghtoken secret: self-contained Python (pinned public deps in
    # requirements.txt), no private zeroroot-ai Go modules.

  # ---- staging continuous-deploy: write the just-built sha into gitops ------
  # Epic: cicd-efficiency (board #44), slice S8, gibson#1131. See
  # docs/architecture/CICD-CONTEXT.md decision #6 (two-speed deploy, staging
  # half): "Component CI writes sha-<commit> into envs/staging/values.yaml
  # (NOT an overlay) on merge; ArgoCD auto-syncs staging."
  #
  # Gated on `needs: images` (the matrix job -- fail-fast:false still marks
  # the job failed if ANY leg fails, so this only runs once every published
  # image is actually green) AND on `github.event_name == 'push' &&
  # github.ref == 'refs/heads/main'` -- explicitly NOT on the `v*.*.*` tag
  # push this same workflow also builds on, and not on a workflow_dispatch
  # backfill. A release tag is a versioned artifact; it does not itself mean
  # "deploy this to staging" (that already happened when the commit landed
  # on main).
  #
  # Writes the immutable `sha-<shortsha>` tag -- the exact tag docker/
  # metadata-action's `type=sha,prefix=sha-` rule just published for this
  # commit (zeroroot-ai/.github reusable-image-build.yml) -- into the FOUR
  # gibson-workloads/gibson-operators image keys envs/staging/values.yaml
  # actually overrides: gibson.image.tag, extAuthz.image.tag,
  # tenantOperator.image.tag, platformOperator.image.tag. Deliberately
  # surgical: dashboard.image.tag lives in the same file but is a DIFFERENT
  # repo's build and must never be touched here. spiffe-jwks-exporter /
  # gibson-bootstrap(-runner) / gibson-belief-sidecar are also built by this
  # workflow, but staging does not override their tags (chart-default `main`
  # still applies there), so there is nothing to bump for them -- adding
  # unused overrides would defeat "keep it surgical."
  #
  # Auth: the default GITHUB_TOKEN cannot push to a different repo. Uses
  # secrets.GITOPS_TOKEN (see the PR body for the current status of that
  # secret on this repo).
  #
  # Flow: bump on a branch -> open a PR -> merge it immediately (gitops has
  # no required review; org policy is "PR always, never a bare push to
  # main" -- see zeroroot-ai/.github AGENTS.md -- so this still goes through
  # a PR, just without a human/agent pause in between) -> fire a
  # repository_dispatch so gitops's staging-smoke workflow runs against the
  # freshly-synced env within minutes, not just on its 6h schedule.
  #
  # Rollback: revert the one-line values.yaml bump (the squashed gitops
  # commit this job produces) -- ArgoCD self-heals staging back to the prior
  # sha on the next reconcile.
  bump-staging:
    name: bump staging sha (gitops)
    needs: images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Verify GITOPS_TOKEN is configured
        env:
          TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$TOKEN" ]; then
            echo "::error::GITOPS_TOKEN secret is not set on zeroroot-ai/gibson. A secret of this exact name already exists on zeroroot-ai/deploy (used by cross-chart-check.yml) -- either add the SAME token value as a repo secret here, or promote it to an org-level secret shared by both repos. It needs contents:write + pull-requests:write on zeroroot-ai/gitops (fine-grained PAT or a GitHub App installation token). This job cannot write the staging sha bump until that secret exists -- see the PR body."
            exit 1
          fi
          echo "GITOPS_TOKEN is configured."

      - name: Checkout gitops
        uses: actions/checkout@v7
        with:
          repository: zeroroot-ai/gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Compute immutable sha tag
        id: sha
        run: |
          set -euo pipefail
          short="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          echo "tag=sha-${short}" >> "$GITHUB_OUTPUT"
          echo "short=${short}" >> "$GITHUB_OUTPUT"

      # Surgical, single-line-per-component bump -- NOT `yq -i` (yq's writer
      # re-serializes the whole document: reflows inline-comment alignment,
      # drops blank lines -- verified against this exact file while building
      # this job). scripts/bump-staging-images.sh in the gitops repo does the
      # narrow sed/awk-style edit instead, mirroring its existing
      # scripts/bump-chart-version.sh pattern, and is itself re-runnable by a
      # human operator, not just this job.
      - name: Bump the four gibson-built image tags (surgical)
        working-directory: gitops
        run: |
          set -euo pipefail
          bash scripts/bump-staging-images.sh "${{ steps.sha.outputs.tag }}"
          echo "--- diff ---"
          git --no-pager diff -- envs/staging/values.yaml

      - name: Open + merge the staging bump PR
        working-directory: gitops
        env:
          GH_TOKEN: ${{ secrets.GITOPS_TOKEN }}
          NEWTAG: ${{ steps.sha.outputs.tag }}
        run: |
          set -euo pipefail
          if git diff --quiet -- envs/staging/values.yaml; then
            echo "staging is already on ${NEWTAG} -- nothing to bump"
            exit 0
          fi
          branch="ci/staging-${NEWTAG}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add envs/staging/values.yaml
          git commit -m "chore(staging): gibson images -> ${NEWTAG}"
          git push -u origin "$branch"
          gh pr create --repo zeroroot-ai/gitops \
            --base main --head "$branch" \
            --title "chore(staging): gibson images -> ${NEWTAG}" \
            --body "Post-merge staging continuous-deploy (Epic: cicd-efficiency, board #44, slice S8, gibson#1131). Source commit zeroroot-ai/gibson@${GITHUB_SHA}. Bumps ONLY the four gibson-built image tags in \`envs/staging/values.yaml\` (gibson-workloads.gibson, gibson-workloads.extAuthz, gibson-operators.tenantOperator, gibson-operators.platformOperator) to \`${NEWTAG}\` -- dashboard's tag is a different repo's build and is untouched. ArgoCD auto-syncs staging (envs/staging/gibson.yaml syncPolicy.automated.selfHeal=true). Rollback = revert this commit; ArgoCD self-heals staging back to the prior sha on the next reconcile."
          gh pr merge --repo zeroroot-ai/gitops "$branch" --squash --delete-branch

      - name: Notify staging-smoke (repository_dispatch)
        env:
          GH_TOKEN: ${{ secrets.GITOPS_TOKEN }}
          NEWTAG: ${{ steps.sha.outputs.tag }}
        run: |
          set -euo pipefail
          gh api repos/zeroroot-ai/gitops/dispatches --input - <<JSON
          {"event_type":"staging-updated","client_payload":{"tag":"${NEWTAG}","sha":"${GITHUB_SHA}"}}
          JSON
