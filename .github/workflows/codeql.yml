name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 2"

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze Go
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    env:
      # GOPRIVATE tells the Go toolchain to skip the public proxy and
      # checksum database for private zero-day-ai modules. Mirrors
      # gibsoncheck.yml `analyze` + tenant-operator codeql.yml.
      GOPRIVATE: github.com/zero-day-ai
    steps:
      - uses: actions/checkout@v4

      # Configure git credentials BEFORE setup-go so module download works
      # against private platform-clients / platform-sdk repos. Uses
      # GH_PAT_GIBSON_RO (same secret the Docker build's go mod download
      # uses; tenant-operator + dashboard use the identical pattern). The
      # insteadOf rule is more robust than .netrc because it rewrites
      # URLs at the git layer regardless of which subprocess invokes git.
      - name: Configure git for private modules
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.GH_PAT_GIBSON_RO }}@github.com/".insteadOf \
            "https://github.com/"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: github/codeql-action/init@v3
        with:
          languages: go
          queries: security-and-quality
          config-file: .github/codeql-config.yml

      - name: Build
        run: go build ./...

      - uses: github/codeql-action/analyze@v3
        with:
          wait-for-processing: true
