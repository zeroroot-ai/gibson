name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 8 * * 2"

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze Go
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write
    env:
      # GONOSUMDB + GOPRIVATE tell the Go toolchain to skip the public
      # checksum database for private zero-day-ai modules and fetch them
      # directly via git. Must be set before setup-go (which may invoke
      # `go mod download`). Mirrors gibsoncheck.yml `analyze`.
      GONOSUMDB: github.com/zero-day-ai/*
      GOPRIVATE: github.com/zero-day-ai/*
    steps:
      - uses: actions/checkout@v4

      # Configure git credentials BEFORE setup-go so module download works
      # against the private platform-clients / platform-sdk repos.
      # PRIVATE_REPO_TOKEN is the org-wide PAT with read access to all
      # zero-day-ai repos. Same block lives in gibsoncheck.yml.
      - name: Configure git credentials for private modules
        run: |
          printf 'machine github.com\nlogin oauth2\npassword %s\n' \
            "${{ secrets.PRIVATE_REPO_TOKEN }}" >> "$HOME/.netrc"
          chmod 0600 "$HOME/.netrc"
          git config --global credential.helper store
          printf 'https://oauth2:%s@github.com\n' \
            "${{ secrets.PRIVATE_REPO_TOKEN }}" >> "$HOME/.git-credentials"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: github/codeql-action/init@v3
        with:
          languages: go
          queries: security-and-quality
          config-file: .github/codeql-config.yml

      - name: Build
        run: go build ./...

      - uses: github/codeql-action/analyze@v3
        with:
          wait-for-processing: true
