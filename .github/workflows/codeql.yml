name: CodeQL

# Epic: cicd-efficiency (board #44), slice S5, gibson#1130. Scanner cadence per
# docs/architecture/CICD-CONTEXT.md decision #9: authoritative CodeQL analysis
# runs on merge_group (the pre-merge gate) instead of on every pull_request/push,
# plus a weekly deep scan. This is a real cut, not a duplicate: `push` here fired
# on every commit landed to main, and `pull_request` fired on every PR push --
# together the single largest per-PR minute cost after the image matrix.
#
# Fast per-PR signal is still available for security-critical paths (authz,
# ext-authz, secrets handling) via a path-filtered pull_request trigger, since a
# week-long lag on those specific diffs is undesirable even though the
# authoritative gate is merge_group.
#
# Queue-entry compat (epic cicd-efficiency, board #44, merge-queue-entry
# follow-up): the old `pull_request.paths` filter on the *trigger* meant this
# workflow produced NO check run at all on a PR that didn't touch those
# paths -- GitHub blocks queue entry until every required context has
# reported on the PR (a `skipped` conclusion satisfies that; an absent
# check does not). Trigger on every pull_request now; a cheap `changes` job
# does the same path detection natively (git diff, no third-party action)
# and the `analyze` job's job-level `if:` decides real-scan-vs-skip. Typical
# PRs get a fast `skipped` conclusion; authz/ext-authz/secrets-touching PRs
# still get the real scan; merge_group and the weekly schedule always get
# the real scan regardless of paths.
on:
  pull_request:
  merge_group:
  schedule:
    - cron: "0 8 * * 2"

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- cheap path-detection (pull_request only) ----
  # merge_group and schedule always get the real scan, so this only needs to
  # run -- and only needs to gate anything -- on pull_request.
  changes:
    name: detect security-critical path changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      security_paths: ${{ steps.diff.outputs.security_paths }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Diff against PR base
        id: diff
        run: |
          set -e
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED="$(git diff --name-only "$BASE" "$HEAD")"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -E '^internal/platform/authz/|^cmd/ext-authz/|(^|/)secrets/' > /dev/null; then
            echo "security_paths=true" >> "$GITHUB_OUTPUT"
          else
            echo "security_paths=false" >> "$GITHUB_OUTPUT"
          fi

  analyze:
    name: Analyze Go
    needs: changes
    # always() overrides the implicit success()-on-needs gate: `changes` is
    # itself skipped on merge_group/schedule, and a skipped dependency would
    # otherwise force this job to skip too. Real scan on merge_group/schedule
    # unconditionally; on pull_request, real scan only if the path filter
    # matched, else `skipped` (cheap, no runner spin-up).
    if: always() && (github.event_name != 'pull_request' || needs.changes.outputs.security_paths == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      # No security-events:write — gibson is a private repo, so uploading SARIF
      # to the code-scanning Security tab requires paid GitHub Advanced Security.
      # We run the analysis and publish the SARIF as a workflow artifact instead
      # (gibson#974). Restore the upload (and this permission) when the repo goes
      # public, where code scanning is free.
    env:
      # GOPRIVATE tells the Go toolchain to skip the public proxy and
      # checksum database for private zeroroot-ai modules. Mirrors
      # gibsoncheck.yml `analyze` + tenant-operator codeql.yml.
      GOPRIVATE: github.com/zeroroot-ai
    steps:
      - uses: actions/checkout@v7

      # Configure git credentials BEFORE setup-go so module download works
      # against private platform-clients / platform-sdk repos. Uses
      # GH_PAT_GIBSON_RO (same secret the Docker build's go mod download
      # uses; tenant-operator + dashboard use the identical pattern). The
      # insteadOf rule is more robust than .netrc because it rewrites
      # URLs at the git layer regardless of which subprocess invokes git.
      - name: Configure git for private modules
        if: github.event.pull_request.head.repo.fork != true
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.GH_PAT_GIBSON_RO }}@github.com/".insteadOf \
            "https://github.com/"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: github/codeql-action/init@v3
        with:
          languages: go
          queries: security-extended
          config-file: .github/codeql-config.yml

      - name: Build
        run: go build ./...

      - uses: github/codeql-action/analyze@v3
        with:
          # Run the analysis but do NOT upload to the code-scanning API — that
          # upload needs paid GHAS on a private repo (gibson#974). Write the
          # SARIF locally and publish it as an artifact below.
          upload: never
          output: codeql-results

      - name: Upload CodeQL SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif-go
          path: codeql-results
          if-no-files-found: warn
