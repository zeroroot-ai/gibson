name: coverage

# Test-quality coverage gates (gibson#794, E3 / QUALITY-BARS §4):
#   - absolute total-coverage floor, ratcheting toward 80% (.coverage-floor)
#   - 85% coverage on the statement lines a PR changes (cmd/diff-coverage)
# Both are blocking. Supersedes the former 60% bar (ADR-0021).
#
# The profile is generated with the same redis service + envtest binaries as
# build.yaml's correctness pass, so operator/controller suites contribute and
# the number matches the team's real test execution.

on:
  push:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - '.coverage-floor'
      - 'scripts/check-coverage-floor.sh'
      - 'cmd/diff-coverage/**'
      - '.github/workflows/coverage.yml'
  pull_request:
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - '.coverage-floor'
      - 'scripts/check-coverage-floor.sh'
      - 'cmd/diff-coverage/**'
      - '.github/workflows/coverage.yml'

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    name: coverage gates (floor + diff)
    services:
      redis:
        image: redis/redis-stack-server:7.4.0-v1
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      GOPRIVATE: github.com/zeroroot-ai/*
      GONOSUMDB: github.com/zeroroot-ai/*
    steps:
      # fetch-depth: 0 so cmd/diff-coverage can compute the merge-base against
      # the PR's base branch.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git for private modules
        if: github.event.pull_request.head.repo.fork != true
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.GH_PAT_GIBSON_RO }}@github.com/".insteadOf \
            "https://github.com/"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Make the base branch available for the diff-coverage merge-base.
      - name: Fetch base branch
        run: git fetch --no-tags origin "${{ github.base_ref || 'main' }}"

      # envtest binaries so operator suites run (same as build.yaml).
      - name: Set up envtest binaries
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
          ENVTEST_K8S_VERSION="$(go list -m -f '{{.Version}}' k8s.io/api | sed -E 's/^v0\.([0-9]+)\..*/1.\1/')"
          echo "Using envtest k8s version ${ENVTEST_K8S_VERSION}"
          ASSETS="$(setup-envtest use "${ENVTEST_K8S_VERSION}" -p path)"
          echo "KUBEBUILDER_ASSETS=${ASSETS}" >> "$GITHUB_ENV"

      - name: Generate coverage profile
        run: make coverage-profile

      - name: Absolute coverage floor (ratchet toward 80%)
        run: make check-coverage-floor

      - name: Diff coverage (>=85% of changed lines)
        run: make check-diff-coverage DIFF_COVERAGE_BASE=origin/${{ github.base_ref || 'main' }}
