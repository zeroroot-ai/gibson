name: gibsoncheck

# Spec: unified-identity-and-authorization Requirement 14.1.
# Runs the custom gibsoncheck Go analyzer (forbidden-imports +
# notrustlocalhost + tenantfromcontext) on every PR.
#
# Also runs the authz-registry drift gate (spec: private-authz-registry NFR Reliability):
# regenerates internal/platform/authz/registry/ from the pinned SDK protos and fails if the
# result differs from what is committed. Catches hand-edits and missed regen after
# an SDK bump.

on:
  push:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'tools/gibsoncheck/**'
      - 'internal/platform/authz/registry/**'
      - '.github/workflows/gibsoncheck.yml'
  # No `paths:` filter on pull_request (Epic: cicd-efficiency, board #44,
  # slice S3, .github#202). A `paths:`-filtered `pull_request` trigger
  # produces ZERO check runs on non-matching PRs, so this workflow's required
  # contexts (analyze, Migration build guards, per-RPC test walker,
  # authz-registry drift gate) would simply be absent and merge-queue entry
  # would freeze for that PR. Every PR now gets a real-or-skipped check run
  # for each job instead; the native `changes` job below gates the real work
  # so irrelevant PRs still skip cheaply.
  pull_request:
  # Epic: cicd-efficiency (board #44), slice S5, gibson#1130 (added scope per
  # issue comment): gibsoncheck is an authoritative gate that S3 needs available
  # in the merge_group context before the merge queue can require it -- without
  # this, enabling the queue with gibsoncheck required would freeze merges.
  # merge_group does not support a `paths` filter (actionlint [events]), so this
  # runs unconditionally in the queue -- consistent with it being an
  # authoritative, not a per-diff, gate.
  merge_group:

concurrency:
  group: gibsoncheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- change detection (pull_request only): keeps unrelated PRs cheap ----
  # Native job so it always reports a stable `changes` check-run name.
  # merge_group behavior is untouched: every real job below runs
  # unconditionally in merge_group (this job itself is skipped there), same
  # as before this workflow carried an `if:` at all.
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - id: filter
        name: Detect gibsoncheck-relevant changes
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          git fetch --no-tags origin "${BASE}" "${HEAD}" 2>/dev/null || true
          CHANGED="$(git diff --name-only "${BASE}" "${HEAD}")"
          echo "Changed files:"
          echo "${CHANGED}"
          if echo "${CHANGED}" | grep -Eq '\.go$|(^|/)go\.mod$|(^|/)go\.sum$|^tools/gibsoncheck/|^internal/platform/authz/registry/|^\.github/workflows/gibsoncheck\.yml$'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  analyze:
    needs: changes
    if: github.event_name == 'merge_group' || needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    env:
      # GOPRIVATE tells the Go toolchain to skip the public proxy and
      # checksum database for private zeroroot-ai modules and fetch them
      # directly via git. Must be set before setup-go (which may invoke
      # go mod download).
      GOPRIVATE: github.com/zeroroot-ai
    steps:
      - uses: actions/checkout@v7

      # Configure git credentials BEFORE setup-go so module download works.
      # GH_PAT_GIBSON_RO is the same PAT the gibson-daemon Docker build
      # uses for `go mod download` of private modules, and is the same
      # secret tenant-operator + dashboard use across their CI. The
      # insteadOf rule rewrites every github.com URL with the token so
      # subprocess git invocations (`go/packages.Load`, `git ls-remote`
      # under `go mod download`, buf's git fetch under `make
      # authz-registry`) all pick it up uniformly — the .netrc /
      # credential-helper approach previously used here was intermittent.
      - name: Configure git for private modules
        if: github.event.pull_request.head.repo.fork != true
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.GH_PAT_GIBSON_RO }}@github.com/".insteadOf \
            "https://github.com/"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Pre-download all modules so gibsoncheck's go/packages.Load can resolve imports
      # without network access.  This is a no-op on cache-warm runners.
      - name: Download Go modules
        run: go mod download

      - name: Run gibsoncheck against the daemon
        run: |
          set -e
          go build -o bin/gibsoncheck ./tools/gibsoncheck
          # Run individually so we can see which check (if any) fails.
          # Each analyzer exits non-zero on diagnostic.
          ./bin/gibsoncheck -forbiddenimports ./internal/... ./cmd/...
          ./bin/gibsoncheck -notrustlocalhost ./internal/... ./cmd/...
          # tenantfromcontext is informational during migration; treat
          # diagnostics as warnings (capture but do not fail).
          ./bin/gibsoncheck -tenantfromcontext ./internal/... ./cmd/... || true

      - name: Run gibsoncheck self-tests
        run: go test -race ./tools/gibsoncheck/...

      - name: Run adminpoolacquire guard on full codebase
        run: |
          set -e
          go build -o bin/gibsoncheck ./tools/gibsoncheck
          ./bin/gibsoncheck -adminpoolacquire ./internal/... ./cmd/...
          ./bin/gibsoncheck -forbidrawstoreimports ./internal/... ./cmd/...

  migration-guards:
    needs: changes
    if: github.event_name == 'merge_group' || needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    name: Migration build guards
    steps:
      - uses: actions/checkout@v7

      - name: Check no tenant_id in migrations
        run: |
          # Self-test first to verify the guard itself works.
          SELFTEST=1 bash scripts/check-no-tenant-id-column.sh
          # Then run the real check against the actual migrations.
          bash scripts/check-no-tenant-id-column.sh

      - name: Check no Redis tenant-prefix patterns
        run: bash scripts/check-no-redis-prefix.sh

  rpc-test-walker:
    needs: changes
    if: github.event_name == 'merge_group' || needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    name: per-RPC test walker
    # Spec: gibson#793 (E3 / QUALITY-BARS §4). Fails if any registered gRPC RPC
    # is not authz-enforceable, or lacks a handler test and is not in the
    # shrinking baseline (rpc_handler_coverage_baseline.txt). The walker is a
    # pure unit test — only stdlib + the in-module registry package — so it
    # needs no Docker. It does compile the registry package (which transitively
    # pulls private modules), hence the GOPRIVATE + git-credential setup mirrors
    # the analyze job.
    env:
      GOPRIVATE: github.com/zeroroot-ai
    steps:
      - uses: actions/checkout@v7

      - name: Configure git for private modules
        if: github.event.pull_request.head.repo.fork != true
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.GH_PAT_GIBSON_RO }}@github.com/".insteadOf \
            "https://github.com/"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Download Go modules
        run: go mod download

      - name: Run per-RPC test walker
        run: make check-rpc-test-walker

  authz-registry-drift:
    needs: changes
    if: github.event_name == 'merge_group' || needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    name: authz-registry drift gate
    # Spec: private-authz-registry NFR Reliability.
    # Regenerates internal/platform/authz/registry/ from the SDK protos pinned in go.mod
    # and fails if the result differs from committed content. Catches:
    #   - Hand-edits to registry.go instead of running regen.
    #   - SDK version bumps where `make authz-registry` was not re-run.
    env:
      # `make authz-registry` does `go run`/`go build` against pinned
      # platform-sdk + platform-clients (private). Same auth pattern
      # as the `analyze` job above.
      GOPRIVATE: github.com/zeroroot-ai
    steps:
      - uses: actions/checkout@v7

      - name: Configure git for private modules
        if: github.event.pull_request.head.repo.fork != true
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.GH_PAT_GIBSON_RO }}@github.com/".insteadOf \
            "https://github.com/"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Install buf globally so `make authz-registry BUF=buf` works without
      # needing the dashboard node_modules tree (same pattern as SDK CI).
      - name: Install buf
        run: npm install -g @bufbuild/buf

      - name: Regenerate authz registry
        run: make authz-registry BUF=buf

      - name: Check for drift
        run: |
          if ! git diff --exit-code internal/platform/authz/registry/; then
            echo ""
            echo "registry.go (or another artifact in internal/platform/authz/registry/) has drifted"
            echo "from the SDK protos pinned in go.mod."
            echo ""
            echo "Remediation: run \`make authz-registry\` and commit the result."
            exit 1
          fi
