name: gibsoncheck

# Spec: unified-identity-and-authorization Requirement 14.1.
# Runs the custom gibsoncheck Go analyzer (forbidden-imports +
# notrustlocalhost + tenantfromcontext) on every PR.
#
# Also runs the authz-registry drift gate (spec: private-authz-registry NFR Reliability):
# regenerates internal/authz/registry/ from the pinned SDK protos and fails if the
# result differs from what is committed. Catches hand-edits and missed regen after
# an SDK bump.

on:
  push:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'tools/gibsoncheck/**'
      - 'internal/authz/registry/**'
      - '.github/workflows/gibsoncheck.yml'
  pull_request:
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'tools/gibsoncheck/**'
      - 'internal/authz/registry/**'
      - '.github/workflows/gibsoncheck.yml'

concurrency:
  group: gibsoncheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    env:
      # GOPRIVATE tells the Go toolchain to skip the public proxy and
      # checksum database for private zeroroot-ai modules and fetch them
      # directly via git. Must be set before setup-go (which may invoke
      # go mod download).
      GOPRIVATE: github.com/zeroroot-ai
    steps:
      - uses: actions/checkout@v4

      # Configure git credentials BEFORE setup-go so module download works.
      # GH_PAT_GIBSON_RO is the same PAT the gibson-daemon Docker build
      # uses for `go mod download` of private modules, and is the same
      # secret tenant-operator + dashboard use across their CI. The
      # insteadOf rule rewrites every github.com URL with the token so
      # subprocess git invocations (`go/packages.Load`, `git ls-remote`
      # under `go mod download`, buf's git fetch under `make
      # authz-registry`) all pick it up uniformly — the .netrc /
      # credential-helper approach previously used here was intermittent.
      - name: Configure git for private modules
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.GH_PAT_GIBSON_RO }}@github.com/".insteadOf \
            "https://github.com/"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Pre-download all modules so gibsoncheck's go/packages.Load can resolve imports
      # without network access.  This is a no-op on cache-warm runners.
      - name: Download Go modules
        run: go mod download

      - name: Run gibsoncheck against the daemon
        run: |
          set -e
          go build -o bin/gibsoncheck ./tools/gibsoncheck
          # Run individually so we can see which check (if any) fails.
          # Each analyzer exits non-zero on diagnostic.
          ./bin/gibsoncheck -forbiddenimports ./internal/... ./cmd/...
          ./bin/gibsoncheck -notrustlocalhost ./internal/... ./cmd/...
          # tenantfromcontext is informational during migration; treat
          # diagnostics as warnings (capture but do not fail).
          ./bin/gibsoncheck -tenantfromcontext ./internal/... ./cmd/... || true

      - name: Run gibsoncheck self-tests
        run: go test -race ./tools/gibsoncheck/...

      - name: Run adminpoolacquire guard on full codebase
        run: |
          set -e
          go build -o bin/gibsoncheck ./tools/gibsoncheck
          ./bin/gibsoncheck -adminpoolacquire ./internal/... ./cmd/...
          ./bin/gibsoncheck -forbidrawstoreimports ./internal/... ./cmd/...

  migration-guards:
    runs-on: ubuntu-latest
    name: Migration build guards
    steps:
      - uses: actions/checkout@v4

      - name: Check no tenant_id in migrations
        run: |
          # Self-test first to verify the guard itself works.
          SELFTEST=1 bash scripts/check-no-tenant-id-column.sh
          # Then run the real check against the actual migrations.
          bash scripts/check-no-tenant-id-column.sh

      - name: Check no Redis tenant-prefix patterns
        run: bash scripts/check-no-redis-prefix.sh

  authz-registry-drift:
    runs-on: ubuntu-latest
    name: authz-registry drift gate
    # Spec: private-authz-registry NFR Reliability.
    # Regenerates internal/authz/registry/ from the SDK protos pinned in go.mod
    # and fails if the result differs from committed content. Catches:
    #   - Hand-edits to registry.go instead of running regen.
    #   - SDK version bumps where `make authz-registry` was not re-run.
    env:
      # `make authz-registry` does `go run`/`go build` against pinned
      # platform-sdk + platform-clients (private). Same auth pattern
      # as the `analyze` job above.
      GOPRIVATE: github.com/zeroroot-ai
    steps:
      - uses: actions/checkout@v4

      - name: Configure git for private modules
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.GH_PAT_GIBSON_RO }}@github.com/".insteadOf \
            "https://github.com/"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Install buf globally so `make authz-registry BUF=buf` works without
      # needing the dashboard node_modules tree (same pattern as SDK CI).
      - name: Install buf
        run: npm install -g @bufbuild/buf

      - name: Regenerate authz registry
        run: make authz-registry BUF=buf

      - name: Check for drift
        run: |
          if ! git diff --exit-code internal/authz/registry/; then
            echo ""
            echo "registry.go (or another artifact in internal/authz/registry/) has drifted"
            echo "from the SDK protos pinned in go.mod."
            echo ""
            echo "Remediation: run \`make authz-registry\` and commit the result."
            exit 1
          fi
