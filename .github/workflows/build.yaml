name: Build and Push

on:
  push:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - '.github/workflows/build.yaml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: zero-day-ai/gibson

jobs:
  test:
    # spec setec-sandbox-prod-default R1.5: matrix builds and tests BOTH the
    # production-default `setec_integration` variant and the empty (SDK / dev
    # stub) variant. The empty variant must still build and pass tests because
    # the SDK and unit-test paths still depend on the disabled stub at
    # `internal/daemon/sandboxed_setec_disabled.go`.
    #
    # NOTE: embedder tests are CI-deferred (gated by `//go:build embedder_tests`)
    # — do NOT add `-tags=embedder_tests` here. Local `make test` / `make test-race`
    # already skip them by default (CLAUDE.md operational guardrails).
    name: Test (build_tags=${{ matrix.build_tags || 'empty' }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_tags: ["setec_integration", ""]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - run: go vet ${{ matrix.build_tags && format('-tags={0}', matrix.build_tags) || '' }} ./...

      - run: go test -race ${{ matrix.build_tags && format('-tags={0}', matrix.build_tags) || '' }} ./...

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build-and-push]
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      # GHCR repo is private; trivy needs creds to pull the just-pushed
      # image. Without this login, the scan fails UNAUTHORIZED and silently
      # no-ops on CVE coverage (gibson#104). Must run BEFORE trivy-action.
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
