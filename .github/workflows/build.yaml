name: Build and Push

# Builds + pushes ghcr.io/zeroroot-ai/gibson to GHCR.
# Delegates the image build to the org reusable image-build workflow so tag
# rules are consistent across all platform repos:
#   type=ref,event=branch → :main on main-branch pushes  (fixes gibson#280)
#   type=match,pattern=v(.*)  → semver tag on releases
#   type=raw,value=latest     → :latest on main + workflow_dispatch
#   type=sha,prefix=sha-      → immutable per-commit tag
# The reusable workflow also gains cosign signing, SBOM attestation, and
# Trivy scanning — replacing the hand-rolled security job below.
#
# Triggers:
#   - push to main  — rebuilds :latest + :main on every commit.
#   - tag push v*.*.* — publishes semver tag (release-please cuts tags).
#   - workflow_dispatch — manual backfill / force-rebuild.
#
# Path filter note: the `paths:` filter below is applied at the caller level.
# The reusable workflow uses `workflow_call` and therefore does not have its
# own push trigger — the caller's `paths:` filter is the only gate. This is
# the same trade-off used by tenant-operator#199 and is the correct approach:
# the reusable workflow cannot declare its own path triggers.

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - '.github/workflows/build.yaml'
  pull_request:
  workflow_dispatch:

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # spec setec-sandbox-prod-default R1.5: matrix builds and tests BOTH the
    # production-default `setec_integration` variant and the empty (SDK / dev
    # stub) variant. The empty variant must still build and pass tests because
    # the SDK and unit-test paths still depend on the disabled stub at
    # `internal/daemon/sandboxed_setec_disabled.go`.
    #
    # NOTE: embedder tests are CI-deferred (gated by `//go:build embedder_tests`)
    # — do NOT add `-tags=embedder_tests` here. Local `make test` / `make test-race`
    # already skip them by default (CLAUDE.md operational guardrails).
    name: Test (build_tags=${{ matrix.build_tags || 'empty' }})
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis/redis-stack-server:7.4.0-v1
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    strategy:
      fail-fast: false
      matrix:
        build_tags: ["setec_integration", ""]
    env:
      # GOPRIVATE + GONOSUMDB tell the Go toolchain to skip the public checksum
      # database for private zeroroot-ai modules and fetch them directly via
      # git. Must be set before setup-go (which may invoke go mod download).
      GOPRIVATE: github.com/zeroroot-ai/*
      GONOSUMDB: github.com/zeroroot-ai/*
    steps:
      - uses: actions/checkout@v4

      # Configure git credentials BEFORE setup-go so module download works.
      # GH_PAT_GIBSON_RO is a fine-grained PAT with read-only access to the
      # zeroroot-ai org's private Go modules (platform-sdk, platform-clients,
      # etc.). Same pattern as tenant-operator#176 / ext-authz#56.
      - name: Configure git for private modules
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.GH_PAT_GIBSON_RO }}@github.com/".insteadOf \
            "https://github.com/"

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - run: go vet ${{ matrix.build_tags && format('-tags={0}', matrix.build_tags) || '' }} ./...

      - run: go test -race ${{ matrix.build_tags && format('-tags={0}', matrix.build_tags) || '' }} ./...

  build:
    # Gate the image build on passing tests. The reusable workflow handles
    # build → push → cosign sign → SBOM attest → Trivy scan.
    needs: [test]
    uses: zeroroot-ai/.github/.github/workflows/reusable-image-build.yml@main
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      security-events: write
      actions: read
    with:
      component_name: gibson
      component_path: .
      dockerfile_path: Dockerfile
      image_name: ghcr.io/zeroroot-ai/gibson
      tag_pattern: v(.*)
      # Inject commit SHA + build timestamp so pkg/version.GitCommit and
      # pkg/version.BuildTime are populated via ldflags (gibson#251).
      build_args: |
        COMMIT=${{ github.sha }}
        BUILD_TIME=${{ github.event.head_commit.timestamp }}
    secrets:
      # GH_PAT_GIBSON_RO is passed as the `ghtoken` BuildKit secret so the
      # Dockerfile's `--mount=type=secret,id=ghtoken` can fetch private Go
      # modules at build time (platform-sdk, platform-clients, etc.).
      ghtoken: ${{ secrets.GH_PAT_GIBSON_RO }}
