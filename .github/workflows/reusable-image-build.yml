name: Reusable image build

# Reusable workflow for building + signing + SBOM + scanning platform images.
# Spec: production-eks-deploy, task 20.
#
# Callers pass per-component inputs. This workflow:
#   1. Builds multi-arch (linux/amd64 + linux/arm64) via docker buildx.
#   2. Pushes to ghcr.io/zero-day-ai/<image_name> on non-PR events.
#   3. Generates SPDX SBOM via anchore/sbom-action.
#   4. Scans with Trivy (fails on HIGH/CRITICAL with an available fix).
#   5. Signs the digest with cosign keyless (GitHub OIDC).
#
# Internal stage names and digest pinning in each component's Dockerfile
# are the caller's responsibility; this workflow just invokes buildx.

on:
  workflow_call:
    inputs:
      component_name:
        required: true
        type: string
        description: Short name used for metadata tag patterns and image URL (e.g. gibson, dashboard).
      component_path:
        required: true
        type: string
        description: Path to the build context (e.g. core/gibson).
      dockerfile_path:
        required: true
        type: string
        description: Path to the Dockerfile relative to repo root.
      image_name:
        required: true
        type: string
        description: Fully qualified image name (e.g. ghcr.io/zero-day-ai/gibson).
      tag_pattern:
        required: true
        type: string
        description: Regex pattern for semver tag extraction (e.g. `gibson/v(.*)`).
      build_args:
        required: false
        type: string
        default: ""
        description: Newline-separated BUILD_ARGS passed to docker/build-push-action.
      trivy_severity:
        required: false
        type: string
        default: "HIGH,CRITICAL"
        description: Comma-separated Trivy severities that fail the build.

jobs:
  build:
    name: Build, sign, scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image_name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=match,pattern=${{ inputs.tag_pattern }},group=1
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.component_path }}
          file: ${{ inputs.dockerfile_path }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          push: ${{ github.event_name != 'pull_request' }}
          provenance: true
          sbom: true
          build-args: ${{ inputs.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@v0
        with:
          image: ${{ inputs.image_name }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          artifact-name: ${{ inputs.component_name }}-sbom.spdx.json
          upload-artifact: true

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.image_name }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-${{ inputs.component_name }}.sarif
          severity: ${{ inputs.trivy_severity }}
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library

      - name: Upload Trivy SARIF to GitHub Security
        if: always() && github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ inputs.component_name }}.sarif
          category: trivy-${{ inputs.component_name }}

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign (keyless, OIDC)
        if: github.event_name != 'pull_request'
        run: cosign sign --yes ${{ inputs.image_name }}@${{ steps.build.outputs.digest }}

      - name: Summary
        if: always()
        run: |
          echo "### Image build — ${{ inputs.component_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ inputs.image_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest**: \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags**: \`${{ steps.meta.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Push**: ${{ github.event_name != 'pull_request' }}" >> $GITHUB_STEP_SUMMARY
