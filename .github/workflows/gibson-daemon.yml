name: gibson-daemon

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'CLAUDE.md'

concurrency:
  group: gibson-daemon-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: zeroroot-ai/.github/.github/workflows/reusable-image-build.yml@main
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      security-events: write
      actions: read
    with:
      component_name: gibson
      component_path: .
      dockerfile_path: Dockerfile
      image_name: ghcr.io/zeroroot-ai/gibson
      tag_pattern: (v.*)
      # spec setec-sandbox-prod-default R1.1: production GHCR images compile in
      # the Setec gRPC adapter by default. The Dockerfile's ARG default is also
      # `setec_integration`, but we declare it explicitly here to make CI's
      # production-default contract obvious in the workflow surface.
      #
      # COMMIT + BUILD_TIME are injected so pkg/version.GitCommit and
      # pkg/version.BuildTime are populated via ldflags (gibson#251).
      # github.sha is always available; head_commit.timestamp is set on
      # push events — on workflow_dispatch it falls back to the empty
      # string which the Dockerfile ARG default ("unknown") covers.
      build_args: |
        BUILD_TAGS=setec_integration
        COMMIT=${{ github.sha }}
        BUILD_TIME=${{ github.event.head_commit.timestamp }}
    secrets:
      # Dockerfile mounts this as a BuildKit secret (id=ghtoken) and writes a
      # git insteadOf rule so `go mod download` can fetch the private
      # zeroroot-ai modules (platform-sdk, platform-clients, etc.). Without
      # this the image build fails with "could not read Username for github".
      # See tenant-operator#52 / tenant-operator#176 for the same pattern.
      ghtoken: ${{ secrets.GH_PAT_GIBSON_RO }}
