name: fga-smoke-test

# Validates the OpenFGA authorization model (internal/platform/authz/model.fga) against
# a live ephemeral OpenFGA server via testcontainers. Runs the integration test
# suite including the tenant-role-taxonomy hierarchy assertions (Req 1.5, 6.1).
#
# Why a separate workflow from gibsoncheck:
#   - These tests start a Docker container (OpenFGA) and need Docker-in-Docker.
#   - They run with the `integration` build tag and take ~60s.
#   - Keeping them separate avoids slowing the fast gibsoncheck / unit-test jobs.
#
# Spec: tenant-role-taxonomy.

on:
  push:
    branches: [main]
    paths:
      - 'internal/platform/authz/model.fga'
      - 'internal/platform/authz/**_test.go'
      - '.github/workflows/fga-smoke-test.yml'
  # No `paths:` filter on pull_request (Epic: cicd-efficiency, board #44,
  # slice S3, .github#202). A `paths:`-filtered `pull_request` trigger
  # produces ZERO check runs on non-matching PRs, so the required context
  # (FGA model smoke test) would simply be absent and merge-queue entry would
  # freeze for that PR. Every PR now gets a real-or-skipped check run
  # instead; the native `changes` job below gates the real Docker-backed work
  # so irrelevant PRs still skip cheaply.
  pull_request:
  # Epic: cicd-efficiency (board #44), slice S5, gibson#1130 (added scope per
  # issue comment): fga-smoke-test is an authoritative gate that S3 needs
  # available in the merge_group context before the merge queue can require it
  # -- without this, enabling the queue with fga-smoke-test required would
  # freeze merges.
  # merge_group does not support a `paths` filter (actionlint [events]), so this
  # runs unconditionally in the queue -- consistent with it being an
  # authoritative, not a per-diff, gate.
  merge_group:

concurrency:
  group: fga-smoke-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---- change detection (pull_request only): keeps unrelated PRs cheap ----
  # Native job so it always reports a stable `changes` check-run name.
  # merge_group behavior is untouched: `fga-smoke` runs unconditionally in
  # merge_group (this job itself is skipped there), same as before this
  # workflow carried an `if:` at all.
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - id: filter
        name: Detect FGA-relevant changes
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          git fetch --no-tags origin "${BASE}" "${HEAD}" 2>/dev/null || true
          CHANGED="$(git diff --name-only "${BASE}" "${HEAD}")"
          echo "Changed files:"
          echo "${CHANGED}"
          if echo "${CHANGED}" | grep -Eq '^internal/platform/authz/model\.fga$|^internal/platform/authz/.*_test\.go$|^\.github/workflows/fga-smoke-test\.yml$'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  fga-smoke:
    needs: changes
    if: github.event_name == 'merge_group' || needs.changes.outputs.relevant == 'true'
    name: FGA model smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # Docker is available on ubuntu-latest runners. The testcontainers library
      # will start openfga/openfga:latest in-process; each sub-test creates its
      # own ephemeral store so test isolation is guaranteed. The container is
      # terminated by the test's defer cleanup regardless of pass/fail.
      - name: Run FGA model integration tests (includes tenant-role-taxonomy hierarchy)
        run: |
          go test -v -tags=integration -timeout=300s \
            ./internal/platform/authz/... \
            -run 'TestModel_TenantRoleHierarchy|TestModel_CatalogGating|TestIntegration_FGA'
        # Failure message surfaced in CI output names the spec for easy triage.
        # Individual assertions in model_hierarchy_test.go also name
        # "tenant-role-taxonomy" so log grep is unambiguous.
