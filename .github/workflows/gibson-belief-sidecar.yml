name: gibson-belief-sidecar image

# Builds and publishes ghcr.io/zeroroot-ai/gibson-belief-sidecar — the
# belief-field pgmpy inference sidecar (gibson#750, deploy#936, ADR-0005).
#
# The reusable-image-build.yml workflow handles:
#   - linux/amd64 buildx build
#   - GHCR push (non-PR only)
#   - SPDX SBOM generation + cosign attest
#   - Trivy vulnerability scan
#   - cosign keyless signing
#
# Tag convention: gibson-belief-sidecar-v<semver> (e.g.
# gibson-belief-sidecar-v0.1.0). The image is versioned separately from the
# daemon because its model artifacts + Python deps are baked in and change on a
# different cadence; the deploy chart pins an explicit tag (deploy#936).
#
# Unlike the daemon image this build needs NO ghtoken secret: the sidecar is
# self-contained Python (pinned public deps in requirements.txt) with no
# private zeroroot-ai Go modules.

on:
  push:
    branches: [main]
    tags:
      - 'gibson-belief-sidecar-v*'
  pull_request:
    paths:
      - 'sidecar/belief/**'
      - '.github/workflows/gibson-belief-sidecar.yml'
  # workflow_dispatch is the escape hatch when release-please's tag push doesn't
  # trigger downstream workflows (GITHUB_TOKEN-pushed tags don't fire
  # `on: push: tags`). Post-release: `gh workflow run
  # gibson-belief-sidecar.yml` to publish the tag-specific image.
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag to build (e.g. gibson-belief-sidecar-v1.0.0). Defaults to main if empty."
        required: false
        type: string

concurrency:
  group: gibson-belief-sidecar-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Run the sidecar's Python tests WITH the pinned deps installed, so the pgmpy
  # inference path actually executes. test_model.py uses pytest.importorskip,
  # so a CI without pgmpy would silently skip the very tests that construct a
  # BeliefModel — which is exactly how the gibson#982 startup ImportError
  # shipped (the image build never runs the container; the import is lazy).
  # Gating `build` on this makes a runtime-broken sidecar un-publishable.
  test:
    name: python tests (pinned pgmpy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pinned deps + pytest
        working-directory: sidecar/belief
        run: pip install -r requirements.txt pytest
      - name: Unit + pgmpy exact-inference tests
        working-directory: sidecar/belief
        run: python -m pytest test_model.py -q

  build:
    needs: test
    if: github.event_name != 'pull_request'  # gibson#1024-cost: build images on merge only
    uses: zeroroot-ai/.github/.github/workflows/reusable-image-build.yml@main
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      security-events: write
      actions: read
    with:
      component_name: gibson-belief-sidecar
      component_path: sidecar/belief
      dockerfile_path: sidecar/belief/Dockerfile
      image_name: ghcr.io/zeroroot-ai/gibson-belief-sidecar
      tag_pattern: gibson-belief-sidecar-(v.*)
