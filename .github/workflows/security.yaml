# Spec: security-hardening Requirement 5 (Go-CVE policy).
# Runs govulncheck against the daemon build.
# Local invocation is forbidden per CLAUDE.md (CPU thrash); this workflow
# is the canonical place to surface CVE failures.
#
# Epic: cicd-efficiency (board #44), slice S5, gibson#1130. Scanner cadence per
# docs/architecture/CICD-CONTEXT.md decision #9: this is the authoritative
# pre-merge gate on merge_group instead of the previous double-fire on both
# `pull_request` and `push:main`, plus a weekly deep scan so a CVE published
# between merges is still caught within a week.
#
# Queue-entry compat (epic cicd-efficiency, board #44, merge-queue-entry
# follow-up): GitHub blocks a PR from entering the merge queue until every
# ruleset-required check context has reported on the PR itself -- a
# `skipped` conclusion satisfies that, an absent check does not. A workflow
# that only triggers on `merge_group` produces no check run at all on a
# typical PR, so this can never be added to required_status_checks without
# freezing entry. Add `pull_request` to the trigger and skip the expensive
# job there via job-level `if:` (skipped = free, no runner spin-up); the
# real scan still only runs on merge_group/schedule. Mirrors dashboard's
# node-ci / security.yml / codeql.yml (dashboard#941/#942) and gibson's own
# go-ci.yml heavy-tier pattern.
name: security

on:
  pull_request:
  merge_group:
  schedule:
    - cron: "0 9 * * 3"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    # Real scan only outside pull_request (merge_group is the authoritative
    # gate, schedule is the weekly deep scan). Reports `skipped` on PRs so
    # this context can be added to required_status_checks without blocking
    # queue entry.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # govulncheck walks the full transitive go.mod graph; private
      # platform-clients + platform-sdk fetches need git auth. Same
      # pattern as gibsoncheck.yml `analyze` + tenant-operator
      # security.yaml.
      GOPRIVATE: github.com/zeroroot-ai
    steps:
      - uses: actions/checkout@v7

      - name: Configure git for private modules
        if: github.event.pull_request.head.repo.fork != true
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.GH_PAT_GIBSON_RO }}@github.com/".insteadOf \
            "https://github.com/"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: build daemon binary for govulncheck
        # govulncheck's SOURCE mode does go/ssa static analysis, which crashes
        # under the Go 1.26.4 toolchain on this codebase — two distinct upstream
        # panics (gibson#758): v1.4.0 nil-derefs in internal/vulncheck.vulnFuncs,
        # and @master panics "ForEachElement called on type containing
        # *types.TypeParam" on our generics. go.mod pins `go 1.26.4`, so we can't
        # downgrade the toolchain. BINARY mode reads the compiled binary's symbol
        # table instead of re-analyzing source, sidestepping the crash entirely.
        # Restore source mode (`govulncheck ./...`) once an x/vuln release
        # supports Go 1.26.4 source analysis.
        run: go build -o "${RUNNER_TEMP}/gibson" ./cmd/gibson

      - name: run govulncheck
        # Binary mode still fetches the vuln DB from https://vuln.go.dev; under
        # Go 1.26.4 net/http's HTTP/2 client read-loop panics mid-fetch
        # (h2_bundle.go ReadFrame). Force the DB fetch over HTTP/1.1 so the
        # panicking http2 read loop is never entered.
        env:
          GODEBUG: http2client=0
        run: govulncheck -mode=binary "${RUNNER_TEMP}/gibson"
