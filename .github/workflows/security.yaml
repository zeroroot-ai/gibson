# Spec: security-hardening Requirement 5 (Go-CVE policy).
# Runs govulncheck against the daemon on every PR and on every push to main.
# Local invocation is forbidden per CLAUDE.md (CPU thrash); this workflow
# is the canonical place to surface CVE failures.
name: security

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # govulncheck walks the full transitive go.mod graph; private
      # platform-clients + platform-sdk fetches need git auth. Same
      # pattern as gibsoncheck.yml `analyze` + tenant-operator
      # security.yaml.
      GOPRIVATE: github.com/zeroroot-ai
    steps:
      - uses: actions/checkout@v4

      - name: Configure git for private modules
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.GH_PAT_GIBSON_RO }}@github.com/".insteadOf \
            "https://github.com/"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: install govulncheck
        # The latest RELEASE (v1.4.0) crashes under the Go 1.26.4 toolchain with
        # a nil-pointer deref in internal/vulncheck.vulnFuncs (source.go:281) —
        # a second, distinct incompatibility beyond the DB-fetch http2 panic
        # below (gibson#758). go.mod pins `go 1.26.4`, so the scanner cannot run
        # under an older toolchain. Build from @master, which carries the
        # unreleased Go 1.26 analysis fixes; revert to @latest once an x/vuln
        # release ships Go 1.26.4 support.
        run: go install golang.org/x/vuln/cmd/govulncheck@master

      - name: run govulncheck
        # govulncheck fetches the vuln DB from https://vuln.go.dev. Under the
        # Go 1.26.4 toolchain net/http's HTTP/2 client read-loop panics mid-fetch
        # (h2_bundle.go ReadFrame goroutine crash → exit 2, a tooling error,
        # not a vuln finding) — gibson#758. Force the DB fetch over HTTP/1.1 so
        # the panicking http2 read loop is never entered.
        env:
          GODEBUG: http2client=0
        run: govulncheck ./...
