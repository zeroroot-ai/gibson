# Spec: security-hardening Requirement 5 (Go-CVE policy).
# Runs govulncheck against the daemon on every PR and on every push to main.
# Local invocation is forbidden per CLAUDE.md (CPU thrash); this workflow
# is the canonical place to surface CVE failures.
name: security

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # govulncheck walks the full transitive go.mod graph; private
      # platform-clients + platform-sdk fetches need git auth. Same
      # pattern as gibsoncheck.yml `analyze`.
      GONOSUMDB: github.com/zero-day-ai/*
      GOPRIVATE: github.com/zero-day-ai/*
    steps:
      - uses: actions/checkout@v4

      - name: Configure git credentials for private modules
        run: |
          printf 'machine github.com\nlogin oauth2\npassword %s\n' \
            "${{ secrets.PRIVATE_REPO_TOKEN }}" >> "$HOME/.netrc"
          chmod 0600 "$HOME/.netrc"
          git config --global credential.helper store
          printf 'https://oauth2:%s@github.com\n' \
            "${{ secrets.PRIVATE_REPO_TOKEN }}" >> "$HOME/.git-credentials"

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: run govulncheck
        run: govulncheck ./...
