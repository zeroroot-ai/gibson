name: gibson-bootstrap image

# Builds and publishes ghcr.io/zero-day-ai/gibson-bootstrap on tag pushes
# matching gibson-bootstrap-v* (e.g. gibson-bootstrap-v0.1.0).
#
# The reusable-image-build.yml workflow handles:
#   - linux/amd64 buildx build
#   - GHCR push (non-PR only)
#   - SPDX SBOM generation
#   - Trivy vulnerability scan
#   - cosign keyless signing
#
# Tag convention: gibson-bootstrap-v<semver> (e.g. gibson-bootstrap-v0.1.0).
# release-please is configured to track this binary separately from the daemon.

on:
  push:
    branches: [main]
    tags:
      - 'gibson-bootstrap-v*'
  pull_request:
    paths:
      - 'tools/gibson-bootstrap/**'
      - '.github/workflows/gibson-bootstrap-image.yml'
  # workflow_dispatch is the escape hatch when release-please's tag push
  # doesn't trigger downstream workflows: GitHub Actions intentionally
  # doesn't fire `on: push: tags:` events for tags pushed by the default
  # GITHUB_TOKEN, which is what release-please uses. Until/unless we
  # switch release-please to a GitHub App token, the post-release step
  # is: `gh workflow run gibson-bootstrap-image.yml -f ref=gibson-bootstrap-v<ver>`
  # to publish the tag-specific image.
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag to build (e.g. gibson-bootstrap-v1.0.0). Defaults to main if empty."
        required: false
        type: string

concurrency:
  group: gibson-bootstrap-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/reusable-image-build.yml
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      security-events: write
    with:
      component_name: gibson-bootstrap
      component_path: .
      dockerfile_path: tools/gibson-bootstrap/Dockerfile
      image_name: ghcr.io/zero-day-ai/gibson-bootstrap
      tag_pattern: gibson-bootstrap-v(.*)
