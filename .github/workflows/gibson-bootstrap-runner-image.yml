name: gibson-bootstrap-runner image

# Builds and publishes ghcr.io/zero-day-ai/gibson-bootstrap-runner.
#
# This image is consumed exclusively by the gibson chart's bootstrap-secrets
# Job. It layers bash + jq + kubectl + aws-cli on top of the gibson-bootstrap
# distroless binary image. See tools/gibson-bootstrap/Dockerfile.runner.
#
# Spec: .spec-workflow/specs/kind-dashboard-bringup-e2e (D1).
#
# Tag convention mirrors gibson-bootstrap: gibson-bootstrap-runner-v<semver>.

on:
  push:
    branches: [main]
    tags:
      - 'gibson-bootstrap-runner-v*'
  pull_request:
    paths:
      - 'tools/gibson-bootstrap/Dockerfile.runner'
      - 'tools/gibson-bootstrap/**.go'
      - '.github/workflows/gibson-bootstrap-runner-image.yml'
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag to build (e.g. gibson-bootstrap-runner-v1.0.0). Defaults to main if empty."
        required: false
        type: string

concurrency:
  group: gibson-bootstrap-runner-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: zero-day-ai/.github/.github/workflows/reusable-image-build.yml@main
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      security-events: write
    with:
      component_name: gibson-bootstrap-runner
      component_path: .
      dockerfile_path: tools/gibson-bootstrap/Dockerfile.runner
      image_name: ghcr.io/zero-day-ai/gibson-bootstrap-runner
      tag_pattern: gibson-bootstrap-runner-v(.*)
