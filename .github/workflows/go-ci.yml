name: go-ci

# Thin caller for the canonical three-tier Go CI (Epic: cicd-efficiency, board #44,
# slice S2, gibson#1128). See docs/architecture/CICD-CONTEXT.md and
# docs/adr/0060-ci-runner-split-hosted-default-ephemeral-metal.md.
#
# Replaces the standalone lint.yml / coverage.yml / integration.yml workflows,
# which each double-fired their full suite on both `pull_request` and
# `push:main`. This file follows the org-wide trigger split instead:
#
#   pull_request -> fast tier:   quick contributor signal (vet/build/test/lint,
#                                critical-path manifest guard). No race, no
#                                Docker-backed integration suite.
#   merge_group  -> heavy tier:  authoritative gate (race + govulncheck via the
#                                reusable, plus gibson's coverage floor/diff and
#                                the testcontainers-backed integration suite).
#
# merge_group is inert until the merge queue is enabled on gibson (slice S3,
# .github#202) -- wiring it now is intentionally a no-op until then.
#
# gibson's own `make lint` (golangci-lint built from source, pinned to
# GOLANGCI_LINT_VERSION in the Makefile) is kept as a separate job instead of
# delegating to the reusable's built-in golangci-lint-action step: the
# reusable pins golangci-lint-action to a fixed version (v2.0.2) which can
# silently diverge from the repo's Makefile-pinned version and its embedded Go
# version can trail go.mod's toolchain target -- exactly the "v2 trap" gibson
# was already bitten by once (sdk#355/adk#154, see lint.yml history). Passing
# `skip-lint: true` avoids double-running golangci-lint under two different
# pins.
#
# Slice S4 (gibson#1129) update: build.yaml's embedded `test` job (matrix over
# setec_integration/empty build tags, `go vet` + `go test -race` on every
# `pull_request`) has been REMOVED now that build.yaml itself is deleted (image
# build collapsed into .github/workflows/gibson-images.yml, push:main only).
# Its two halves now live here, both merge_group-only:
#   - `go test -race` per build-tag variant: already covered by the `heavy`
#     job below (added in S2, matrix over build_tags).
#   - `go vet` per build-tag variant: added as the `vet-tags` job below (S2's
#     `heavy` only vets the untagged default via the reusable's fast tier on
#     pull_request; the reusable's heavy tier does not vet at all).
# Known residual gap: unlike build.yaml's old `test` job, neither `heavy` nor
# `vet-tags` provisions a Redis service container or envtest binaries, so
# Redis-backed suites (e.g. internal/engine/state) self-skip under both
# build-tag variants here (they fail-open to a clean skip by design, see
# internal/engine/state/main_test.go) rather than actually exercising Redis.
# Real Redis/envtest execution for the untagged variant still happens via the
# `coverage` job (has a Redis service + envtest) and via `integration`
# (-tags integration, envtest); nothing currently exercises Redis/envtest
# under -tags setec_integration specifically. Flagged, not fixed, by this slice.
#
# NOT migrated here (explicitly out of scope for this slice):
#   - gibsoncheck.yml (custom analyzer + authz-registry drift gate) and
#     fga-smoke-test.yml -- neither is a generic go build/test/lint/coverage
#     suite and both are required status checks; left untouched.
#   - CodeQL / Trivy scanner cadence -- separate scanner-cadence slice.

on:
  # No `paths:` filter here (Epic: cicd-efficiency, board #44, slice S3,
  # .github#202). A `paths:`-filtered `pull_request` trigger produces ZERO
  # check runs on non-matching PRs (e.g. docs-only) -- the workflow never
  # fires at all, so its required contexts are simply absent and merge-queue
  # entry freezes for that PR. Every PR must get a real-or-skipped check run
  # for every required context. Cost control for docs-only PRs is handled
  # in-workflow instead, by the native `changes` job gating the `fast` tier.
  pull_request:
  merge_group:

concurrency:
  group: go-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---- change detection (pull_request only): keeps docs-only PRs cheap ----
  # Native job, not a reusable caller, so it always reports a stable
  # `changes` check-run name whether or not the diff touches Go. Now that the
  # workflow-level `paths:` filter is gone, this is what keeps the `fast`
  # tier from actually building/testing on PRs that don't touch Go.
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - id: filter
        name: Detect Go-relevant changes
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          git fetch --no-tags origin "${BASE}" "${HEAD}" 2>/dev/null || true
          CHANGED="$(git diff --name-only "${BASE}" "${HEAD}")"
          echo "Changed files:"
          echo "${CHANGED}"
          if echo "${CHANGED}" | grep -Eq '\.go$|(^|/)go\.mod$|(^|/)go\.sum$|^\.github/workflows/'; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi

  # ---- fast tier (pull_request): reusable vet/build/test + mod-tidy drift ----
  fast:
    needs: changes
    if: needs.changes.outputs.go == 'true'
    uses: zeroroot-ai/.github/.github/workflows/reusable-go-ci.yml@v2
    with:
      tier: fast
      private-modules: true
      skip-lint: true # gibson runs its own pinned golangci-lint below (make lint)
    secrets:
      gh-pat: ${{ secrets.GH_PAT_GIBSON_RO }}

  # ---- heavy tier (merge_group): reusable race + govulncheck ----
  # Matrix mirrors the setec_integration/empty build-tag variants the daemon
  # ships (formerly build.yaml's `test` job, now deleted -- S4, gibson#1129)
  # so the authoritative gate exercises both configurations.
  heavy:
    if: github.event_name == 'merge_group'
    strategy:
      fail-fast: false
      matrix:
        build_tags: ["", "setec_integration"]
    uses: zeroroot-ai/.github/.github/workflows/reusable-go-ci.yml@v2
    with:
      tier: heavy
      private-modules: true
      build-tags: ${{ matrix.build_tags }}
    secrets:
      gh-pat: ${{ secrets.GH_PAT_GIBSON_RO }}

  # ---- go vet across build-tag variants (merge_group) ----
  # S4 (gibson#1129): build.yaml's deleted `test` job also ran `go vet` per
  # build-tag variant; the reusable's heavy tier only runs `go test -race` +
  # govulncheck (no vet), and its fast tier only vets the untagged default on
  # pull_request. Kept native and separate from `heavy` (rather than folded
  # into the reusable) because vet is pure static analysis -- no services, no
  # Docker, cheap enough to not need the reusable's machinery.
  vet-tags:
    if: github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_tags: ["", "setec_integration"]
    env:
      GOPRIVATE: github.com/zeroroot-ai/*
      GONOSUMDB: github.com/zeroroot-ai/*
    steps:
      - uses: actions/checkout@v7
      - name: Configure git for private modules
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.GH_PAT_GIBSON_RO }}@github.com/".insteadOf \
            "https://github.com/"
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go vet ${{ matrix.build_tags && format('-tags={0}', matrix.build_tags) || '' }} ./...

  # ---- gibson-specific lint (fast tier / pull_request) ----
  # Kept native (not delegated to the reusable's golangci-lint step) so the
  # Makefile-pinned golangci-lint version and toolchain stay the single
  # source of truth. Includes the deadcode gate and the extra pagination /
  # allowed-identities / FGA-header script gates make lint already runs.
  lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: github.com/zeroroot-ai/*
      GONOSUMDB: github.com/zeroroot-ai/*
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # merge-base needs full history

      - name: Configure git for private modules
        if: github.event.pull_request.head.repo.fork != true
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.GH_PAT_GIBSON_RO }}@github.com/".insteadOf \
            "https://github.com/"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Lint (blocking, new-from-merge-base)
        run: make lint LINT_BASE=origin/${{ github.base_ref || 'main' }}

      - name: Dead-code gate (blocking, baselined)
        run: make lint-deadcode

  # ---- gibson-specific coverage gates (heavy tier / merge_group) ----
  # Design intent (CICD-CONTEXT.md decision 8): coverage is part of the
  # merge_group-only authoritative suite, not a per-PR gate.
  coverage:
    if: github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    name: coverage gates (floor + diff)
    services:
      redis:
        image: redis/redis-stack-server:7.4.0-v1
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      GOPRIVATE: github.com/zeroroot-ai/*
      GONOSUMDB: github.com/zeroroot-ai/*
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure git for private modules
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.GH_PAT_GIBSON_RO }}@github.com/".insteadOf \
            "https://github.com/"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Fetch base branch
        run: git fetch --no-tags origin "${{ github.base_ref || 'main' }}"

      - name: Set up envtest binaries
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
          ENVTEST_K8S_VERSION="$(go list -m -f '{{.Version}}' k8s.io/api | sed -E 's/^v0\.([0-9]+)\..*/1.\1/')"
          echo "Using envtest k8s version ${ENVTEST_K8S_VERSION}"
          ASSETS="$(setup-envtest use "${ENVTEST_K8S_VERSION}" -p path)"
          echo "KUBEBUILDER_ASSETS=${ASSETS}" >> "$GITHUB_ENV"

      - name: Generate coverage profile
        run: make coverage-profile

      - name: Absolute coverage floor (ratchet toward 80%)
        run: make check-coverage-floor

      - name: Diff coverage (>=85% of changed lines)
        run: make check-diff-coverage DIFF_COVERAGE_BASE=origin/${{ github.base_ref || 'main' }}

  # ---- critical-path manifest guard (fast tier / pull_request) ----
  # Pure-unit, no Docker; cheap enough to run on every PR so the integration
  # suite below can never silently lose a named Tier-3 path.
  critical-paths:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: critical-path manifest guard
    env:
      GOPRIVATE: github.com/zeroroot-ai/*
      GONOSUMDB: github.com/zeroroot-ai/*
    steps:
      - uses: actions/checkout@v7
      - name: Configure git for private modules
        if: github.event.pull_request.head.repo.fork != true
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.GH_PAT_GIBSON_RO }}@github.com/".insteadOf \
            "https://github.com/"
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Guard named critical-path tests
        run: make check-critical-paths

  # ---- container-backed integration suite (heavy tier / merge_group) ----
  integration:
    if: github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    name: integration suite (testcontainers + envtest)
    env:
      GOPRIVATE: github.com/zeroroot-ai/*
      GONOSUMDB: github.com/zeroroot-ai/*
    steps:
      - uses: actions/checkout@v7

      - name: Configure git for private modules
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.GH_PAT_GIBSON_RO }}@github.com/".insteadOf \
            "https://github.com/"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up envtest binaries
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
          ENVTEST_K8S_VERSION="$(go list -m -f '{{.Version}}' k8s.io/api | sed -E 's/^v0\.([0-9]+)\..*/1.\1/')"
          echo "Using envtest k8s version ${ENVTEST_K8S_VERSION}"
          ASSETS="$(setup-envtest use "${ENVTEST_K8S_VERSION}" -p path)"
          echo "KUBEBUILDER_ASSETS=${ASSETS}" >> "$GITHUB_ENV"

      - name: Run integration lane
        run: make test-integration

  # ---- native aggregator: THE required context for the whole heavy suite ----
  # Epic: cicd-efficiency (board #44), slice S3 (.github#202). A caller job
  # that invokes a reusable workflow reports as `<caller-job>` when skipped
  # but `<caller-job> / <reusable-job>` when it runs -- no single context
  # string matches both, so `heavy` itself can't be a merge-queue required
  # context. This job is native (no reusable call) so its check-run name is
  # `queue-gate` in both the pull_request (needed jobs self-skip via their
  # own event-gated `if:`, which counts as pass) and merge_group (needed jobs
  # actually run) cases.
  queue-gate:
    name: queue-gate
    if: always()
    needs: [heavy, vet-tags, coverage, integration]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate heavy-suite results
        run: |
          failed=0
          declare -A results
          results[heavy]="${{ needs.heavy.result }}"
          results[vet-tags]="${{ needs.vet-tags.result }}"
          results[coverage]="${{ needs.coverage.result }}"
          results[integration]="${{ needs.integration.result }}"
          for job in "${!results[@]}"; do
            r="${results[$job]}"
            echo "${job}: ${r}"
            if [[ "${r}" == "failure" || "${r}" == "cancelled" ]]; then
              failed=1
            fi
          done
          if [[ "${failed}" -eq 1 ]]; then
            echo "One or more heavy-suite jobs failed or was cancelled."
            exit 1
          fi
          echo "All heavy-suite jobs passed or were skipped (skipped counts as pass)."
