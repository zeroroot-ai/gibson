# E10 / gibson#999 — setec execution round-trip (E3), migrated onto ephemeral
# ARC runners driving the ALREADY-DEPLOYED staging setec (Epic:
# cicd-efficiency, board #44 / zeroroot-ai/deploy#1067 / ADR-0060).
#
# Proves the untrusted-execution-isolation boundary (ADR-0010) end-to-end: an
# UNTRUSTED tool dispatched through the harness executes ONLY via a real setec
# microVM round-trip, and is denied (typed error, no in-process fallback) when
# no sandboxed dispatch is available under GIBSON_UNTRUSTED_EXEC=setec-only.
#
# OLD model: self-hosted `setec-bare-metal` runner with local /dev/kvm,
# dialing a NodePort on the same host (SETEC_ROUNDTRIP_ADDR=127.0.0.1:30051).
# NEW model: `runs-on: staging-ephemeral` — a normal ARC pod inside staging
# EKS, no /dev/kvm on the runner itself. It dials the setec frontend's
# in-cluster ClusterIP Service directly (setec-frontend.setec-system.svc,
# port 50051 — the chart's frontend.servicePort default) and fetches its mTLS
# client cert from a K8s Secret via the namespaced RBAC grant in gitops
# envs/staging/manifests/arc-runners/rbac.yaml, instead of a PKI directory
# baked into the runner host (SETEC_PKI_DIR is retired).
#
# The Go test itself (internal/engine/harness/setec_roundtrip_setec_test.go,
# -tags setec_integration) is UNCHANGED — it already self-skips unless
# SETEC_ROUNDTRIP_ADDR is set and already defaults serverName to
# setec-frontend.setec-system.svc, so this migration is a CI-plumbing change,
# not a test-code change. Full assertion parity is preserved (this workflow
# drives the real production dispatch chain, unlike setec's own e2e.yml —
# see that file's parity-gap note for why the two jobs are not symmetric).
#
# ⚠ PREREQUISITE GAP: staging's gitops overlay currently ships
# `setec.enabled: false` (deploy repo envs/staging/values.yaml) — setec is
# not deployed to staging yet. This job's "staging setec healthy" assertion
# will fail until that is flipped on (tracked follow-up, filed alongside this
# PR, same as setec's e2e.yml).
#
# Triggers: `merge_group` (trusted context only — fork PRs never reach the
# in-cluster runner) + manual `workflow_dispatch`. The `e2e-setec` PR-label
# opt-in model is retired along with the runner it depended on.

name: e2e-setec-roundtrip

on:
  merge_group:
  workflow_dispatch: {}

permissions:
  contents: read

env:
  GOPRIVATE: github.com/zeroroot-ai/*
  GONOSUMDB: github.com/zeroroot-ai/*

jobs:
  roundtrip:
    runs-on: staging-ephemeral
    timeout-minutes: 30
    env:
      SETEC_NAMESPACE: setec-system
      SETEC_FRONTEND_CERT_SECRET: setec-frontend-client-tls
    steps:
      - uses: actions/checkout@v4

      - name: Configure git for private modules
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.GH_PAT_GIBSON_RO }}@github.com/".insteadOf \
            "https://github.com/"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify kubectl can reach the cluster with the expected RBAC
        run: |
          kubectl version --client=true
          kubectl auth can-i get pods -n "${SETEC_NAMESPACE}" || {
            echo "::error::arc-runner-sa lacks the expected setec-system RBAC — check gitops envs/staging/manifests/arc-runners/rbac.yaml"
            exit 1
          }

      - name: Assert staging setec operator + frontend are deployed and healthy
        run: |
          set -euo pipefail
          if ! kubectl get deploy -n "${SETEC_NAMESPACE}" -l app.kubernetes.io/name=setec >/dev/null 2>&1; then
            echo "::error::no setec Deployment found in ${SETEC_NAMESPACE} — staging's setec is not deployed yet (envs/staging/values.yaml setec.enabled must be true; see the tracked follow-up)."
            exit 1
          fi
          kubectl rollout status deploy -n "${SETEC_NAMESPACE}" -l app.kubernetes.io/name=setec --timeout=120s
          kubectl get svc -n "${SETEC_NAMESPACE}" setec-frontend >/dev/null

      # gibson-executor is the marker-emitting tool runner the sandbox
      # launches. Published to ghcr already — no local build/import needed
      # now that the microVM runs in a real cluster with registry pull
      # access (the old k3s-containerd-import dance is retired).
      - name: Ensure a kata-qemu SandboxClass exists (throwaway, this run only)
        # SandboxClass is CLUSTER-scoped (setec api/v1alpha1/
        # sandboxclass_types.go: +kubebuilder:resource:scope=Cluster) — no
        # namespace field. kata-fc's dev-loopback devmapper snapshotter is
        # flaky under load (setec#86); kata-qemu is the reliable round-trip
        # backend.
        run: |
          set -euo pipefail
          cat <<EOF | kubectl apply -f -
          apiVersion: setec.zeroroot.ai/v1alpha1
          kind: SandboxClass
          metadata:
            name: gibson-roundtrip-qemu-${{ github.run_id }}
          spec:
            vmm: qemu
            runtime:
              backend: kata-qemu
            maxResources:
              vcpu: 2
              memory: 1Gi
          EOF

      - name: Fetch the frontend's mTLS client cert from the in-cluster Secret
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/setec-pki"
          for key in tls.crt tls.key ca.crt; do
            out="${RUNNER_TEMP}/setec-pki/${key}"
            if ! kubectl get secret -n "${SETEC_NAMESPACE}" "${SETEC_FRONTEND_CERT_SECRET}" \
                 -o jsonpath="{.data.${key}}" | base64 -d > "${out}" 2>/dev/null || [ ! -s "${out}" ]; then
              echo "::error::could not read key '${key}' from Secret ${SETEC_FRONTEND_CERT_SECRET} in ${SETEC_NAMESPACE} — verify the Secret name/keys match gitops envs/staging/manifests/arc-runners/rbac.yaml's resourceNames (placeholder pending setec-enablement in staging)"
              exit 1
            fi
          done
          echo "SETEC_PKI_DIR=${RUNNER_TEMP}/setec-pki" >> "$GITHUB_ENV"

      - name: Run setec round-trip suite
        env:
          SETEC_ROUNDTRIP_ADDR: ${{ vars.SETEC_ROUNDTRIP_ADDR || 'setec-frontend.setec-system.svc:50051' }}
          SETEC_ROUNDTRIP_SERVER_NAME: ${{ vars.SETEC_ROUNDTRIP_SERVER_NAME || 'setec-frontend.setec-system.svc' }}
          GIBSON_EXECUTOR_IMAGE: ${{ vars.GIBSON_EXECUTOR_IMAGE || 'ghcr.io/zeroroot-ai/gibson-executor:main' }}
          GIBSON_ROUNDTRIP_SANDBOX_CLASS: gibson-roundtrip-qemu-${{ github.run_id }}
          GIBSON_ROUNDTRIP_MEMORY: 512Mi
        run: |
          set -euo pipefail
          export SETEC_ROUNDTRIP_CERT="${SETEC_PKI_DIR}/tls.crt"
          export SETEC_ROUNDTRIP_KEY="${SETEC_PKI_DIR}/tls.key"
          export SETEC_ROUNDTRIP_CA="${SETEC_PKI_DIR}/ca.crt"
          make test-setec-roundtrip

      - name: Cleanup throwaway SandboxClass (always)
        if: always()
        run: |
          kubectl delete sandboxclass "gibson-roundtrip-qemu-${{ github.run_id }}" --ignore-not-found --wait=false

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          mkdir -p e2e-artifacts
          kubectl get nodes -o wide                              > e2e-artifacts/nodes.txt       2>&1 || true
          kubectl get sandboxes -n "${SETEC_NAMESPACE}" -o yaml   > e2e-artifacts/sandboxes.yaml  2>&1 || true
          kubectl get pods -n "${SETEC_NAMESPACE}" -o wide        > e2e-artifacts/pods.txt        2>&1 || true
          kubectl get events -n "${SETEC_NAMESPACE}" --sort-by=.lastTimestamp \
                                                                   > e2e-artifacts/events.txt      2>&1 || true

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-diagnostics-${{ github.run_id }}
          path: e2e-artifacts/
          if-no-files-found: ignore
