name: lint

# BLOCKING lint + dead-code gates (gibson#778, RESTRUCTURE-QUALITY-BARS §3).
# No `|| true` swallow. golangci-lint is pinned (Makefile GOLANGCI_LINT_VERSION)
# and built from source with the repo's own Go toolchain so its embedded Go
# version is never below go.mod's 1.26.4 target (the v2 trap — sdk#355/adk#154).
#
# Two gates:
#   - golangci-lint (incl. `unused` + `depguard` import boundaries), diff-scoped
#     via --new-from-merge-base: only NEW violations fail a PR. The pre-existing
#     style/unused backlog is baselined (burndown: gibson#918).
#   - whole-program deadcode (x/tools), baselined in .deadcode-baseline: NEW
#     unreachable code fails.

on:
  push:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - '.golangci.yml'
      - '.deadcode-baseline'
      - 'scripts/check-deadcode.sh'
      - 'scripts/lint-*.mjs'
      - 'Makefile'
      - '.github/workflows/lint.yml'
  pull_request:
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - '.golangci.yml'
      - '.deadcode-baseline'
      - 'scripts/check-deadcode.sh'
      - 'scripts/lint-*.mjs'
      - 'Makefile'
      - '.github/workflows/lint.yml'

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      # Skip the public proxy/checksum DB for private zeroroot-ai modules; must
      # be set before setup-go (which may invoke go mod download).
      GOPRIVATE: github.com/zeroroot-ai/*
      GONOSUMDB: github.com/zeroroot-ai/*
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # merge-base needs full history

      # Configure git credentials BEFORE setup-go so private module download
      # works (same pattern as build.yaml / gibsoncheck.yml).
      - name: Configure git for private modules
        if: github.event.pull_request.head.repo.fork != true
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.GH_PAT_GIBSON_RO }}@github.com/".insteadOf \
            "https://github.com/"

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Blocking golangci-lint gate. `make lint` builds the pinned golangci-lint
      # from source and runs it --new-from-merge-base (same invocation locally
      # and in CI). On a PR the base is the target branch; on a push to main it
      # falls back to origin/main.
      - name: Lint (blocking, new-from-merge-base)
        run: make lint LINT_BASE=origin/${{ github.base_ref || 'main' }}

      # Blocking whole-program dead-code gate (baselined).
      - name: Dead-code gate (blocking, baselined)
        run: make lint-deadcode
