# dispatch-auth-e2e.yml — fires the deploy repo's auth-e2e workflow on PR.
#
# Renamed from dispatch-signup-e2e.yml (login-e2e-tdd Task 9).
# When a PR modifies any auth-chain file in core/gibson, this workflow fires a
# repository_dispatch event to zero-day-ai/deploy, passing the PR's commit SHA.
# The deploy repo's auth-e2e workflow then boots a fresh Kind cluster, deploys
# the full stack at this repo's SHA, and runs both signup and login full-chain
# regressions.
#
# Requirements: R5.1, R5.3.
# This workflow file is CODEOWNERS-protected — changes require platform-architecture approval.
name: Dispatch auth-e2e

on:
  pull_request:
    paths:
      - "internal/identity/**"
      - "internal/auth/**"
      - "internal/authz/**"
      - "internal/agentauth/**"
      - "internal/daemon/grpc.go"
      - "internal/daemon/api/**"
      - "tests/e2e/**"
      - ".github/workflows/dispatch-auth-e2e.yml"

jobs:
  dispatch:
    name: Trigger auth-e2e in deploy repo
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check dispatch token availability
        id: token
        # Forks + PRs from external collaborators do NOT receive the
        # org-level SIGNUP_E2E_DISPATCH_TOKEN secret. The previous shape
        # (no precheck, hand the empty string straight to
        # actions/github-script) failed fast with "Input required and
        # not supplied: github-token" on every PR until someone audited.
        # Detect the missing case here, emit a notice, and skip — the
        # next required check (the per-PR unit-test workflow) still
        # gates merges. Once the secret is provisioned at the org level
        # the dispatch step fires unchanged. Issue: gibson#119.
        env:
          DISPATCH_TOKEN: ${{ secrets.SIGNUP_E2E_DISPATCH_TOKEN }}
        run: |
          if [ -z "$DISPATCH_TOKEN" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SIGNUP_E2E_DISPATCH_TOKEN is not configured for this build. Skipping cross-repo dispatch to zero-day-ai/deploy — the deploy repo's auth-e2e workflow will not fire for this PR. To enable, set the org-level secret with repo dispatch permissions on zero-day-ai/deploy."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch auth-e2e to deploy repo
        if: steps.token.outputs.available == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.SIGNUP_E2E_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'zero-day-ai',
              repo: 'deploy',
              event_type: 'auth-e2e-trigger',
              client_payload: {
                gibson_ref: context.payload.pull_request.head.sha,
                sdk_ref: 'main',
                dashboard_ref: 'main',
                extauthz_ref: 'main',
                operator_ref: 'main',
                source_repo: 'gibson',
                source_pr: context.payload.pull_request.number,
              },
            });
            console.log(`Dispatched auth-e2e for PR #${context.payload.pull_request.number} @ ${context.payload.pull_request.head.sha}`);
