# dashboard-routes.yaml — Route manifest for the dashboard-smoke-e2e-tdd suite.
#
# Source of truth per R4.1: every dashboard page.tsx and route.ts is enumerated
# here. Adding a new route to the dashboard without a matching entry here fails
# the `make test-route-manifest-drift` CI guard.
#
# Schema per design Component 2:
#   path              — URL path (use {slug} for tenant slug placeholder, {id} for ID params)
#   kind              — "page" | "action" | "api"
#   method            — HTTP method (default: GET)
#   auth              — "required" | "public"
#   landmark          — CSS selector or text fragment to assert visible (for kind=page)
#   shape_schema      — path to Zod schema for JSON routes (null if none exists yet)
#   upstream_rpc      — gRPC RPC name backing this route (for drift guard)
#   perf_budget_ms    — per-route load time budget (default 3000ms)
#   excluded          — true if intentionally excluded from active smoke testing
#   excluded_reason   — why it's excluded (required if excluded: true)
#   excluded_tracking_issue — tracking issue URL (required if excluded: true)
#
# CODEOWNERS: this file requires @platform-architecture approval to modify.
# Any new dashboard route MUST be added here in the same PR that adds the route.

routes:

