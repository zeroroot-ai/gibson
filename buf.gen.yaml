version: v2
managed:
  enabled: true
  disable:
    - file_option: go_package
plugins:
  - local: protoc-gen-go
    out: .
    opt:
      - module=github.com/zeroroot-ai/gibson
  - local: protoc-gen-go-grpc
    out: .
    opt:
      - module=github.com/zeroroot-ai/gibson
inputs:
  - directory: internal/server/daemon/api
