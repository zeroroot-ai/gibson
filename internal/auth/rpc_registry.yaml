    relation: admin
    description: Register a new agent and host pair with FGA-resolved capability grants (admin only)
  - method: /gibson.daemon.admin.v1.DaemonAdminService/ExecuteAgentCapability
    relation: member
    description: Execute a capability on behalf of an agent (FGA-checked per-capability)
  - method: /gibson.daemon.admin.v1.DaemonAdminService/ListAgentCapabilities
    relation: member
    description: List FGA-resolved capabilities available to a user
  - method: /gibson.daemon.admin.v1.DaemonAdminService/GetAgentAuthStatus
    relation: member
    description: Get the current status and grants for an agent
  - method: /gibson.daemon.admin.v1.DaemonAdminService/RevokeAgentAuth
    relation: admin
    description: Revoke an agent and all its capability grants (admin only)
  - method: /gibson.daemon.admin.v1.DaemonAdminService/ListAgentAuthAgents
    relation: admin
    description: List registered agents for a tenant (admin only)
  - method: /gibson.daemon.admin.v1.DaemonAdminService/CreateHostRegistrationToken
    relation: admin
    description: Issue a single-use host registration API key (admin only)
  - method: /gibson.daemon.admin.v1.DaemonAdminService/ListComponentGrants
    relation: admin
    description: Enumerate FGA component grants for all users in a tenant (admin only)
  - method: /gibson.daemon.admin.v1.DaemonAdminService/BatchGrantComponentAccessV2
    relation: admin
    description: Bulk grant or revoke component access for any principal (admin only)

  # Entitlement admin RPCs (agent-authoring-and-tenant-entitlements spec).
  - method: /gibson.daemon.admin.v1.DaemonAdminService/WriteAccessTuples
    relation: admin
    description: "Entitlement admin RPC: WriteAccessTuples"
  - method: /gibson.daemon.admin.v1.DaemonAdminService/UpsertTenantQuota
    relation: admin
    description: "Entitlement admin RPC: UpsertTenantQuota"
  - method: /gibson.daemon.admin.v1.DaemonAdminService/ListFeatureTuples
    relation: admin
    description: "Entitlement admin RPC: ListFeatureTuples"
  - method: /gibson.daemon.admin.v1.DaemonAdminService/SeedCatalogTenantEnabled
    relation: admin
    description: "Entitlement admin RPC: SeedCatalogTenantEnabled"

