    relation: admin
    description: Store a new LLM provider config (admin only)
  - method: /gibson.daemon.admin.v1.DaemonAdminService/UpdateProvider
    relation: admin
    description: Update a stored LLM provider config (admin only)
  - method: /gibson.daemon.admin.v1.DaemonAdminService/DeleteProvider
    relation: admin
    description: Delete a stored LLM provider config (admin only)
  - method: /gibson.daemon.admin.v1.DaemonAdminService/TestProvider
    relation: admin
    description: Validate a proposed LLM provider config without persisting (admin only)
  - method: /gibson.daemon.admin.v1.DaemonAdminService/ExecuteLLM
    relation: member
    description: Execute a one-shot LLM completion through a tenant-configured provider (member)
  - method: /gibson.daemon.admin.v1.DaemonAdminService/StreamLLM
    relation: member
    description: Stream an LLM completion through a tenant-configured provider (member)
  - method: /gibson.daemon.admin.v1.DaemonAdminService/SetDefaultProvider
    relation: admin
    description: Set the tenant's default LLM provider (admin only)
  - method: /gibson.daemon.admin.v1.DaemonAdminService/SetFallbackChain
    relation: admin
    description: Set the tenant's LLM provider fallback chain (admin only)

