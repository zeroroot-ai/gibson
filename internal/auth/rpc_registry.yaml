  - method: /gibson.daemon.admin.v1.DaemonAdminService/RevokeUserSessions
    relation: admin
    description: Revoke all active sessions for a user (admin only)
  - method: /gibson.daemon.admin.v1.DaemonAdminService/SuspendMember
    relation: admin
    description: Suspend a tenant member account (admin only)
  - method: /gibson.daemon.admin.v1.DaemonAdminService/GetUserSessions
    relation: member
    description: Get active sessions for a user (self or admin)

  # Mission drafts / findings export.
  - method: /gibson.daemon.admin.v1.DaemonAdminService/SaveMissionDraft
    relation: member
    description: Save a mission YAML draft for a tenant
  - method: /gibson.daemon.admin.v1.DaemonAdminService/ListMissionDrafts
    relation: member
    description: List saved mission YAML drafts for a tenant
  - method: /gibson.daemon.admin.v1.DaemonAdminService/ExportFindings
    relation: member
    description: Export findings for a tenant in multiple formats

  # Quotas.
  - method: /gibson.daemon.admin.v1.DaemonAdminService/GetTenantQuota
    relation: admin
    description: Get tenant quota configuration (admin only)
  - method: /gibson.daemon.admin.v1.DaemonAdminService/SetTenantQuota
    relation: admin
    description: Set tenant quota configuration (admin only)

  # Alerts.
  - method: /gibson.daemon.admin.v1.DaemonAdminService/ListAlerts
    relation: member
    description: List platform alerts for a tenant user
  - method: /gibson.daemon.admin.v1.DaemonAdminService/MarkAlertRead
    relation: member
    description: Mark a single alert as read
  - method: /gibson.daemon.admin.v1.DaemonAdminService/MarkAllAlertsRead
    relation: member
    description: Mark all alerts for a user as read

  # Chat conversations.
  - method: /gibson.daemon.admin.v1.DaemonAdminService/ListConversations
    relation: member
    description: List chat conversations for a tenant user
  - method: /gibson.daemon.admin.v1.DaemonAdminService/GetConversation
    relation: member
    description: Get a chat conversation with its message history

  # Agent Auth Protocol.
