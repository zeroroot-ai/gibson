  # ===========================================================================

  # Read-only provider queries — tenant member.
  - method: /gibson.daemon.admin.v1.DaemonAdminService/ListProviders
    relation: member
    description: List tenant-configured LLM providers (credentials masked)
  - method: /gibson.daemon.admin.v1.DaemonAdminService/GetProvider
