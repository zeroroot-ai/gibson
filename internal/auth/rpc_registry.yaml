# rpc_registry.yaml — canonical FGA authz mapping for every daemon gRPC method.
#
# This file is the SOURCE OF TRUTH for daemon authorization. It is embedded in
# the binary at build time via //go:embed (rpc_registry_embed.go) and loaded
# at startup by auth.LoadRegistry. The CI drift gate
# (registry_drift_test.go, build tag `audit`) asserts every registered RPC
# has an entry here and rejects any stale entry; default-deny means a missing
# entry blocks the RPC at runtime.
#
# Operators may override this file at runtime via the env var
# GIBSON_AUTHZ_RPC_REGISTRY_PATH (Helm wires this from
# `gibson.authz.rpcRegistry.override`). An invalid override fails boot
# loudly — there is no silent fallback. See enterprise/docs/AUTH.md §4.5.
#
# Schema:
#   - method:           required, gRPC FullMethod string ("/pkg.Service/Method")
#   - relation:         required unless unauthenticated=true; FGA relation
#   - object_from:      named resolver — see KnownObjectResolvers() in
#                       object_resolvers.go; today: tenant_from_context,
#                       system_tenant, component_system. Add a new resolver in
#                       Go FIRST (object_resolvers.go), then reference its
#                       name here.
#   - object:           literal "<type>:<id>" (mutually exclusive with object_from)
#   - unauthenticated:  bool; if true, relation/object/object_from MUST be empty
#   - description:      human-readable explanation (surfaced in audit events
#                       as PermissionRequired so existing dashboards stay informative)
#
# Entries WITHOUT object/object_from fall back to "tenant:" + tenant in
# context — the existing default for tenant-scoped RPCs.

version: 1

entries:
  # ===========================================================================
  # gibson.daemon.v1.DaemonService — primary client-facing API
  # ===========================================================================

  # Connect / Ping / GetMyPermissions — health/identity, no FGA gate.
  - method: /gibson.daemon.v1.DaemonService/Connect
    unauthenticated: true
    description: WebSocket connect to daemon
  - method: /gibson.daemon.v1.DaemonService/Ping
    unauthenticated: true
    description: Daemon liveness check
  - method: /gibson.daemon.v1.DaemonService/GetMyPermissions
    unauthenticated: true
    description: Get the caller's permissions summary for the current tenant

  # Status / Subscribe — tenant-scoped reads.
  - method: /gibson.daemon.v1.DaemonService/Status
    relation: member
    description: Get daemon status within caller's tenant
  - method: /gibson.daemon.v1.DaemonService/Subscribe
    relation: member
    description: Subscribe to daemon events within caller's tenant

  # Mission lifecycle (member).
  - method: /gibson.daemon.v1.DaemonService/RunMission
    relation: member
    description: Start a mission run within caller's tenant
  - method: /gibson.daemon.v1.DaemonService/StopMission
    relation: member
    description: Stop a running mission within caller's tenant
  - method: /gibson.daemon.v1.DaemonService/CreateMission
    relation: member
    description: Create a mission definition within caller's tenant
  - method: /gibson.daemon.v1.DaemonService/ListMissions
    relation: member
    description: List missions within caller's tenant
  - method: /gibson.daemon.v1.DaemonService/PauseMission
    relation: member
    description: Pause a mission within caller's tenant
  - method: /gibson.daemon.v1.DaemonService/ResumeMission
    relation: member
    description: Resume a paused mission within caller's tenant
  - method: /gibson.daemon.v1.DaemonService/GetMissionHistory
    relation: member
    description: Retrieve mission run history within caller's tenant
  - method: /gibson.daemon.v1.DaemonService/GetMissionCheckpoints
    relation: member
    description: Retrieve mission checkpoints within caller's tenant
  - method: /gibson.daemon.v1.DaemonService/ListMissionDefinitions
    relation: member
    description: List installed mission definitions within caller's tenant
  - method: /gibson.daemon.v1.DaemonService/CreateMissionDefinition
    relation: writer
    object_from: mission_definition_from_context
    description: Register a structured mission definition with the daemon (writer on tenant's mission_definition container; granted via tenant admin)

  # intelligence.v1.IntelligenceService — cross-mission analytics RPCs
  # (productionize-graph-intelligence Task 2). All five queries read aggregate
  # finding/technique/asset data scoped to caller's tenant; same `member`
  # relation as mission-data reads.
  - method: /intelligence.v1.IntelligenceService/GetRecurringVulnerabilities
    relation: member
    description: List vulnerabilities recurring across missions within caller's tenant
  - method: /intelligence.v1.IntelligenceService/GetRemediationMetrics
    relation: member
    description: Compute remediation metrics across missions within caller's tenant
  - method: /intelligence.v1.IntelligenceService/GetAssetRiskScore
    relation: member
    description: Compute asset risk scores from historical findings within caller's tenant
  - method: /intelligence.v1.IntelligenceService/GetAttackPatterns
    relation: member
    description: Identify successful attack-technique sequences within caller's tenant
  - method: /intelligence.v1.IntelligenceService/GetSimilarTargets
    relation: member
    description: Find targets similar to a reference within caller's tenant

  # Component listing (member).
  - method: /gibson.daemon.v1.DaemonService/ListAgents
    relation: member
    description: List agents visible to caller's tenant
  - method: /gibson.daemon.v1.DaemonService/GetAgentStatus
    relation: member
    description: Get agent status within caller's tenant
  - method: /gibson.daemon.v1.DaemonService/ListTools
    relation: member
    description: List tools visible to caller's tenant
  - method: /gibson.daemon.v1.DaemonService/ListPlugins
    relation: member
    description: List plugins visible to caller's tenant
  - method: /gibson.daemon.v1.DaemonService/QueryPlugin
    relation: member
    description: Query a plugin within caller's tenant
  - method: /gibson.daemon.v1.DaemonService/GetCapabilityManifest
    relation: member
    description: Fetch signed capability manifest for caller's tenant (admin role additionally required for impersonation, enforced in-handler)
  - method: /gibson.daemon.v1.DaemonService/WatchManifestInvalidations
    relation: member
    description: Stream manifest invalidation events for caller's tenant

  # Component lifecycle (admin).
  - method: /gibson.daemon.v1.DaemonService/StartComponent
    relation: admin
    description: Start a component within caller's tenant (admin only)
  - method: /gibson.daemon.v1.DaemonService/StopComponent
    relation: admin
    description: Stop a component within caller's tenant (admin only)
  - method: /gibson.daemon.v1.DaemonService/BuildComponent
    relation: admin
    description: Build a component image within caller's tenant (admin only)
  - method: /gibson.daemon.v1.DaemonService/ShowComponent
    relation: member
    description: Show component details within caller's tenant
  - method: /gibson.daemon.v1.DaemonService/GetComponentLogs
    relation: member
    description: Stream component logs within caller's tenant

  # ===========================================================================
  # gibson.daemon.admin.v1.DaemonAdminService — privileged admin API
  # ===========================================================================

  # Daemon control — platform operator, scoped to the system tenant.
  - method: /gibson.daemon.admin.v1.DaemonAdminService/Shutdown
    relation: platform_operator
    object: system_tenant:_system
    description: Graceful daemon shutdown (platform operator only)
  - method: /gibson.daemon.admin.v1.DaemonAdminService/ImpersonateTenant
    relation: platform_operator
    object: system_tenant:_system
    description: Request impersonation token for tenant (platform operator only)
  - method: /gibson.daemon.admin.v1.DaemonAdminService/RefreshToolCatalog
    relation: platform_operator
    object: system_tenant:_system
    description: Trigger immediate sandboxed-tool catalog refresh (platform operator only)
  - method: /gibson.daemon.admin.v1.DaemonAdminService/GetSupportedProviders
    relation: member
    description: List supported LLM provider types and their credential schemas

  # Observability — tenant Langfuse credentials.
  - method: /gibson.daemon.admin.v1.DaemonAdminService/GetTenantLangfuseCredentials
    relation: member
    description: Retrieve Langfuse credentials for tenant
  - method: /gibson.daemon.admin.v1.DaemonAdminService/SetTenantLangfuseCredentials
    relation: admin
    description: Store Langfuse credentials for tenant (admin only)
  - method: /gibson.daemon.admin.v1.DaemonAdminService/DeleteTenantLangfuseCredentials
    relation: admin
    description: Delete Langfuse credentials for tenant (admin only)

  # Onboarding.
  - method: /gibson.daemon.admin.v1.DaemonAdminService/GetOnboardingState
    relation: member
    description: Query onboarding progress for tenant
  - method: /gibson.daemon.admin.v1.DaemonAdminService/UpdateOnboardingState
    relation: admin
    description: Advance onboarding state for tenant (admin only)

  # API key management.
  - method: /gibson.daemon.admin.v1.DaemonAdminService/CreateAPIKey
    relation: admin
    description: Create API key within caller's tenant (admin only)
  - method: /gibson.daemon.admin.v1.DaemonAdminService/ListAPIKeys
    relation: member
    description: List API keys within caller's tenant
  - method: /gibson.daemon.admin.v1.DaemonAdminService/RevokeAPIKey
    relation: admin
    description: Revoke API key within caller's tenant (admin only)

