# Gibson Authorization Schema
#
# THIS FILE IS THE SOLE SOURCE OF TRUTH FOR ROLE-BASED ACCESS CONTROL IN THE
# GIBSON DAEMON. It defines every role, every permission, every role-to-
# permission grant, and every gRPC RPC's authorization requirement.
#
# Loaded at daemon startup by internal/auth/permissions_loader.go via go:embed.
# Validated: parse errors, undefined references, role inheritance cycles, and
# incomplete proto RPC coverage all cause the daemon to refuse to start.
#
# Consumed by:
#   - The daemon's RPCAuthzInterceptor (the single enforcement point)
#   - The daemon's GetAuthSchema RPC (the runtime discovery endpoint)
#   - The dashboard's src/lib/auth/schema.ts (fetched via GetAuthSchema, cached
#     with TTL, used for hasPermission/canCallRpc)
#
# To add a new RPC: add its entry to the rpcs: map below. If the daemon detects
# a proto RPC without an entry, it refuses to start with a clear error and the
# proto_coverage_test.go CI test catches it pre-merge.
#
# DO NOT hardcode role names or permission names anywhere else in the codebase.
# DO NOT add role checks to handlers — the interceptor handles all enforcement.

schema_version: "1"

# -----------------------------------------------------------------------------
# Roles
# -----------------------------------------------------------------------------
# Roles are the unit of grant. A user, service account, or component carries
# one or more role names in their Identity.Roles slice, and the interceptor
# resolves them transitively via the inherits: graph to decide whether a
# permission is held.
#
# The tenant-scoped hierarchy (viewer -> operator -> admin -> owner) preserves
# the additive semantics of the existing internal/membership/casbin_bootstrap.go
# exactly: each level adds only what it contributes beyond the level below.
#
# Cross-tenant roles (platform-operator, provisioner, tool/agent/plugin-
# executor) do not inherit from tenant roles — they grant specific cross-
# tenant permissions directly.
# -----------------------------------------------------------------------------

roles:
  - name: viewer
    description: Read-only access to missions, findings, graphrag, and memory within a tenant
    inherits: []
    cross_tenant: false
    permissions:
      - daemon:info
      - daemon:subscribe
      - missions:read
      - findings:read
      - graphrag:read
      - memory:read
      - memory:search
      - tools:read
      - agents:read
      - plugins:read
      - components:read
      - taxonomy:read
      - settings:read
      - tenant:read
      - tenants:self-read
      - team:read
      - credentials:read
      - invitations:self-accept

  - name: operator
    description: Run missions, execute tools, invoke LLMs, delegate to agents, write memory
    inherits: [viewer]
    cross_tenant: false
    permissions:
      - missions:execute
      - findings:write
      - findings:export
      - memory:write
      - llm:complete
      - tools:execute
      - agents:delegate
      - plugins:execute

  - name: admin
    description: Manage tenant team, components, API keys, settings, and write graphrag
    inherits: [operator]
    cross_tenant: false
    permissions:
      - team:manage
      - components:manage
      - missions:manage
      - apikeys:manage
      - settings:manage
      - graphrag:write
      - plugins:manage
      - tenant:update

  - name: owner
    description: Full tenant lifecycle including billing, deletion, and ownership transfer
    inherits: [admin]
    cross_tenant: false
    permissions:
      - billing:read
      - billing:write
      - tenant:delete
      - tenant:transfer-ownership

  - name: platform-operator
    description: Cross-tenant platform administration (tenants, billing, impersonation, shutdown)
    inherits: []
    cross_tenant: true
    permissions:
      - daemon:info
      - daemon:subscribe
      - daemon:shutdown
      - tenants:list-all
      - tenants:create
      - tenants:provision
      - tenants:provision-status
      - tenants:deprovision
      - tenants:impersonate
      - tenants:billing-read
      - tenants:billing-write
      - tenants:by-stripe
      - tenants:by-email
      - tenants:update-any
      - tenants:delete-any
      - tenants:member-read-any
      - tenants:member-write-any
      - tenants:settings-read-any
      - tenants:settings-write-any
      - tenants:self-read
      - missions:read
      - missions:execute
      - missions:manage
      - findings:read
      - findings:write
      - findings:export
      - graphrag:read
      - graphrag:write
      - memory:read
      - memory:write
      - memory:search
      - llm:complete
      - tools:read
      - tools:execute
      - agents:read
      - agents:delegate
      - plugins:read
      - plugins:execute
      - plugins:manage
      - components:read
      - components:register
      - components:manage
      - team:read
      - team:manage
      - apikeys:manage
      - settings:read
      - settings:manage
      - credentials:read
      - taxonomy:read
      - tenant:read
      - tenant:update
      - tenant:delete
      - tenant:transfer-ownership
      - billing:read
      - billing:write
      - invitations:self-accept

  - name: provisioner
    description: Service-account role for the dashboard signup flow and platform bootstrap. Narrowly scoped to tenant creation and lookup only — NOT a general platform operator.
    inherits: []
    cross_tenant: true
    permissions:
      - daemon:info
      - tenants:provision
      - tenants:provision-status
      - tenants:by-stripe
      - tenants:by-email
      - tenants:self-read
      - tenant:read

  - name: tool-executor
    description: Kubernetes ServiceAccount role for gibson-tool-* pods. Scoped to component registration, polling, tool execution, and graphrag writes.
    inherits: []
    cross_tenant: true
    permissions:
      - daemon:info
      - components:register
      - tools:read
      - tools:execute
      - graphrag:read
      - graphrag:write
      - findings:read
      - memory:read
      - memory:search
      - credentials:read
      - taxonomy:read

  - name: agent-executor
    description: Kubernetes ServiceAccount role for gibson-agent-* pods. Scoped to component registration, polling, LLM completions, tool delegation, memory access, and mission orchestration.
    inherits: []
    cross_tenant: true
    permissions:
      - daemon:info
      - components:register
      - tools:read
      - tools:execute
      - agents:read
      - agents:delegate
      - llm:complete
      - plugins:read
      - plugins:execute
      - memory:read
      - memory:write
      - memory:search
      - graphrag:read
      - graphrag:write
      - findings:read
      - findings:write
      - missions:read
      - missions:execute
      - credentials:read
      - taxonomy:read

  - name: plugin-executor
    description: Kubernetes ServiceAccount role for gibson-plugin-* pods. Narrowly scoped to component registration — plugins do not poll work or execute tools directly.
    inherits: []
    cross_tenant: true
    permissions:
      - daemon:info
      - components:register
      - credentials:read
      - taxonomy:read

# -----------------------------------------------------------------------------
# Permissions
# -----------------------------------------------------------------------------
# Permissions are the atomic unit of authorization. They follow the
# "resource:action" convention. Every RPC requires one or more permissions,
# and every role grants a specific set of permissions (either directly or
# transitively via inherits:).
# -----------------------------------------------------------------------------

permissions:
  # --- Daemon metadata and control ---
  - name: daemon:info
    resource: daemon
    action: info
    description: Read daemon status, version, uptime, and health (Connect, Ping, Status)

  - name: daemon:subscribe
    resource: daemon
    action: subscribe
    description: Subscribe to the daemon event stream for real-time TUI updates

  - name: daemon:shutdown
    resource: daemon
    action: shutdown
    description: Gracefully shut down the daemon (local operators only)

  # --- Missions ---
  - name: missions:read
    resource: missions
    action: read
    description: Read mission definitions, runs, history, checkpoints, and status

  - name: missions:execute
    resource: missions
    action: execute
    description: Create, start, pause, resume, stop, and cancel missions

  - name: missions:manage
    resource: missions
    action: manage
    description: Install, uninstall, update, and resolve dependencies for mission definitions from Git

  # --- Findings ---
  - name: findings:read
    resource: findings
    action: read
    description: Read findings, query similar findings, and query related findings

  - name: findings:write
    resource: findings
    action: write
    description: Submit new findings

  - name: findings:export
    resource: findings
    action: export
    description: Export findings outside the platform

  # --- GraphRAG ---
  - name: graphrag:read
    resource: graphrag
    action: read
    description: Query GraphRAG nodes, attack chains, and similar attacks

  - name: graphrag:write
    resource: graphrag
    action: write
    description: Store nodes and edges in GraphRAG

  # --- Memory ---
  - name: memory:read
    resource: memory
    action: read
    description: Read from working, mission, and long-term memory

  - name: memory:write
    resource: memory
    action: write
    description: Write, delete, or clear entries in memory tiers

  - name: memory:search
    resource: memory
    action: search
    description: Semantic search across memory tiers

  # --- LLM ---
  - name: llm:complete
    resource: llm
    action: complete
    description: Invoke LLM completions (unary, streaming, with tools, structured)

  # --- Tools ---
  - name: tools:read
    resource: tools
    action: read
    description: List tools and their descriptors

  - name: tools:execute
    resource: tools
    action: execute
    description: Execute tools (unary, streaming, batched)

  # --- Agents ---
  - name: agents:read
    resource: agents
    action: read
    description: List agents and query agent status

  - name: agents:delegate
    resource: agents
    action: delegate
    description: Delegate work to sub-agents

  # --- Plugins ---
  - name: plugins:read
    resource: plugins
    action: read
    description: List plugins, view plugin config, test plugin connections

  - name: plugins:execute
    resource: plugins
    action: execute
    description: Execute plugin methods via QueryPlugin

  - name: plugins:manage
    resource: plugins
    action: manage
    description: Enable, disable, and configure plugins per tenant

  # --- Components (tools/agents/plugins registration + lifecycle) ---
  - name: components:register
    resource: components
    action: register
    description: Register a component, heartbeat, poll for work, submit results (used by K8s SA roles)

  - name: components:read
    resource: components
    action: read
    description: List and inspect components and their logs

  - name: components:manage
    resource: components
    action: manage
    description: Install, start, stop, update, build, and uninstall components

  # --- Team ---
  - name: team:read
    resource: team
    action: read
    description: List tenant members

  - name: team:manage
    resource: team
    action: manage
    description: Invite, add, remove, and change roles of tenant members

  # --- API Keys ---
  - name: apikeys:manage
    resource: apikeys
    action: manage
    description: Create, list, and revoke API keys

  # --- Settings ---
  - name: settings:read
    resource: settings
    action: read
    description: Read tenant onboarding state and Langfuse credentials

  - name: settings:manage
    resource: settings
    action: manage
    description: Update tenant settings, onboarding state, and Langfuse credentials

  # --- Credentials ---
  - name: credentials:read
    resource: credentials
    action: read
    description: Retrieve tenant-scoped credentials (used by components for auth)

  # --- Taxonomy ---
  - name: taxonomy:read
    resource: taxonomy
    action: read
    description: Read the taxonomy schema

  # --- Tenant (own) ---
  - name: tenant:read
    resource: tenant
    action: read
    description: Read your own tenant's metadata

  - name: tenant:update
    resource: tenant
    action: update
    description: Update your own tenant's metadata (display name, settings)

  - name: tenant:delete
    resource: tenant
    action: delete
    description: Delete your own tenant

  - name: tenant:transfer-ownership
    resource: tenant
    action: transfer-ownership
    description: Transfer ownership of your own tenant to another member

  # --- Tenants (cross-tenant platform operations) ---
  - name: tenants:self-read
    resource: tenants
    action: self-read
    description: Read the caller's own user-tenant memberships (list tenants you are a member of)

  - name: tenants:list-all
    resource: tenants
    action: list-all
    description: Enumerate all tenants on the platform

  - name: tenants:create
    resource: tenants
    action: create
    description: Create a new tenant record (without full provisioning)

  - name: tenants:provision
    resource: tenants
    action: provision
    description: Trigger full tenant provisioning (create record, namespace, API key, etc.)

  - name: tenants:provision-status
    resource: tenants
    action: provision-status
    description: Query provisioning progress for a tenant

  - name: tenants:deprovision
    resource: tenants
    action: deprovision
    description: Tear down all resources for a tenant

  - name: tenants:impersonate
    resource: tenants
    action: impersonate
    description: Obtain a time-limited context token impersonating a target tenant

  - name: tenants:billing-read
    resource: tenants
    action: billing-read
    description: Read cross-tenant billing state

  - name: tenants:billing-write
    resource: tenants
    action: billing-write
    description: Modify cross-tenant billing state

  - name: tenants:by-stripe
    resource: tenants
    action: by-stripe
    description: Look up a tenant by its Stripe customer ID

  - name: tenants:by-email
    resource: tenants
    action: by-email
    description: Look up a tenant by its owner's email

  - name: tenants:update-any
    resource: tenants
    action: update-any
    description: Update any tenant's metadata (cross-tenant admin)

  - name: tenants:delete-any
    resource: tenants
    action: delete-any
    description: Delete any tenant (cross-tenant admin)

  - name: tenants:member-read-any
    resource: tenants
    action: member-read-any
    description: List members of any tenant (cross-tenant admin)

  - name: tenants:member-write-any
    resource: tenants
    action: member-write-any
    description: Add/remove/update members of any tenant (cross-tenant admin)

  - name: tenants:settings-read-any
    resource: tenants
    action: settings-read-any
    description: Read any tenant's Langfuse credentials or settings (cross-tenant admin)

  - name: tenants:settings-write-any
    resource: tenants
    action: settings-write-any
    description: Write any tenant's Langfuse credentials or settings (cross-tenant admin)

  # --- Billing (own) ---
  - name: billing:read
    resource: billing
    action: read
    description: Read your own tenant's billing state

  - name: billing:write
    resource: billing
    action: write
    description: Modify your own tenant's billing state

  # --- Invitations ---
  - name: invitations:self-accept
    resource: invitations
    action: self-accept
    description: Accept an invitation token (the token itself is the authorization proof)

# -----------------------------------------------------------------------------
# RPC Requirements
# -----------------------------------------------------------------------------
# Every gRPC method the daemon serves MUST have an entry here. The loader
# walks all registered proto descriptors at startup and calls the helm-
# role-binding validator; any unmapped method fails daemon startup.
#
# Field semantics:
#   required_permissions: the caller must have ALL listed permissions. An
#     empty list means "any authenticated caller" (used for RPCs that only
#     require the caller be authenticated, e.g. GetAuthSchema).
#   tenant_scoped: when true, the interceptor passes the caller's tenant
#     context as the Casbin domain. When false, it passes "*" (cross-tenant).
#   unauthenticated: when true, the interceptor skips authorization entirely.
#     Used for token-based flows where the token itself proves authorization
#     (e.g. AcceptInvitation uses the invitation token, not a user token).
# -----------------------------------------------------------------------------

rpcs:
  # ===========================================================================
  # DaemonService (gibson.daemon.v1) — main tenant-user and tenant-admin RPCs
  # ===========================================================================

  "/gibson.daemon.v1.DaemonService/Connect":
    required_permissions: [daemon:info]
    tenant_scoped: false
    unauthenticated: false

  "/gibson.daemon.v1.DaemonService/Ping":
    required_permissions: [daemon:info]
    tenant_scoped: false
    unauthenticated: false

  "/gibson.daemon.v1.DaemonService/Status":
    required_permissions: [daemon:info]
    tenant_scoped: false
    unauthenticated: false

  "/gibson.daemon.v1.DaemonService/Subscribe":
    required_permissions: [daemon:subscribe]
    tenant_scoped: true
    unauthenticated: false

  # --- Missions ---
  "/gibson.daemon.v1.DaemonService/RunMission":
    required_permissions: [missions:execute]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.v1.DaemonService/StopMission":
    required_permissions: [missions:execute]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.v1.DaemonService/CreateMission":
    required_permissions: [missions:execute]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.v1.DaemonService/ListMissions":
    required_permissions: [missions:read]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.v1.DaemonService/PauseMission":
    required_permissions: [missions:execute]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.v1.DaemonService/ResumeMission":
    required_permissions: [missions:execute]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.v1.DaemonService/GetMissionHistory":
    required_permissions: [missions:read]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.v1.DaemonService/GetMissionCheckpoints":
    required_permissions: [missions:read]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.v1.DaemonService/InstallMission":
    required_permissions: [missions:manage]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.v1.DaemonService/UninstallMission":
    required_permissions: [missions:manage]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.v1.DaemonService/ListMissionDefinitions":
    required_permissions: [missions:read]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.v1.DaemonService/UpdateMission":
    required_permissions: [missions:manage]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.v1.DaemonService/ResolveMissionDependencies":
    required_permissions: [missions:read]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.v1.DaemonService/ValidateMissionDependencies":
    required_permissions: [missions:read]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.v1.DaemonService/EnsureDependenciesRunning":
    required_permissions: [missions:manage]
    tenant_scoped: true
    unauthenticated: false

  # --- Component discovery (read-only catalog) ---
  "/gibson.daemon.v1.DaemonService/ListAgents":
    required_permissions: [agents:read]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.v1.DaemonService/GetAgentStatus":
    required_permissions: [agents:read]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.v1.DaemonService/ListTools":
    required_permissions: [tools:read]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.v1.DaemonService/ListPlugins":
    required_permissions: [plugins:read]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.v1.DaemonService/QueryPlugin":
    required_permissions: [plugins:execute]
    tenant_scoped: true
    unauthenticated: false

  # --- Component lifecycle management ---
  "/gibson.daemon.v1.DaemonService/StartComponent":
    required_permissions: [components:manage]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.v1.DaemonService/StopComponent":
    required_permissions: [components:manage]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.v1.DaemonService/InstallComponent":
    required_permissions: [components:manage]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.v1.DaemonService/InstallAllComponent":
    required_permissions: [components:manage]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.v1.DaemonService/UninstallComponent":
    required_permissions: [components:manage]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.v1.DaemonService/UpdateComponent":
    required_permissions: [components:manage]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.v1.DaemonService/BuildComponent":
    required_permissions: [components:manage]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.v1.DaemonService/ShowComponent":
    required_permissions: [components:read]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.v1.DaemonService/GetComponentLogs":
    required_permissions: [components:read]
    tenant_scoped: true
    unauthenticated: false

  # ===========================================================================
  # DaemonAdminService (gibson.daemon.admin.v1) — platform + tenant admin RPCs
  # ===========================================================================

  "/gibson.daemon.admin.v1.DaemonAdminService/Shutdown":
    required_permissions: [daemon:shutdown]
    tenant_scoped: false
    unauthenticated: false

  # --- GetAuthSchema: any authenticated caller ---
  # Empty required_permissions means "any authenticated identity is sufficient".
  # The schema is not secret but unauthenticated enumeration is blocked.
  "/gibson.daemon.admin.v1.DaemonAdminService/GetAuthSchema":
    required_permissions: []
    tenant_scoped: false
    unauthenticated: false

  # --- Tenant lifecycle ---
  "/gibson.daemon.admin.v1.DaemonAdminService/CreateTenant":
    required_permissions: [tenants:create]
    tenant_scoped: false
    unauthenticated: false

  "/gibson.daemon.admin.v1.DaemonAdminService/GetTenant":
    required_permissions: [tenant:read]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.admin.v1.DaemonAdminService/ListTenants":
    required_permissions: [tenants:list-all]
    tenant_scoped: false
    unauthenticated: false

  "/gibson.daemon.admin.v1.DaemonAdminService/UpdateTenant":
    required_permissions: [tenant:update]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.admin.v1.DaemonAdminService/DeleteTenant":
    required_permissions: [tenant:delete]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.admin.v1.DaemonAdminService/ProvisionTenant":
    required_permissions: [tenants:provision]
    tenant_scoped: false
    unauthenticated: false

  "/gibson.daemon.admin.v1.DaemonAdminService/GetProvisioningStatus":
    required_permissions: [tenants:provision-status]
    tenant_scoped: false
    unauthenticated: false

  "/gibson.daemon.admin.v1.DaemonAdminService/DeprovisionTenant":
    required_permissions: [tenants:deprovision]
    tenant_scoped: false
    unauthenticated: false

  "/gibson.daemon.admin.v1.DaemonAdminService/ImpersonateTenant":
    required_permissions: [tenants:impersonate]
    tenant_scoped: false
    unauthenticated: false

  # --- Billing ---
  "/gibson.daemon.admin.v1.DaemonAdminService/UpdateTenantBilling":
    required_permissions: [billing:write]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.admin.v1.DaemonAdminService/GetTenantBilling":
    required_permissions: [billing:read]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.admin.v1.DaemonAdminService/GetTenantByStripeCustomerId":
    required_permissions: [tenants:by-stripe]
    tenant_scoped: false
    unauthenticated: false

  "/gibson.daemon.admin.v1.DaemonAdminService/GetTenantByEmail":
    required_permissions: [tenants:by-email]
    tenant_scoped: false
    unauthenticated: false

  # --- Langfuse credentials (settings) ---
  "/gibson.daemon.admin.v1.DaemonAdminService/GetTenantLangfuseCredentials":
    required_permissions: [settings:read]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.admin.v1.DaemonAdminService/SetTenantLangfuseCredentials":
    required_permissions: [settings:manage]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.admin.v1.DaemonAdminService/DeleteTenantLangfuseCredentials":
    required_permissions: [settings:manage]
    tenant_scoped: true
    unauthenticated: false

  # --- Onboarding ---
  "/gibson.daemon.admin.v1.DaemonAdminService/GetOnboardingState":
    required_permissions: [settings:read]
    tenant_scoped: true
    unauthenticated: false

  "/gibson.daemon.admin.v1.DaemonAdminService/UpdateOnboardingState":
    required_permissions: [settings:manage]
    tenant_scoped: true
    unauthenticated: false

  # --- Invitations ---
  "/gibson.daemon.admin.v1.DaemonAdminService/CreateInvitation":
    required_permissions: [team:manage]
    tenant_scoped: true
    unauthenticated: false

  # AcceptInvitation is token-based — the invitation token itself is the
  # authorization proof. The handler validates the token.
  "/gibson.daemon.admin.v1.DaemonAdminService/AcceptInvitation":
    required_permissions: []
    tenant_scoped: false
    unauthenticated: true

  "/gibson.daemon.admin.v1.DaemonAdminService/ListInvitations":
    required_permissions: [team:manage]
    tenant_scoped: true
    unauthenticated: false

