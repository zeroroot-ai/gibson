syntax = "proto3";

// Package gibson.tenant.v1 — SecretsService: customer-callable secrets
// management surface. Moved from gibson.admin.v1.SecretsAdminService
// (platform-sdk) into the OSS SDK as part of the admin-surface-recategorization
// (ADR-0039 implementation).
//
// The broker-config RPCs (GetBrokerConfig, ProbeBrokerConfig, SetBrokerConfig,
// CountSecrets) are also included here per the decomposition spec since they
// are part of the secrets-management surface accessible to tenant admins.
//
// SECURITY: SecretsService NEVER returns a secret's plaintext value. The only
// RPC in Gibson that returns plaintext is HarnessCallbackService.GetCredential,
// which is plugin-only by FGA and not callable from the dashboard or SDK.
//
// Authorization: every RPC carries a (gibson.auth.v1.authz) annotation.
package gibson.tenant.v1;

option go_package = "github.com/zeroroot-ai/gibson/internal/server/daemon/api/gibson/tenant/v1;tenantv1";

import "gibson/auth/v1/options.proto";

// SecretsService manages tenant secrets and their lifecycle, including
// broker configuration for the tenant's active secrets backend.
service SecretsService {
  // ---------------------------------------------------------------------------
  // Secret CRUD
  // ---------------------------------------------------------------------------

  // ListSecrets returns the metadata-only list of secrets owned by the
  // tenant resolved from identity. NEVER returns plaintext values.
  rpc ListSecrets(ListSecretsRequest) returns (ListSecretsResponse) {
    option (gibson.auth.v1.authz) = {
      relation: "member"
      object_type: "tenant"
      object_deriver: "tenant_from_identity"
      allowed_identities: 1  // USER
    };
  }
  // GetSecret returns metadata for one named secret. Never carries the
  // plaintext value.
  rpc GetSecret(GetSecretRequest) returns (GetSecretResponse) {
    option (gibson.auth.v1.authz) = {
      relation: "member"
      object_type: "tenant"
      object_deriver: "tenant_from_identity"
      allowed_identities: 1  // USER
    };
  }
  // SetSecret creates or overwrites the named secret. The value is sent in
  // the request bytes (TLS in transit; never logged).
  rpc SetSecret(SetSecretRequest) returns (SetSecretResponse) {
    option (gibson.auth.v1.authz) = {
      relation: "admin"
      object_type: "tenant"
      object_deriver: "tenant_from_identity"
      allowed_identities: 1  // USER
    };
  }
  // RotateSecret creates a new version of the named secret with a new value.
  // Emits a secret_rotated audit event.
  rpc RotateSecret(RotateSecretRequest) returns (RotateSecretResponse) {
    option (gibson.auth.v1.authz) = {
      relation: "admin"
      object_type: "tenant"
      object_deriver: "tenant_from_identity"
      allowed_identities: 1  // USER
    };
  }
  // DeleteSecret removes the named secret from the broker and emits a
  // secret_revoked audit event.
  rpc DeleteSecret(DeleteSecretRequest) returns (DeleteSecretResponse) {
    option (gibson.auth.v1.authz) = {
      relation: "admin"
      object_type: "tenant"
      object_deriver: "tenant_from_identity"
      allowed_identities: 1  // USER
    };
  }
  // GetMissionAudit returns the per-mission aggregated list of resolved
  // secret refs (one row per ref) for the mission detail "Secrets accessed"
  // panel. Refs only — never values.
  rpc GetMissionAudit(GetMissionAuditRequest) returns (GetMissionAuditResponse) {
    option (gibson.auth.v1.authz) = {
      relation: "member"
      object_type: "tenant"
      object_deriver: "tenant_from_identity"
      allowed_identities: 1  // USER
    };
  }

  // ---------------------------------------------------------------------------
  // Broker configuration
  // ---------------------------------------------------------------------------

  // GetBrokerConfig returns the redacted current configuration. Sensitive
  // fields are NEVER returned.
  rpc GetBrokerConfig(GetBrokerConfigRequest) returns (GetBrokerConfigResponse) {
    option (gibson.auth.v1.authz) = {
      relation: "admin"
      object_type: "tenant"
      object_deriver: "tenant_from_identity"
      allowed_identities: 1  // USER
    };
  }
  // ProbeBrokerConfig validates a candidate config without persisting it.
  rpc ProbeBrokerConfig(ProbeBrokerConfigRequest) returns (ProbeBrokerConfigResponse) {
    option (gibson.auth.v1.authz) = {
      relation: "admin"
      object_type: "tenant"
      object_deriver: "tenant_from_identity"
      allowed_identities: 1  // USER
    };
  }
  // SetBrokerConfig probes the candidate config and persists it on success.
  // Emits a tenant_secrets_backend_configured audit event.
  rpc SetBrokerConfig(SetBrokerConfigRequest) returns (SetBrokerConfigResponse) {
    option (gibson.auth.v1.authz) = {
      relation: "admin"
      object_type: "tenant"
      object_deriver: "tenant_from_identity"
      allowed_identities: 1  // USER
    };
  }
  // CountSecrets returns the number of secrets currently stored in the
  // tenant's active broker. No names, values, or per-row metadata — only an
  // integer count.
  rpc CountSecrets(CountSecretsRequest) returns (CountSecretsResponse) {
    option (gibson.auth.v1.authz) = {
      relation: "admin"
      object_type: "tenant"
      object_deriver: "tenant_from_identity"
      allowed_identities: 1  // USER
    };
  }
}

// ---------------------------------------------------------------------------
// Secret types
// ---------------------------------------------------------------------------

// SecretCategory classifies what role a secret plays in the system.
enum SecretCategory {
  SECRET_CATEGORY_UNSPECIFIED = 0;
  // SECRET_CATEGORY_CRED is a generic credential bound to a plugin via FGA
  // can_resolve tuples.
  SECRET_CATEGORY_CRED = 1;
  // SECRET_CATEGORY_PROVIDER_CONFIG is an LLM provider configuration.
  SECRET_CATEGORY_PROVIDER_CONFIG = 2;
}

// SecretMetadata is the wire-shape returned by GetSecret and ListSecrets.
// SECURITY: this message MUST NOT carry the secret's plaintext value.
message SecretMetadata {
  string name = 1;
  SecretCategory category = 2;
  int64 version = 3;
  int64 created_at_unix = 4;
  string created_by = 5;
  int64 updated_at_unix = 6;
  string updated_by = 7;
  int64 last_accessed_at_unix = 8;
  repeated string plugin_associations = 9;
}

// ---------------------------------------------------------------------------
// Broker types
// ---------------------------------------------------------------------------

// BrokerProvider names the supported broker provider implementations.
//
// The only supported backends are Vault (OpenBao): the platform-managed
// Hosted broker (namespace mode) and a customer-supplied BYO Vault
// (path-prefix mode). The retired numbers/names below are reserved so the
// wire can never re-assign them to an incompatible meaning
// (secrets-hosted-byo epic, gibson#1106 / PRD gibson#1105).
enum BrokerProvider {
  BROKER_PROVIDER_UNSPECIFIED = 0;

  // Retired providers — reserved to keep the wire unambiguous:
  //   1 = POSTGRES, 2 = VAULT (old ambiguous single-Vault value),
  //   3 = AWSSM,    4 = GCPSM,  5 = AZUREKV.
  reserved 1, 2, 3, 4, 5;
  reserved "BROKER_PROVIDER_POSTGRES";
  reserved "BROKER_PROVIDER_VAULT";
  reserved "BROKER_PROVIDER_AWSSM";
  reserved "BROKER_PROVIDER_GCPSM";
  reserved "BROKER_PROVIDER_AZUREKV";

  // BROKER_PROVIDER_VAULT_HOSTED is the platform-managed OpenBao broker.
  // Zero configuration; already active for every tenant (namespace mode).
  BROKER_PROVIDER_VAULT_HOSTED = 6;

  // BROKER_PROVIDER_VAULT_BYO is a customer-supplied HashiCorp Vault /
  // OpenBao. Tenant isolation is by path prefix (path-prefix mode) since
  // OSS Vault/OpenBao CE has no namespaces.
  BROKER_PROVIDER_VAULT_BYO = 7;
}

// RedactedConfig is the dashboard-safe view of a tenant's broker config.
// All fields are non-sensitive; sensitive fields are dropped server-side.
//
// SECURITY: this message MUST NOT carry any sensitive auth field.
message RedactedConfig {
  BrokerProvider provider = 1;
  string address = 2;
  string namespace_or_path = 3;
  string mount = 4;
  string auth_method = 5;
  string region = 6;
  string project = 7;
  string tenant_id_external = 8;
  string client_id = 9;
  string role_arn = 10;
  // sensitive_fields_set lists the names of sensitive fields that have a
  // value stored on the server.
  repeated string sensitive_fields_set = 11;
  int64 updated_at_unix = 12;
  string updated_by = 13;
}

// CandidateConfig is the submitted config for Probe / Set. It carries the
// full set of fields including sensitive ones.
//
// SECURITY: never log this message.
message CandidateConfig {
  BrokerProvider provider = 1;
  string address = 2;
  string namespace_or_path = 3;
  string mount = 4;
  string auth_method = 5;
  string region = 6;
  string project = 7;
  string tenant_id_external = 8;
  string client_id = 9;
  string role_arn = 10;

  // Vault token (token auth method). Sensitive.
  bytes vault_token = 20;
  string approle_role_id = 21;
  bytes approle_secret_id = 22;
  bytes aws_access_key_id = 23;
  bytes aws_secret_access_key = 24;
  bytes aws_external_id = 25;
  bytes gcp_service_account_json = 26;
  bytes azure_client_secret = 27;
}

// ProbeResult carries the structured outcome of a broker config probe.
message ProbeResult {
  bool ok = 1;
  string error_class = 2;
  string error_message = 3;
  int64 duration_ms = 4;
}

// ---------------------------------------------------------------------------
// Secret CRUD request/response messages
// ---------------------------------------------------------------------------

message ListSecretsRequest {
  SecretCategory category_filter = 1;
  int32 limit = 2;
  int32 offset = 3;
  string name_prefix = 4;
}

message ListSecretsResponse {
  repeated SecretMetadata secrets = 1;
  int32 total = 2;
}

message GetSecretRequest {
  string name = 1;
}

message GetSecretResponse {
  SecretMetadata metadata = 1;
}

message SetSecretRequest {
  string name = 1;
  SecretCategory category = 2;
  // value is the plaintext bytes to store. TLS in transit; never logged.
  bytes value = 3;
}

message SetSecretResponse {
  SecretMetadata metadata = 1;
}

message RotateSecretRequest {
  string name = 1;
  bytes value = 2;
}

message RotateSecretResponse {
  SecretMetadata metadata = 1;
}

message DeleteSecretRequest {
  string name = 1;
}

message DeleteSecretResponse {}

// MissionSecretAccess describes one ref's access pattern across the
// mission's lifetime.
message MissionSecretAccess {
  string ref = 1;
  SecretCategory category = 2;
  int64 first_access_at_unix = 3;
  int64 last_access_at_unix = 4;
  int32 count = 5;
  repeated string plugin_install_ids = 6;
}

message GetMissionAuditRequest {
  string mission_id = 1;
}

message GetMissionAuditResponse {
  repeated MissionSecretAccess accesses = 1;
  int32 aggregation_lag_seconds = 2;
}

// ---------------------------------------------------------------------------
// Broker config request/response messages
// ---------------------------------------------------------------------------

message GetBrokerConfigRequest {}

message GetBrokerConfigResponse {
  RedactedConfig config = 1;
  bool configured = 2;
}

message ProbeBrokerConfigRequest {
  CandidateConfig candidate = 1;
}

message ProbeBrokerConfigResponse {
  ProbeResult result = 1;
}

message SetBrokerConfigRequest {
  CandidateConfig candidate = 1;
}

message SetBrokerConfigResponse {
  RedactedConfig config = 1;
  ProbeResult probe_result = 2;
}

message CountSecretsRequest {}

message CountSecretsResponse {
  int64 count = 1;
}
