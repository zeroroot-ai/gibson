syntax = "proto3";

// Package gibson.tenant.v1 — ProviderService: customer-callable LLM provider
// management surface. Consolidated from the existing TenantService provider
// RPCs and ProbeProvider from gibson.admin.v1.TenantAdminService (platform-sdk).
//
// Part of the admin-surface-recategorization (ADR-0039 implementation).
//
// Deduplication notes:
//   - GetSupportedProviders, ListProviderModels already existed in TenantService;
//     the platform-sdk admin/v1/tenant.proto duplicates are dropped.
//   - ProbeProvider is new: moved from platform-sdk TenantAdminService.
//   - CredentialField, ModelDescriptor, SupportedProvider message definitions are
//     the richer tenant.proto versions (include CredentialFieldType enum); the
//     admin/v1 versions are superseded.
//
// Authorization: every RPC carries a (gibson.auth.v1.authz) annotation.
package gibson.tenant.v1;

option go_package = "github.com/zeroroot-ai/gibson/internal/server/daemon/api/gibson/tenant/v1;tenantv1";

import "gibson/auth/v1/options.proto";

// ProviderService manages LLM provider configurations for a tenant.
service ProviderService {
  // ---------------------------------------------------------------------------
  // Provider CRUD
  // ---------------------------------------------------------------------------

  // ListProviders returns all provider configs for the calling tenant.
  rpc ListProviders(ListProvidersRequest) returns (ListProvidersResponse) {
    option (gibson.auth.v1.authz) = {
      relation: "member"
      object_type: "tenant"
      object_deriver: "tenant_from_identity"
      allowed_identities: 3  // USER | SERVICE
    };
  }
  // GetProvider returns a single provider config by name.
  rpc GetProvider(GetProviderRequest) returns (GetProviderResponse) {
    option (gibson.auth.v1.authz) = {
      relation: "member"
      object_type: "tenant"
      object_deriver: "tenant_from_identity"
      allowed_identities: 3  // USER | SERVICE
    };
  }
  // CreateProvider encrypts and stores a new provider config.
  rpc CreateProvider(CreateProviderRequest) returns (CreateProviderResponse) {
    option (gibson.auth.v1.authz) = {
      relation: "writer"
      object_type: "tenant"
      object_deriver: "tenant_from_identity"
      allowed_identities: 3  // USER | SERVICE
    };
  }
  // UpdateProvider replaces an existing provider config.
  rpc UpdateProvider(UpdateProviderRequest) returns (UpdateProviderResponse) {
    option (gibson.auth.v1.authz) = {
      relation: "writer"
      object_type: "tenant"
      object_deriver: "tenant_from_identity"
      allowed_identities: 3  // USER | SERVICE
    };
  }
  // DeleteProvider removes a provider config from the store.
  rpc DeleteProvider(DeleteProviderRequest) returns (DeleteProviderResponse) {
    option (gibson.auth.v1.authz) = {
      relation: "writer"
      object_type: "tenant"
      object_deriver: "tenant_from_identity"
      allowed_identities: 3  // USER | SERVICE
    };
  }
  // TestProvider validates a proposed provider config by making a minimal live
  // request.
  rpc TestProvider(TestProviderRequest) returns (TestProviderResponse) {
    option (gibson.auth.v1.authz) = {
      relation: "writer"
      object_type: "tenant"
      object_deriver: "tenant_from_identity"
      allowed_identities: 3  // USER | SERVICE
    };
  }

  // ---------------------------------------------------------------------------
  // Provider catalogue and probing
  // ---------------------------------------------------------------------------

  // GetSupportedProviders returns the daemon's static catalogue of LLM provider
  // types with their per-provider credential field schemas.
  rpc GetSupportedProviders(GetSupportedProvidersRequest) returns (GetSupportedProvidersResponse) {
    option (gibson.auth.v1.authz) = {
      relation: "member"
      object_type: "tenant"
      object_deriver: "tenant_from_identity"
      allowed_identities: 3  // USER | SERVICE
    };
  }
  // ProbeProvider validates candidate provider credentials WITHOUT persisting
  // them, and returns the live model catalogue the provider's API exposes for
  // those credentials. Used by the wizard's "Test connection" step.
  //
  // SECURITY: credentials transit memory only — they are passed to the
  // transient provider client, the call is made, and the values are dropped
  // when the request returns. They are never logged, never persisted, and
  // never returned to the caller.
  //
  // Source: previously ProbeProvider in gibson.admin.v1.TenantAdminService
  // (platform-sdk); moved here as it is customer-callable.
  rpc ProbeProvider(ProbeProviderRequest) returns (ProbeProviderResponse) {
    option (gibson.auth.v1.authz) = {
      relation: "admin"
      object_type: "tenant"
      object_deriver: "tenant_from_identity"
      allowed_identities: 1  // USER
    };
  }
  // ListProviderModels fetches the live model catalogue for an already-
  // configured provider, looked up by name. Credentials are read from the
  // encrypted store; the caller does not pass them.
  rpc ListProviderModels(ListProviderModelsRequest) returns (ListProviderModelsResponse) {
    option (gibson.auth.v1.authz) = {
      relation: "member"
      object_type: "tenant"
      object_deriver: "tenant_from_identity"
      allowed_identities: 3  // USER | SERVICE
    };
  }
  // GetProviderHealth returns the last-known health status of a stored provider.
  rpc GetProviderHealth(GetProviderHealthRequest) returns (GetProviderHealthResponse) {
    option (gibson.auth.v1.authz) = {
      relation: "member"
      object_type: "tenant"
      object_deriver: "tenant_from_identity"
      allowed_identities: 3  // USER | SERVICE
    };
  }

  // ---------------------------------------------------------------------------
  // Default provider management
  // ---------------------------------------------------------------------------

  // GetDefaultProvider returns the tenant's currently configured default provider.
  rpc GetDefaultProvider(GetDefaultProviderRequest) returns (GetDefaultProviderResponse) {
    option (gibson.auth.v1.authz) = {
      relation: "member"
      object_type: "tenant"
      object_deriver: "tenant_from_identity"
      allowed_identities: 3  // USER | SERVICE
    };
  }
  // SetDefaultProvider designates an existing stored provider as the default.
  rpc SetDefaultProvider(SetDefaultProviderRequest) returns (SetDefaultProviderResponse) {
    option (gibson.auth.v1.authz) = {
      relation: "writer"
      object_type: "tenant"
      object_deriver: "tenant_from_identity"
      allowed_identities: 3  // USER | SERVICE
    };
  }

  // ---------------------------------------------------------------------------
  // LLM execution
  // ---------------------------------------------------------------------------

  // ExecuteLLM proxies a single (non-streaming) LLM completion.
  rpc ExecuteLLM(ExecuteLLMRequest) returns (ExecuteLLMResponse) {
    option (gibson.auth.v1.authz) = {
      relation: "writer"
      object_type: "tenant"
      object_deriver: "tenant_from_identity"
      allowed_identities: 3  // USER | SERVICE
    };
  }
}

// ---------------------------------------------------------------------------
// Provider record types
// ---------------------------------------------------------------------------

// ProviderRecord is the read-side representation of a stored provider config.
message ProviderRecord {
  string id = 1;
  string name = 2;
  string type = 3;
  string default_model = 4;
  bool is_default = 5;
  bool enabled = 6;
  map<string, string> credentials_masked = 7;
  string created_at = 8;
  string updated_at = 9;
}

// ProviderConfigInput is the write-side shape for CreateProvider and
// UpdateProvider.
message ProviderConfigInput {
  string name = 1;
  string type = 2;
  string default_model = 3;
  map<string, string> credentials = 4;
  bool set_as_default = 5;
}

// CredentialFieldType classifies the UI widget and validation semantics for a
// CredentialField. Deprecated secret:bool infers PASSWORD when true; new
// callers SHOULD use type instead.
enum CredentialFieldType {
  CREDENTIAL_FIELD_TYPE_UNSPECIFIED = 0;
  // CREDENTIAL_FIELD_TYPE_TEXT is a plain single-line text input.
  CREDENTIAL_FIELD_TYPE_TEXT        = 1;
  // CREDENTIAL_FIELD_TYPE_PASSWORD is a masked text input; value is never
  // echoed in list/get responses.
  CREDENTIAL_FIELD_TYPE_PASSWORD    = 2;
  // CREDENTIAL_FIELD_TYPE_URL is a URL input with basic format validation.
  CREDENTIAL_FIELD_TYPE_URL         = 3;
  // CREDENTIAL_FIELD_TYPE_REGION is a region-picker (e.g. AWS region selector).
  CREDENTIAL_FIELD_TYPE_REGION      = 4;
  // CREDENTIAL_FIELD_TYPE_BOOL is a checkbox / boolean toggle.
  CREDENTIAL_FIELD_TYPE_BOOL        = 5;
}

// CredentialField describes one input the operator must supply when configuring
// a provider — surfaced verbatim by the dashboard's dynamic credential form.
message CredentialField {
  string key = 1;
  string label = 2;
  bool required = 3;
  // secret is kept for backward compatibility. Prefer type =
  // CREDENTIAL_FIELD_TYPE_PASSWORD for new definitions.
  bool secret = 4;
  string placeholder = 5;
  string help = 6;
  // type classifies the UI widget and validation semantics for this field.
  // UNSPECIFIED callers should treat as TEXT (or PASSWORD when secret=true).
  CredentialFieldType type = 7;
}

// ModelDescriptor describes one model offered by a provider.
message ModelDescriptor {
  string name = 1;
  string family = 2;
  int32 context_window = 3;
}

// SupportedProvider describes one LLM provider type the daemon supports.
message SupportedProvider {
  string type = 1;
  string display_name = 2;
  string docs_url = 3;
  bool self_hosted = 4;
  repeated CredentialField credentials = 5;
  // Static catalogue surfaced when the daemon can enumerate models without
  // calling the provider's API. Empty for providers that require a live
  // test+probe to discover models.
  repeated ModelDescriptor default_models = 6;
}

// ---------------------------------------------------------------------------
// LLM execution message types
// ---------------------------------------------------------------------------

// ResponseFormat controls the structure of the LLM output.
message ResponseFormat {
  string type = 1;
  string name = 2;
  string schema_json = 3;
  bool strict = 4;
}

// LLMTokenUsage reports token consumption for an LLM completion.
message LLMTokenUsage {
  int32 input_tokens = 1;
  int32 output_tokens = 2;
  int32 total_tokens = 3;
}

// LLMToolCall describes a tool invocation requested by the LLM.
message LLMToolCall {
  string id = 1;
  string name = 2;
  string arguments = 3;
}

// LLMToolResult carries the output of a tool call.
message LLMToolResult {
  string tool_call_id = 1;
  string content = 2;
  bool is_error = 3;
}

// LLMToolDef defines a tool the LLM may invoke.
message LLMToolDef {
  string name = 1;
  string description = 2;
  string parameters_json = 3;
}

// LLMMessageContent is a single message in a conversation.
message LLMMessageContent {
  string role = 1;
  string content = 2;
  repeated LLMToolCall tool_calls = 3;
  repeated LLMToolResult tool_results = 4;
  string name = 5;
}

// ---------------------------------------------------------------------------
// ProviderService request/response messages
// ---------------------------------------------------------------------------

message ListProvidersRequest {}

message ListProvidersResponse {
  repeated ProviderRecord providers = 1;
}

message GetProviderRequest {
  string name = 1;
}

message GetProviderResponse {
  ProviderRecord provider = 1;
}

message CreateProviderRequest {
  ProviderConfigInput input = 1;
}

message CreateProviderResponse {
  ProviderRecord provider = 1;
}

message UpdateProviderRequest {
  string name = 1;
  ProviderConfigInput input = 2;
}

message UpdateProviderResponse {
  ProviderRecord provider = 1;
}

message DeleteProviderRequest {
  string name = 1;
}

message DeleteProviderResponse {}

message TestProviderRequest {
  ProviderConfigInput input = 1;
}

message TestProviderResponse {
  bool ok = 1;
  int64 latency_ms = 2;
  string model = 3;
  string error = 4;
  // Live model catalogue returned by the provider's API for these credentials.
  // Empty when ok=false.
  repeated ModelDescriptor models = 5;
}

message GetSupportedProvidersRequest {}

message GetSupportedProvidersResponse {
  repeated SupportedProvider providers = 1;
}

// ProbeProviderRequest carries candidate provider credentials for a
// validation-only call that returns the live model catalogue. Credentials
// are NEVER persisted by this RPC.
// Source: previously ProbeProviderRequest in gibson.admin.v1 (platform-sdk).
message ProbeProviderRequest {
  // Provider type identifier (matches SupportedProvider.type).
  string type = 1;
  // Credential map. Keys come from the provider's CredentialField.key entries;
  // values are plaintext (used once, discarded).
  map<string, string> credentials = 2;
}

// ProbeProviderResponse carries the structured probe outcome.
// Source: previously ProbeProviderResponse in gibson.admin.v1 (platform-sdk).
message ProbeProviderResponse {
  // True when the provider accepted the credentials and a model list was
  // retrieved. False otherwise — error_message describes the reason.
  bool ok = 1;
  // Human-readable error message when ok=false.
  string error_message = 2;
  // Stable error class for programmatic dispatch when ok=false.
  string error_class = 3;
  // Live model catalogue the provider's API returned for these credentials.
  // Empty when ok=false.
  repeated ModelDescriptor models = 4;
  // Round-trip latency to the upstream provider, in milliseconds.
  int64 latency_ms = 5;
}

message ListProviderModelsRequest {
  string name = 1;
}

message ListProviderModelsResponse {
  bool ok = 1;
  string error_message = 2;
  string error_class = 3;
  repeated ModelDescriptor models = 4;
  int64 latency_ms = 5;
}

message GetProviderHealthRequest {
  string name = 1;
}

message GetProviderHealthResponse {
  bool healthy = 1;
  string last_checked_at = 2;
  string error = 3;
}

message GetDefaultProviderRequest {}

message GetDefaultProviderResponse {
  ProviderRecord provider = 1;
}

message SetDefaultProviderRequest {
  string name = 1;
}

message SetDefaultProviderResponse {
  ProviderRecord provider = 1;
}

message ExecuteLLMRequest {
  string provider_name = 1;
  string model = 2;
  repeated LLMMessageContent messages = 3;
  repeated LLMToolDef tools = 4;
  optional ResponseFormat response_format = 5;
  optional double temperature = 6;
  optional int32 max_tokens = 7;
  optional double top_p = 8;
  repeated string stop = 9;
}

message ExecuteLLMResponse {
  string content = 1;
  repeated LLMToolCall tool_calls = 2;
  string finish_reason = 3;
  LLMTokenUsage usage = 4;
}
