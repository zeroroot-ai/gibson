syntax = "proto3";

package gibson.billing.v1;

option go_package = "github.com/zeroroot-ai/gibson/internal/daemon/api/gibson/billing/v1;billingv1";

import "gibson/auth/v1/options.proto";

// BillingService provides daemon-mediated billing operations.
//
// The dashboard holds no Postgres pool; all writes to the platform billing
// schema flow through this service. The daemon's platformDB already owns the
// platform Postgres connection.
//
// Spec: dashboard-no-backing-store-clients (Module 3 — Postgres pool removal).
service BillingService {
  // RecordWebhookEvent records a Stripe event ID in the webhook_idempotency
  // table. Returns whether this is the first (novel) occurrence. On a replay,
  // rowCount=0 and is_new=false — the dashboard short-circuits without
  // re-processing.
  //
  // The caller (dashboard server action) has already verified the Stripe
  // webhook signature before calling this RPC.
  rpc RecordWebhookEvent(RecordWebhookEventRequest) returns (RecordWebhookEventResponse) {
    option (gibson.auth.v1.authz) = {
      relation: "member",
      object_type: "tenant",
      object_deriver: "tenant_from_identity",
      allowed_identities: 3  // USER | SERVICE
    };
  }

  // DeleteWebhookEvent removes an event ID from the idempotency table.
  // Called as a best-effort rollback when webhook processing fails after
  // the idempotency record was written, so that Stripe can retry.
  rpc DeleteWebhookEvent(DeleteWebhookEventRequest) returns (DeleteWebhookEventResponse) {
    option (gibson.auth.v1.authz) = {
      relation: "member",
      object_type: "tenant",
      object_deriver: "tenant_from_identity",
      allowed_identities: 3  // USER | SERVICE
    };
  }
}

// ---------------------------------------------------------------------------
// RecordWebhookEvent — request/response
// ---------------------------------------------------------------------------

// RecordWebhookEventRequest records a Stripe event ID for idempotency.
message RecordWebhookEventRequest {
  // event_id is the Stripe event ID (e.g. "evt_1...").
  string event_id = 1;

  // event_type is the Stripe event type string (e.g. "checkout.session.completed").
  string event_type = 2;

  // tenant_id is the tenant slug extracted from event metadata. May be empty
  // for pre-tenant events (session events, etc.).
  string tenant_id = 3;
}

// RecordWebhookEventResponse carries the idempotency check result.
message RecordWebhookEventResponse {
  // is_new is true when this is the first time the event_id has been seen
  // (rowCount=1 from INSERT … ON CONFLICT DO NOTHING). When false, the
  // event is a duplicate and the dashboard should return 200 immediately.
  bool is_new = 1;
}

// ---------------------------------------------------------------------------
// DeleteWebhookEvent — request/response
// ---------------------------------------------------------------------------

// DeleteWebhookEventRequest removes an event ID from the idempotency table.
message DeleteWebhookEventRequest {
  // event_id is the Stripe event ID to remove.
  string event_id = 1;
}

// DeleteWebhookEventResponse is returned on successful deletion.
// Deletion is idempotent — succeeds even when the event ID does not exist.
message DeleteWebhookEventResponse {}
