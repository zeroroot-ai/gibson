syntax = "proto3";

package gibson.daemon.admin.v1;

option go_package = "github.com/zero-day-ai/gibson/internal/daemon/api;api";

// DaemonAdminService provides the internal admin gRPC API for Gibson daemon.
//
// This service exposes privileged operations including tenant lifecycle management,
// billing, provisioning, impersonation, API key management, and daemon shutdown.
// It is NEVER exposed to end-customers — only to platform operators and internal
// services.
service DaemonAdminService {
  // Shutdown requests graceful shutdown of the daemon.
  // This is used by the CLI to stop the daemon remotely.
  // Only works for local daemons (not when GIBSON_DAEMON_ADDRESS is set to remote).
  rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);

  // ---------------------------------------------------------------------------
  // Tenant Lookup
  // ---------------------------------------------------------------------------

  // Tenant lifecycle (create/update/delete/provision/deprovision) has moved to
  // the standalone gibson-tenant-operator. Only read-only and runtime-affecting
  // RPCs remain here.

  // ImpersonateTenant requests a time-limited context token for the given tenant.
  // Requires the "platform-operator" role.
  rpc ImpersonateTenant(ImpersonateTenantRequest) returns (ImpersonateTenantResponse);

  // ---------------------------------------------------------------------------
  // Observability
  // ---------------------------------------------------------------------------

  // GetTenantLangfuseCredentials retrieves the Langfuse project credentials for a tenant.
  // Returns NOT_FOUND if no credentials have been configured for the tenant.
  rpc GetTenantLangfuseCredentials(GetTenantLangfuseCredentialsRequest) returns (GetTenantLangfuseCredentialsResponse);

  // SetTenantLangfuseCredentials stores or updates Langfuse project credentials for a tenant.
  rpc SetTenantLangfuseCredentials(SetTenantLangfuseCredentialsRequest) returns (SetTenantLangfuseCredentialsResponse);

  // DeleteTenantLangfuseCredentials removes the Langfuse project credentials for a tenant.
  rpc DeleteTenantLangfuseCredentials(DeleteTenantLangfuseCredentialsRequest) returns (DeleteTenantLangfuseCredentialsResponse);

  // ---------------------------------------------------------------------------
  // Onboarding
  // ---------------------------------------------------------------------------

  // GetOnboardingState queries the onboarding progress for a tenant.
  rpc GetOnboardingState(GetOnboardingStateRequest) returns (GetOnboardingStateResponse);

  // UpdateOnboardingState advances or modifies the onboarding state.
  rpc UpdateOnboardingState(UpdateOnboardingStateRequest) returns (UpdateOnboardingStateResponse);

  // ---------------------------------------------------------------------------
  // API Keys
  // ---------------------------------------------------------------------------

  // CreateAPIKey issues a new API key for a tenant.
  rpc CreateAPIKey(CreateAPIKeyRequest) returns (CreateAPIKeyResponse);

  // ListAPIKeys returns API key metadata (never raw key values).
  rpc ListAPIKeys(ListAPIKeysRequest) returns (ListAPIKeysResponse);

  // RevokeAPIKey permanently revokes an API key.
  rpc RevokeAPIKey(RevokeAPIKeyRequest) returns (RevokeAPIKeyResponse);

  // ---------------------------------------------------------------------------
  // Audit Log (authz-06)
  // ---------------------------------------------------------------------------

  // ListAuditEvents returns audit events for a tenant, sourced from the daemon's
  // Redis audit stream. Requires FGA admin relation on the tenant.
  rpc ListAuditEvents(ListAuditEventsRequest) returns (ListAuditEventsResponse);

  // ---------------------------------------------------------------------------
  // Identity and Access Management (prod-unimplemented-apis)
  // ---------------------------------------------------------------------------

  // ResetPassword triggers a password-reset email for the given address.
  // Always returns success regardless of whether the email exists, to prevent
  // email enumeration attacks.
  rpc ResetPassword(ResetPasswordRequest) returns (ResetPasswordResponse);

  // RevokeUserSessions revokes one or all active sessions for a user.
  // Delegates to the identity provider session management and emits a Redis pub/sub event.
  rpc RevokeUserSessions(RevokeUserSessionsRequest) returns (RevokeUserSessionsResponse);

  // SuspendMember disables or reactivates a tenant member in the identity provider.
  // When suspend=true the user is disabled and their FGA tuple is removed.
  // When suspend=false the user is re-enabled and the tuple is restored.
  rpc SuspendMember(SuspendMemberRequest) returns (SuspendMemberResponse);

  // GetUserProfile retrieves a user's profile information from the identity provider.
  // Accessible by the user themselves or by a tenant admin.
  rpc GetUserProfile(GetUserProfileRequest) returns (GetUserProfileResponse);

  // UpdateUserProfile updates mutable profile fields (display_name, avatar_url)
  // for a user. Email and role changes are not permitted here.
  rpc UpdateUserProfile(UpdateUserProfileRequest) returns (UpdateUserProfileResponse);

  // ---------------------------------------------------------------------------
  // Findings Export and Mission Drafts (prod-unimplemented-apis)
  // ---------------------------------------------------------------------------

  // ExportFindings exports findings to the requested format (json, csv, sarif).
  // The serialized content is returned as bytes in the response.
  rpc ExportFindings(ExportFindingsRequest) returns (ExportFindingsResponse);

  // SaveMissionDraft persists a mission YAML draft for later use.
  // If draft_id is empty a new draft is created; otherwise the existing draft
  // is updated. Drafts expire automatically after 30 days.
  rpc SaveMissionDraft(SaveMissionDraftRequest) returns (SaveMissionDraftResponse);

  // ListMissionDrafts returns all saved mission drafts for a tenant, ordered
  // by update time descending.
  rpc ListMissionDrafts(ListMissionDraftsRequest) returns (ListMissionDraftsResponse);

  // ---------------------------------------------------------------------------
  // Quota Management (prod-feature-wiring)
  // ---------------------------------------------------------------------------

  // GetTenantQuota retrieves the configured resource quotas for a tenant.
  // Returns zero values for any quota not explicitly set.
  // Requires FGA admin relation on the tenant.
  rpc GetTenantQuota(GetTenantQuotaRequest) returns (GetTenantQuotaResponse);

  // SetTenantQuota sets or updates the resource quotas for a tenant.
  // Requires platform-operator role.
  rpc SetTenantQuota(SetTenantQuotaRequest) returns (SetTenantQuotaResponse);

  // ---------------------------------------------------------------------------
  // User Management (prod-feature-wiring)
  // ---------------------------------------------------------------------------

  // GetUserSessions returns the active sessions for a user.
  // Accessible by the user themselves or by a tenant admin.
  rpc GetUserSessions(GetUserSessionsRequest) returns (GetUserSessionsResponse);

  // ---------------------------------------------------------------------------
  // Alerts (prod-feature-wiring)
  // ---------------------------------------------------------------------------

  // ListAlerts returns platform alerts for a tenant user.
  // Supports filtering to unread-only alerts.
  rpc ListAlerts(ListAlertsRequest) returns (ListAlertsResponse);

  // MarkAlertRead marks a single alert as read.
  rpc MarkAlertRead(MarkAlertReadRequest) returns (MarkAlertReadResponse);

  // MarkAllAlertsRead marks all alerts for a user as read.
  rpc MarkAllAlertsRead(MarkAllAlertsReadRequest) returns (MarkAllAlertsReadResponse);

  // ---------------------------------------------------------------------------
  // Chat Conversations (prod-feature-wiring)
  // ---------------------------------------------------------------------------

  // ListConversations returns the conversation history list for a user.
  rpc ListConversations(ListConversationsRequest) returns (ListConversationsResponse);

  // GetConversation returns the full message history for a single conversation.
  rpc GetConversation(GetConversationRequest) returns (GetConversationResponse);

  // ---------------------------------------------------------------------------
  // Agent Auth Protocol (agent-auth-fga-integration)
  // ---------------------------------------------------------------------------

  // RegisterAgentAuth registers a new agent and its host, resolves FGA-backed
  // capability grants for the agent owner, and writes the grant records.
  // Requires FGA admin relation on the tenant.
  rpc RegisterAgentAuth(RegisterAgentAuthRequest) returns (RegisterAgentAuthResponse);

  // ExecuteAgentCapability checks FGA for the requested capability execution
  // and records an audit event. Actual component dispatch is a future concern.
  // Requires FGA member relation on the tenant.
  rpc ExecuteAgentCapability(ExecuteAgentCapabilityRequest) returns (ExecuteAgentCapabilityResponse);

  // ListAgentCapabilities returns all capabilities available to a given user
  // by querying FGA and the component registry.
  // Requires FGA member relation on the tenant.
  rpc ListAgentCapabilities(ListAgentCapabilitiesRequest) returns (ListAgentCapabilitiesResponse);

  // GetAgentAuthStatus returns the current status and grants for an agent.
  // Requires FGA member relation on the tenant.
  rpc GetAgentAuthStatus(GetAgentAuthStatusRequest) returns (GetAgentAuthStatusResponse);

  // RevokeAgentAuth sets the agent's status to revoked and revokes all grants.
  // Requires FGA admin relation on the tenant.
  rpc RevokeAgentAuth(RevokeAgentAuthRequest) returns (RevokeAgentAuthResponse);

  // ListAgentAuthAgents returns a paginated list of agents for a tenant.
  // Requires FGA admin relation on the tenant.
  rpc ListAgentAuthAgents(ListAgentAuthAgentsRequest) returns (ListAgentAuthAgentsResponse);

  // CreateHostRegistrationToken issues a single-use API key for host registration.
  // Requires FGA admin relation on the tenant.
  rpc CreateHostRegistrationToken(CreateHostRegistrationTokenRequest) returns (CreateHostRegistrationTokenResponse);

  // ListComponentGrants returns FGA component grants for all users in a tenant.
  // Best-effort: enumerates FGA tuples directly. Requires admin relation on the tenant.
  rpc ListComponentGrants(ListComponentGrantsRequest) returns (ListComponentGrantsResponse);

  // BatchGrantComponentAccessV2 applies a list of per-principal grant/revoke
  // operations across any component for any user or team.
  // Requires FGA admin relation on the tenant.
  rpc BatchGrantComponentAccessV2(BatchGrantComponentAccessV2Request) returns (BatchGrantComponentAccessV2Response);

  // ListAuditLog returns Postgres-backed audit log entries for a tenant.
  // Requires FGA admin relation on the tenant.
  rpc ListAuditLog(ListAuditLogRequest) returns (ListAuditLogResponse);

  // ---------------------------------------------------------------------------
  // Tool Catalog (gibson-tool-runner)
  // ---------------------------------------------------------------------------

  // RefreshToolCatalog triggers an immediate refresh of the sandboxed-tool
  // catalog. Bypasses the scheduled interval — useful for CI to publish a
  // new tool-runner image and immediately surface its parsers to the
  // orchestrator. Only works on the replica currently holding the refresh
  // leader lease; followers accept the call but defer to the leader's
  // next scheduled tick. Requires the platform-operator FGA role.
  rpc RefreshToolCatalog(RefreshToolCatalogRequest) returns (RefreshToolCatalogResponse);

  // ---------------------------------------------------------------------------
  // LLM Providers — introspection for dashboard form rendering
  // ---------------------------------------------------------------------------

  // GetSupportedProviders returns the full list of LLM provider types the
  // daemon can construct, with per-provider credential schemas and default
  // model catalogues. The dashboard consumes this to render the Settings >
  // Providers form dynamically — no hard-coded frontend provider list,
  // no drift between daemon and UI. Read-only; all metadata is built from
  // in-process provider descriptors (no network calls). Requires any
  // authenticated tenant member role.
  rpc GetSupportedProviders(GetSupportedProvidersRequest) returns (GetSupportedProvidersResponse);

  // ---------------------------------------------------------------------------
  // Entitlement tuple writes — called by the tenant-operator via the
  // dashboard's SPIFFE-authenticated /api/admin/provisioning/entitlements/*
  // routes. These are write-RPCs that the regular user path does not reach;
  // only the platform-operator FGA role (or the SPIFFE bypass used by the
  // operator) passes the interceptor.
  //
  // Spec: agent-authoring-and-tenant-entitlements R4, R8, R12.
  // ---------------------------------------------------------------------------

  // WriteAccessTuples atomically adds and/or deletes FGA tuples on behalf of
  // an authenticated caller. The daemon validates that every tuple's subject
  // matches the tenant scope implied by the interceptor; cross-tenant writes
  // are denied even for platform-operator callers.
  rpc WriteAccessTuples(WriteAccessTuplesRequest) returns (WriteAccessTuplesResponse);

  // UpsertTenantQuota writes the tenant's runtime quota record (seats,
  // concurrent_agents, storage_gb, retention_days, sandbox_launches_per_month)
  // to Postgres. Called by the operator's reconcile loop after resolving the
  // plan from the canonical plan registry.
  rpc UpsertTenantQuota(UpsertTenantQuotaRequest) returns (UpsertTenantQuotaResponse);

  // ListFeatureTuples enumerates the tenant:X#has_*@tenant:X informational
  // tuples currently set on a given tenant. Consumed by the operator during
  // reconcile to diff against the plan's desired set.
  rpc ListFeatureTuples(ListFeatureTuplesRequest) returns (ListFeatureTuplesResponse);

  // SeedCatalogTenantEnabled writes a tenant_enabled tuple on every catalog
  // item currently carrying a platform_enabled tuple on system_tenant:_system.
  // Idempotent; called by the operator on first reconcile of a newly-created
  // tenant and by a background reconciler when new platform-catalog items are
  // published.
  rpc SeedCatalogTenantEnabled(SeedCatalogTenantEnabledRequest) returns (SeedCatalogTenantEnabledResponse);

  // EmitAuditEvent lets an operator / platform workload forward a
  // structured audit event onto the daemon's emitter. The handler
  // overwrites actor_subject with the SPIFFE identity of the caller so
  // forged subjects cannot reach the stream. Used for tenant-operator
  // reconcile summaries.
  rpc EmitAuditEvent(EmitAuditEventRequest) returns (EmitAuditEventResponse);

  // ---------------------------------------------------------------------------
  // LLM Providers — daemon-managed credential store (spec 25)
  // ---------------------------------------------------------------------------

  // ListProviders returns all provider configs for the calling tenant.
  // Credentials in the response are always masked (e.g. "****abc").
  // Requires FGA member relation on the tenant.
  rpc ListProviders(ListProvidersRequest) returns (ListProvidersResponse);

  // GetProvider returns a single provider config by name.
  // Credentials in the response are always masked.
  // Requires FGA member relation on the tenant.
  rpc GetProvider(GetProviderRequest) returns (GetProviderResponse);

  // CreateProvider encrypts and stores a new provider config.
  // The plaintext credentials in the request are encrypted immediately;
  // they are never persisted in plaintext.
  // Requires FGA admin relation on the tenant.
  rpc CreateProvider(CreateProviderRequest) returns (CreateProviderResponse);

  // UpdateProvider replaces an existing provider config.
  // If credentials fields are empty or omitted, the stored values are retained.
  // Requires FGA admin relation on the tenant.
  rpc UpdateProvider(UpdateProviderRequest) returns (UpdateProviderResponse);

  // DeleteProvider removes a provider config from the store.
  // Requires FGA admin relation on the tenant.
  rpc DeleteProvider(DeleteProviderRequest) returns (DeleteProviderResponse);

  // TestProvider validates a proposed provider config by making a minimal
  // live request to the upstream. The config is NOT persisted.
  // Returns a structured result rather than a gRPC-level error on upstream
  // failure so the dashboard can surface latency and error detail.
  // Requires FGA admin relation on the tenant.
  rpc TestProvider(TestProviderRequest) returns (TestProviderResponse);

  // GetProviderHealth returns the last-known health status of a stored provider.
  // Requires FGA member relation on the tenant.
  rpc GetProviderHealth(GetProviderHealthRequest) returns (GetProviderHealthResponse);

  // GetDefaultProvider returns the tenant's currently configured default provider.
  // Requires FGA member relation on the tenant.
  rpc GetDefaultProvider(GetDefaultProviderRequest) returns (GetDefaultProviderResponse);

  // SetDefaultProvider designates an existing stored provider as the default.
  // Requires FGA admin relation on the tenant.
  rpc SetDefaultProvider(SetDefaultProviderRequest) returns (SetDefaultProviderResponse);

  // GetFallbackChain returns the ordered list of provider names the daemon
  // tries when the default provider is unavailable.
  // Requires FGA member relation on the tenant.
  rpc GetFallbackChain(GetFallbackChainRequest) returns (GetFallbackChainResponse);

  // SetFallbackChain replaces the tenant's provider fallback chain.
  // All named providers must already exist in the store.
  // Requires FGA admin relation on the tenant.
  rpc SetFallbackChain(SetFallbackChainRequest) returns (SetFallbackChainResponse);

  // ExecuteLLM proxies a single (non-streaming) LLM completion through the
  // daemon's provider-credential store. The dashboard's GibsonLLMAdapter
  // calls this for non-streaming chat turns.
  // Requires FGA member relation on the tenant.
  rpc ExecuteLLM(ExecuteLLMRequest) returns (ExecuteLLMResponse);

  // StreamLLM proxies a streaming LLM completion through the daemon's
  // provider-credential store. The dashboard's GibsonLLMAdapter calls this
  // for streaming chat turns. Server-streaming: the daemon sends back
  // StreamLLMResponse chunks until finish or error.
  // Requires FGA member relation on the tenant.
  rpc StreamLLM(StreamLLMRequest) returns (stream StreamLLMResponse);
}

// ---------------------------------------------------------------------------
// Lifecycle RPCs — request/response messages
// ---------------------------------------------------------------------------

// ShutdownRequest requests graceful shutdown of the daemon.
message ShutdownRequest {
  // force indicates whether to force immediate shutdown (skip graceful drain)
  bool force = 1;

  // timeout_seconds is the maximum time to wait for graceful shutdown (0 = default 30s)
  int32 timeout_seconds = 2;
}

// ShutdownResponse confirms the shutdown request was accepted.
message ShutdownResponse {
  // success indicates if the shutdown request was accepted
  bool success = 1;

  // message provides additional context about the shutdown
  string message = 2;
}

// ---------------------------------------------------------------------------
// Tenant Management RPCs — request/response messages
// ---------------------------------------------------------------------------

// ImpersonateTenantRequest requests a time-limited context token for the given tenant.
// Requires the "platform-operator" role.
message ImpersonateTenantRequest {
  // tenant_id is the identifier of the tenant to impersonate
  string tenant_id = 1;
}

// ImpersonateTenantResponse returns a short-lived context token scoped to the
// target tenant.  The token behaves like a normal auth token for its lifetime.
message ImpersonateTenantResponse {
  // token is the time-limited context token granting access to the target tenant
  string token = 1;
}

// ---------------------------------------------------------------------------
// Observability RPCs — request/response messages
// ---------------------------------------------------------------------------

// GetTenantLangfuseCredentialsRequest requests Langfuse credentials for a tenant.
message GetTenantLangfuseCredentialsRequest {
  // tenant_id is the unique identifier of the tenant
  string tenant_id = 1;
}

// GetTenantLangfuseCredentialsResponse returns the Langfuse project credentials.
message GetTenantLangfuseCredentialsResponse {
  // public_key is the Langfuse public key
  string public_key = 1;

  // secret_key is the Langfuse secret key
  string secret_key = 2;

  // host is the Langfuse host URL (e.g., "https://cloud.langfuse.com")
  string host = 3;

  // project_id is the Langfuse project identifier
  string project_id = 4;
}

// SetTenantLangfuseCredentialsRequest stores Langfuse project credentials for a tenant.
message SetTenantLangfuseCredentialsRequest {
  // tenant_id is the unique identifier of the tenant
  string tenant_id = 1;

  // public_key is the Langfuse public key
  string public_key = 2;

  // secret_key is the Langfuse secret key
  string secret_key = 3;

  // host is the Langfuse host URL (e.g., "https://cloud.langfuse.com")
  string host = 4;

  // project_id is the Langfuse project identifier
  string project_id = 5;
}

// SetTenantLangfuseCredentialsResponse confirms the credentials were stored.
message SetTenantLangfuseCredentialsResponse {}

// DeleteTenantLangfuseCredentialsRequest requests deletion of a tenant's Langfuse credentials.
message DeleteTenantLangfuseCredentialsRequest {
  // tenant_id is the unique identifier of the tenant
  string tenant_id = 1;
}

// DeleteTenantLangfuseCredentialsResponse confirms the credentials were deleted.
message DeleteTenantLangfuseCredentialsResponse {}

// ---------------------------------------------------------------------------
// Onboarding RPCs — request/response messages
// ---------------------------------------------------------------------------

// GetOnboardingStateRequest queries the onboarding progress for a tenant.
message GetOnboardingStateRequest {
  // tenant_id is the identifier of the tenant to query
  string tenant_id = 1;
}

// GetOnboardingStateResponse returns the current onboarding state.
message GetOnboardingStateResponse {
  // current_step is the name of the active onboarding step
  string current_step = 1;

  // completed_steps lists all steps that have been marked complete
  repeated string completed_steps = 2;

  // setup_tasks maps task names to their completion status ("true"/"false")
  map<string, string> setup_tasks = 3;

  // completed_at is the RFC 3339 timestamp when onboarding finished (empty if not done)
  string completed_at = 4;
}

// UpdateOnboardingStateRequest advances or modifies the onboarding state.
message UpdateOnboardingStateRequest {
  // tenant_id is the identifier of the tenant to update
  string tenant_id = 1;

  // current_step sets the active onboarding step
  string current_step = 2;

  // completed_steps replaces the list of completed steps
  repeated string completed_steps = 3;

  // setup_tasks merges into the existing task completion map
  map<string, string> setup_tasks = 4;
}

// UpdateOnboardingStateResponse confirms the update was applied.
message UpdateOnboardingStateResponse {}

// ---------------------------------------------------------------------------
// API Key RPCs — request/response messages
// ---------------------------------------------------------------------------

// CreateAPIKeyRequest issues a new API key for a tenant.
message CreateAPIKeyRequest {
  // tenant_id is the tenant to create the key for
  string tenant_id = 1;

  // allowed_kinds restricts the component kinds the key may access (empty = all)
  repeated string allowed_kinds = 2;

  // allowed_names restricts the specific component names the key may access (empty = all)
  repeated string allowed_names = 3;

  // capabilities are the API-key resource:action grants for this key (e.g. ["graphrag:write", "*"])
  // Pass ["*"] for unrestricted access. An empty slice grants no explicit capabilities.
  repeated string capabilities = 4;

  // name is a human-readable label for this key (e.g. "CI/CD Deploy Key")
  string name = 5;
}

// CreateAPIKeyResponse returns the new API key (raw value shown once).
message CreateAPIKeyResponse {
  // key_id is the stable identifier for this key (used for listing/revoking)
  string key_id = 1;

  // raw_key is the full API key value including the "gsk_" prefix (shown once only)
  string raw_key = 2;

  // tenant_id is the tenant this key belongs to
  string tenant_id = 3;
}

// APIKeyInfo describes a stored API key without exposing the secret value.
message APIKeyInfo {
  // key_id is the stable identifier for this key
  string key_id = 1;

  // tenant_id is the tenant this key belongs to
  string tenant_id = 2;

  // created_at is when the key was created (RFC 3339 string)
  string created_at = 3;

  // last_used_at is when the key was last used (RFC 3339 string, empty if never)
  string last_used_at = 4;

  // allowed_kinds lists the component kinds this key may access (empty = all)
  repeated string allowed_kinds = 5;

  // allowed_names lists the specific component names this key may access (empty = all)
  repeated string allowed_names = 6;

  // name is the human-readable label assigned at creation time
  string name = 7;

  // capabilities are the API-key resource:action grants for this key
  repeated string capabilities = 8;

  // created_by is the email or subject of the identity that created this key
  string created_by = 9;
}

// ListAPIKeysRequest queries the API keys for a tenant.
message ListAPIKeysRequest {
  // tenant_id is the tenant whose keys to list
  string tenant_id = 1;
}

// ListAPIKeysResponse returns API key metadata (never raw key values).
message ListAPIKeysResponse {
  // keys is the list of API key metadata records
  repeated APIKeyInfo keys = 1;
}

// RevokeAPIKeyRequest permanently revokes an API key.
message RevokeAPIKeyRequest {
  // key_id is the identifier of the key to revoke
  string key_id = 1;
}

// RevokeAPIKeyResponse confirms the key was revoked.
message RevokeAPIKeyResponse {}

// ---------------------------------------------------------------------------
// Audit Log (authz-06) — request/response messages
// ---------------------------------------------------------------------------

// AuditEvent represents a single audit log entry.
message AuditEvent {
  // event_type is the action identifier, e.g. "component_grant_added"
  string event_type = 1;

  // timestamp is when the event occurred (RFC 3339 string)
  string timestamp = 2;

  // actor_user_id is the unique identifier of the user who performed the action
  string actor_user_id = 3;

  // actor_email is the email address of the actor
  string actor_email = 4;

  // tenant_id is the tenant this event belongs to
  string tenant_id = 5;

  // target_user_id is the user affected by the action, if any
  string target_user_id = 6;

  // target_resource is the resource affected, e.g. "team:my-team"
  string target_resource = 7;

  // details holds additional structured context about the event
  map<string, string> details = 8;

  // trace_id is the OTel trace ID for correlation with Grafana/Jaeger
  string trace_id = 9;
}

// ListAuditEventsRequest queries audit events for a tenant.
message ListAuditEventsRequest {
  // tenant_id is the tenant to query audit events for
  string tenant_id = 1;

  // event_types filters to specific event types (empty = all types)
  repeated string event_types = 2;

  // actor_user_id filters to events performed by a specific actor
  string actor_user_id = 3;

  // target_match is a text substring to match against target_resource
  string target_match = 4;

  // from_time restricts results to events at or after this time (RFC 3339 string)
  string from_time = 5;

  // to_time restricts results to events at or before this time (RFC 3339 string)
  string to_time = 6;

  // limit is the maximum number of events to return (default: 50, max: 500)
  int32 limit = 7;

  // cursor is the pagination cursor returned by the previous response
  string cursor = 8;
}

// ListAuditEventsResponse returns a page of audit events.
message ListAuditEventsResponse {
  // events is the list of audit events for this page
  repeated AuditEvent events = 1;

  // next_cursor is the cursor for fetching the next page (empty = last page)
  string next_cursor = 2;
}

// ---------------------------------------------------------------------------
// Identity and Access Management — request/response messages
// (prod-unimplemented-apis)
// ---------------------------------------------------------------------------

// ResetPasswordRequest triggers a password-reset action email via the identity provider.
message ResetPasswordRequest {
  // email is the user's email address to send the reset link to.
  string email = 1;

  // tenant_id is the tenant context for the reset operation.
  string tenant_id = 2;
}

// ResetPasswordResponse confirms that the reset email was triggered.
// Always returns success=true regardless of whether the email exists (no
// email enumeration).
message ResetPasswordResponse {
  // success is always true; present for forward-compatibility with retry logic.
  bool success = 1;
}

// RevokeUserSessionsRequest revokes one or all sessions for a given user.
message RevokeUserSessionsRequest {
  // tenant_id is the tenant context for the revocation.
  string tenant_id = 1;

  // user_id is the user ID whose sessions should be revoked.
  string user_id = 2;

  // session_id is the specific session to revoke.
  // When empty, all sessions for the user are revoked.
  string session_id = 3;
}

// RevokeUserSessionsResponse reports how many sessions were revoked.
message RevokeUserSessionsResponse {
  // revoked_count is the number of sessions that were successfully revoked.
  int32 revoked_count = 1;
}

// SuspendMemberRequest disables or reactivates a tenant member.
message SuspendMemberRequest {
  // tenant_id is the tenant context for the suspension.
  string tenant_id = 1;

  // user_id is the user ID of the member to suspend or reactivate.
  string user_id = 2;

  // suspend specifies the desired state: true = suspend (disable), false = reactivate (enable).
  bool suspend = 3;
}

// SuspendMemberResponse reports the updated member status.
message SuspendMemberResponse {
  // new_status is the member's status after the operation ("active" or "suspended").
  string new_status = 1;

  // warning carries a non-fatal message if FGA cleanup was incomplete.
  // Empty string when all operations succeeded.
  string warning = 2;
}

// GetUserProfileRequest queries a user's profile from the identity provider.
message GetUserProfileRequest {
  // tenant_id is the tenant context for the request.
  string tenant_id = 1;

  // user_id is the user ID whose profile to retrieve.
  string user_id = 2;
}

// UserProfileData carries the public profile fields for a user.
message UserProfileData {
  // id is the user ID.
  string id = 1;

  // email is the user's primary email address.
  string email = 2;

  // display_name is the user's preferred display name.
  string display_name = 3;

  // avatar_url is the URL of the user's profile picture.
  string avatar_url = 4;

  // status is the user's current account status ("active", "suspended", etc.).
  string status = 5;

  // created_at is the RFC 3339 timestamp when the account was created.
  string created_at = 6;
}

// GetUserProfileResponse carries the user's profile data.
message GetUserProfileResponse {
  // profile contains the user's public profile fields.
  UserProfileData profile = 1;
}

// UpdateUserProfileRequest updates mutable profile fields for a user.
// Email and role changes are not permitted through this endpoint.
message UpdateUserProfileRequest {
  // tenant_id is the tenant context for the update.
  string tenant_id = 1;

  // user_id is the user ID to update.
  string user_id = 2;

  // display_name is the new display name (empty = no change).
  string display_name = 3;

  // avatar_url is the new avatar URL (empty = no change).
  string avatar_url = 4;
}

// UpdateUserProfileResponse carries the user's updated profile data.
message UpdateUserProfileResponse {
  // profile contains the updated public profile fields.
  UserProfileData profile = 1;
}

// ---------------------------------------------------------------------------
// Findings Export — request/response messages
// (prod-unimplemented-apis)
// ---------------------------------------------------------------------------

// FindingFilters allows filtering the findings included in an export.
message FindingFilters {
  // severity filters by severity level (e.g., "critical", "high", "medium", "low", "info").
  repeated string severity = 1;

  // type filters by finding type or category.
  repeated string type = 2;

  // mission_id restricts the export to findings from a specific mission.
  string mission_id = 3;

  // search is a free-text search term applied across finding titles and descriptions.
  string search = 4;
}

// ExportFindingsRequest specifies the format and scope of a findings export.
message ExportFindingsRequest {
  // tenant_id is the tenant context for the export.
  string tenant_id = 1;

  // format is the desired output format: "json", "csv", or "sarif".
  string format = 2;

  // finding_ids restricts the export to specific findings by ID.
  // When empty, all findings matching filters are exported.
  repeated string finding_ids = 3;

  // filters provides additional filtering criteria.
  FindingFilters filters = 4;

  // include_remediation controls whether remediation guidance is included.
  bool include_remediation = 5;

  // include_evidence controls whether evidence details are included.
  bool include_evidence = 6;
}

// ExportFindingsResponse carries the serialized export content.
message ExportFindingsResponse {
  // data is the serialized export content in the requested format.
  bytes data = 1;

  // format is the format of the exported data (mirrors the request format).
  string format = 2;

  // filename is the suggested download filename for the export.
  string filename = 3;

  // count is the number of findings included in the export.
  int32 count = 4;
}

// ---------------------------------------------------------------------------
// Mission Drafts — request/response messages
// (prod-unimplemented-apis)
// ---------------------------------------------------------------------------

// SaveMissionDraftRequest persists a mission YAML draft.
message SaveMissionDraftRequest {
  // tenant_id is the tenant context for the draft.
  string tenant_id = 1;

  // name is the human-readable name for this draft.
  string name = 2;

  // yaml is the raw mission YAML content (maximum 512KB).
  string yaml = 3;

  // draft_id is the existing draft ID to update.
  // When empty, a new draft is created and its ID is returned.
  string draft_id = 4;
}

// SaveMissionDraftResponse returns the ID of the saved or updated draft.
message SaveMissionDraftResponse {
  // draft_id is the unique identifier of the saved draft.
  string draft_id = 1;
}

// ListMissionDraftsRequest queries the saved drafts for a tenant.
message ListMissionDraftsRequest {
  // tenant_id is the tenant context for the listing.
  string tenant_id = 1;
}

// MissionDraft carries the metadata for a saved mission draft.
message MissionDraft {
  // id is the unique identifier of the draft.
  string id = 1;

  // name is the human-readable name of the draft.
  string name = 2;

  // created_at is the RFC 3339 creation timestamp.
  string created_at = 3;

  // updated_at is the RFC 3339 last-update timestamp.
  string updated_at = 4;
}

// ListMissionDraftsResponse carries the list of mission drafts for a tenant.
message ListMissionDraftsResponse {
  // drafts is the list of saved mission drafts, ordered by update time descending.
  repeated MissionDraft drafts = 1;
}

// ---------------------------------------------------------------------------
// Quota Management — request/response messages
// ---------------------------------------------------------------------------

// TenantQuota defines the resource limits for a tenant.
message TenantQuota {
  // max_missions is the maximum number of concurrent running missions allowed.
  // Zero means no limit.
  int32 max_missions = 1;

  // max_agents is the maximum number of registered agents allowed.
  // Zero means no limit.
  int32 max_agents = 2;

  // max_findings is the maximum number of findings stored across all missions.
  // Zero means no limit.
  int64 max_findings = 3;

  // plan_tier identifies the subscription plan (e.g., "free", "pro", "enterprise").
  string plan_tier = 4;
}

// GetTenantQuotaRequest requests the quota configuration for a tenant.
message GetTenantQuotaRequest {
  // tenant_id is the target tenant. If empty, the caller's tenant is used.
  string tenant_id = 1;
}

// GetTenantQuotaResponse carries the tenant quota configuration plus the
// current usage snapshot sourced from Redis counters. Limits come from
// Postgres `tenant_quotas` (the plan-based fields); legacy runtime caps
// remain on the nested TenantQuota.
message GetTenantQuotaResponse {
  // quota contains the legacy runtime caps (max_missions/agents/findings).
  TenantQuota quota = 1;

  // Plan-based limits (mirroring UpsertTenantQuotaRequest). These are the
  // authoritative quotas the Plan & Usage page renders.
  int32 seats = 2;
  int32 concurrent_agents = 3;
  int32 storage_gb = 4;
  int32 retention_days = 5;
  int32 sandbox_launches_per_month = 6;

  // updated_at is the Postgres row's last-written timestamp (RFC 3339).
  string updated_at = 7;

  // Usage snapshot fields — zero when the underlying counter is missing.
  int32 current_seats = 8;
  int32 current_concurrent_agents = 9;
  int32 current_storage_gb = 10;
  int32 current_sandbox_launches_this_month = 11;
}

// SetTenantQuotaRequest sets the quota configuration for a tenant.
message SetTenantQuotaRequest {
  // tenant_id is the target tenant. Required.
  string tenant_id = 1;

  // quota contains the new limits to apply.
  TenantQuota quota = 2;
}

// SetTenantQuotaResponse confirms the quota update.
message SetTenantQuotaResponse {
  // quota contains the updated limits as stored.
  TenantQuota quota = 1;
}

// ---------------------------------------------------------------------------
// User Management — request/response messages (prod-feature-wiring)
// ---------------------------------------------------------------------------

// UserSession describes an active session for a user.
message UserSession {
  // id is the session identifier.
  string id = 1;

  // ip_address is the client IP that initiated the session.
  string ip_address = 2;

  // started_at_unix is the session creation time as a Unix timestamp (seconds).
  int64 started_at_unix = 3;

  // last_active_at_unix is the most recent activity time as a Unix timestamp.
  int64 last_active_at_unix = 4;

  // client is the client ID the session was created for.
  string client = 5;
}

// GetUserSessionsRequest queries active sessions for a user.
message GetUserSessionsRequest {
  // tenant_id is the tenant context. If empty, the caller's tenant is used.
  string tenant_id = 1;

  // user_id is the user ID whose sessions to retrieve.
  string user_id = 2;
}

// GetUserSessionsResponse carries the list of active sessions.
message GetUserSessionsResponse {
  // sessions is the list of active sessions for the user.
  repeated UserSession sessions = 1;
}

// ---------------------------------------------------------------------------
// Alerts — request/response messages (prod-feature-wiring)
// ---------------------------------------------------------------------------

// Alert represents a platform notification for a tenant user.
message Alert {
  // id is the unique alert identifier.
  string id = 1;

  // tenant_id is the tenant this alert belongs to.
  string tenant_id = 2;

  // user_id is the user this alert is addressed to. Empty means broadcast.
  string user_id = 3;

  // title is the short alert heading.
  string title = 4;

  // body is the full alert message body.
  string body = 5;

  // severity is the alert urgency level (e.g., "info", "warning", "critical").
  string severity = 6;

  // read indicates whether the user has acknowledged this alert.
  bool read = 7;

  // created_at_unix is the alert creation time as a Unix timestamp (seconds).
  int64 created_at_unix = 8;

  // source identifies the subsystem that generated the alert (e.g., "mission", "billing").
  string source = 9;

  // source_id is the resource ID within the source system (e.g., mission ID).
  string source_id = 10;
}

// ListAlertsRequest queries alerts for a tenant user.
message ListAlertsRequest {
  // tenant_id is the tenant context. If empty, the caller's tenant is used.
  string tenant_id = 1;

  // user_id is the user whose alerts to list.
  string user_id = 2;

  // unread_only restricts results to unread alerts when true.
  bool unread_only = 3;

  // limit is the maximum number of alerts to return (default 50, max 200).
  int32 limit = 4;
}

// ListAlertsResponse carries the list of alerts.
message ListAlertsResponse {
  // alerts is the list of alerts, ordered by creation time descending.
  repeated Alert alerts = 1;
}

// MarkAlertReadRequest marks a single alert as read.
message MarkAlertReadRequest {
  // tenant_id is the tenant context. If empty, the caller's tenant is used.
  string tenant_id = 1;

  // alert_id is the unique identifier of the alert to mark as read.
  string alert_id = 2;
}

// MarkAlertReadResponse confirms the alert was marked as read.
message MarkAlertReadResponse {}

// MarkAllAlertsReadRequest marks all alerts for a user as read.
message MarkAllAlertsReadRequest {
  // tenant_id is the tenant context. If empty, the caller's tenant is used.
  string tenant_id = 1;

  // user_id is the user whose alerts to mark as read.
  string user_id = 2;
}

// MarkAllAlertsReadResponse confirms the bulk-read operation.
message MarkAllAlertsReadResponse {
  // count is the number of alerts that were marked as read.
  int32 count = 1;
}

// ---------------------------------------------------------------------------
// Chat Conversations — request/response messages (prod-feature-wiring)
// ---------------------------------------------------------------------------

// ConversationSummary carries metadata for a single conversation.
message ConversationSummary {
  // id is the unique conversation identifier.
  string id = 1;

  // tenant_id is the tenant context.
  string tenant_id = 2;

  // user_id is the user who owns the conversation.
  string user_id = 3;

  // title is the conversation display title.
  string title = 4;

  // created_at_unix is the conversation creation time as a Unix timestamp.
  int64 created_at_unix = 5;

  // updated_at_unix is the most recent message time as a Unix timestamp.
  int64 updated_at_unix = 6;

  // message_count is the total number of messages in the conversation.
  int32 message_count = 7;
}

// ConversationMessage is a single message within a conversation.
message ConversationMessage {
  // id is the unique message identifier.
  string id = 1;

  // role is the message author role (e.g., "user", "assistant").
  string role = 2;

  // content is the message text content.
  string content = 3;

  // created_at_unix is the message creation time as a Unix timestamp.
  int64 created_at_unix = 4;
}

// ListConversationsRequest queries the conversation list for a user.
message ListConversationsRequest {
  // tenant_id is the tenant context. If empty, the caller's tenant is used.
  string tenant_id = 1;

  // user_id is the user whose conversations to list.
  string user_id = 2;

  // limit is the maximum number of conversations to return (default 20, max 100).
  int32 limit = 3;
}

// ListConversationsResponse carries the list of conversation summaries.
message ListConversationsResponse {
  // conversations is the list of conversations, ordered by update time descending.
  repeated ConversationSummary conversations = 1;
}

// GetConversationRequest fetches the full message history for a conversation.
message GetConversationRequest {
  // conversation_id is the unique identifier of the conversation.
  string conversation_id = 1;

  // tenant_id is the tenant context. If empty, the caller's tenant is used.
  string tenant_id = 2;
}

// GetConversationResponse carries the conversation and its messages.
message GetConversationResponse {
  // conversation contains the conversation metadata.
  ConversationSummary conversation = 1;

  // messages contains all messages in the conversation, ordered by creation time.
  repeated ConversationMessage messages = 2;
}

// ---------------------------------------------------------------------------
// Agent Auth Protocol — message types (agent-auth-fga-integration)
// ---------------------------------------------------------------------------

// AgentCapabilityGrant describes a single capability an agent is permitted to exercise.
message AgentCapabilityGrant {
  // capability_name is the canonical name, e.g. "execute:tool:nmap".
  string capability_name = 1;

  // component_ref is the FGA object reference, e.g. "component:nmap".
  string component_ref = 2;

  // description is the human-readable description from the component registry.
  string description = 3;

  // input_schema is an optional JSON Schema for the capability's arguments.
  bytes input_schema = 4;
}

// RegisterAgentAuthRequest registers a new agent + host pair under a tenant.
message RegisterAgentAuthRequest {
  // tenant_id is the tenant that owns this agent.
  string tenant_id = 1;

  // owner_user_id is the user who owns this agent (from the caller's auth context).
  string owner_user_id = 2;

  // agent_name is a human-readable label for the agent.
  string agent_name = 3;

  // agent_mode is "delegated" or "autonomous".
  string agent_mode = 4;

  // host_public_key_jwk is the Ed25519 JWK for the host.
  bytes host_public_key_jwk = 5;

  // agent_public_key_jwk is the Ed25519 JWK for the agent.
  bytes agent_public_key_jwk = 6;

  // bootstrap_type is the credential type used: "api_key", "k8s_sa", or "host_key".
  string bootstrap_type = 7;

  // bootstrap_credential is the raw token used for bootstrap (daemon validates it).
  string bootstrap_credential = 8;
}

// RegisterAgentAuthResponse is returned after successful agent registration.
message RegisterAgentAuthResponse {
  // agent_id is the newly created agent identifier (agt_xxxx).
  string agent_id = 1;

  // host_id is the host identifier.
  string host_id = 2;

  // capabilities are the FGA-resolved grants written for this agent.
  repeated AgentCapabilityGrant capabilities = 3;

  // status is "active" or "pending".
  string status = 4;
}

// ExecuteAgentCapabilityRequest requests execution of a named capability.
message ExecuteAgentCapabilityRequest {
  // agent_id is the agent requesting execution.
  string agent_id = 1;

  // capability_name is the capability to execute, e.g. "execute:tool:nmap".
  string capability_name = 2;

  // arguments is the JSON-encoded arguments for the capability.
  bytes arguments = 3;

  // tenant_id is the tenant context.
  string tenant_id = 4;
}

// ExecuteAgentCapabilityResponse is returned after a capability execution check.
message ExecuteAgentCapabilityResponse {
  // result is the JSON-encoded execution result (empty for stubbed dispatch).
  bytes result = 1;

  // status is "success" or "error".
  string status = 2;

  // error_message is set when status == "error".
  string error_message = 3;
}

// GetAgentAuthStatusRequest fetches status for a single agent.
message GetAgentAuthStatusRequest {
  // agent_id is the agent to retrieve.
  string agent_id = 1;

  // tenant_id is the tenant context.
  string tenant_id = 2;
}

// GetAgentAuthStatusResponse carries agent status and capability grants.
message GetAgentAuthStatusResponse {
  // agent_id is the agent identifier.
  string agent_id = 1;

  // host_id is the host the agent is registered under.
  string host_id = 2;

  // status is "active", "pending", or "revoked".
  string status = 3;

  // mode is "delegated" or "autonomous".
  string mode = 4;

  // owner_user_id is the agent owner's user ID.
  string owner_user_id = 5;

  // capabilities are the active capability grants for this agent.
  repeated AgentCapabilityGrant capabilities = 6;

  // last_active_at is the last activity timestamp as a Unix epoch second (0 if never).
  int64 last_active_at = 7;

  // created_at is the creation timestamp as a Unix epoch second.
  int64 created_at = 8;
}

// RevokeAgentAuthRequest revokes an agent and all its grants.
message RevokeAgentAuthRequest {
  // agent_id is the agent to revoke.
  string agent_id = 1;

  // tenant_id is the tenant context.
  string tenant_id = 2;
}

// RevokeAgentAuthResponse is empty on success.
message RevokeAgentAuthResponse {}

// ListAgentAuthAgentsRequest returns a paginated list of agents for a tenant.
message ListAgentAuthAgentsRequest {
  // tenant_id is the tenant to list agents for.
  string tenant_id = 1;

  // limit is the maximum number of agents to return (default 50).
  int32 limit = 2;

  // offset is the pagination offset.
  int32 offset = 3;
}

// ListAgentAuthAgentsResponse carries the paginated agent list.
message ListAgentAuthAgentsResponse {
  // agents is the list of agent status records.
  repeated GetAgentAuthStatusResponse agents = 1;

  // total is the total number of agents (before pagination).
  int32 total = 2;
}

// ListAgentCapabilitiesRequest resolves capabilities for a user.
message ListAgentCapabilitiesRequest {
  // tenant_id is the tenant context.
  string tenant_id = 1;

  // user_id is the user whose capabilities should be resolved.
  string user_id = 2;
}

// ListAgentCapabilitiesResponse carries the resolved capabilities.
message ListAgentCapabilitiesResponse {
  // capabilities is the list of FGA-resolved capability grants for the user.
  repeated AgentCapabilityGrant capabilities = 1;
}

// CreateHostRegistrationTokenRequest issues a single-use host API key.
message CreateHostRegistrationTokenRequest {
  // tenant_id is the tenant to issue the token for.
  string tenant_id = 1;

  // ttl_hours is the token TTL in hours (default 24, max 168).
  int32 ttl_hours = 2;

  // name is the human-readable label for the token.
  string name = 3;
}

// CreateHostRegistrationTokenResponse carries the newly issued raw token.
message CreateHostRegistrationTokenResponse {
  // raw_token is the full API key — shown once, never stored.
  string raw_token = 1;

  // key_id is the stable, non-secret key identifier.
  string key_id = 2;

  // expires_at is the expiry timestamp as a Unix epoch second.
  int64 expires_at = 3;
}

// ListComponentGrantsRequest lists all FGA component grants for a tenant.
message ListComponentGrantsRequest {
  // tenant_id is the tenant to list grants for.
  string tenant_id = 1;
}

// AgentComponentGrant describes a single FGA grant for a user on a component,
// as returned by ListComponentGrants.
message AgentComponentGrant {
  // user_id is the user (or team) that holds the grant.
  string user_id = 1;

  // component_ref is the FGA object reference, e.g. "component:nmap".
  string component_ref = 2;

  // can_execute is true when the user has can_execute on the component.
  bool can_execute = 3;

  // can_configure is true when the user has can_configure on the component.
  bool can_configure = 4;

  // can_read is true when the user has can_read on the component.
  bool can_read = 5;

  // grant_source describes how the grant was derived: "direct", "team:X", "admin".
  string grant_source = 6;
}

// ListComponentGrantsResponse carries the list of component grants.
message ListComponentGrantsResponse {
  // grants is the list of resolved component grants.
  repeated AgentComponentGrant grants = 1;
}

// GrantChangeV2 describes a single grant or revoke operation for any principal.
message GrantChangeV2 {
  // user_id is the user or team ID that the grant applies to.
  string user_id = 1;

  // principal_type is "user" or "team".
  string principal_type = 2;

  // component_ref is the FGA object reference, e.g. "component:nmap".
  string component_ref = 3;

  // action is "execute", "configure", or "read".
  string action = 4;

  // grant is true to add the relation, false to remove it.
  bool grant = 5;
}

// BatchGrantComponentAccessV2Request applies bulk grant/revoke operations.
message BatchGrantComponentAccessV2Request {
  // tenant_id is the tenant context.
  string tenant_id = 1;

  // changes is the list of grant/revoke operations to apply.
  repeated GrantChangeV2 changes = 2;
}

// BatchGrantComponentAccessV2Response carries the count of applied operations.
message BatchGrantComponentAccessV2Response {
  // applied is the number of operations successfully applied.
  int32 applied = 1;
}

// ListAuditLogRequest queries the Postgres audit_log table for a tenant.
message ListAuditLogRequest {
  // tenant_id is the tenant to query audit events for.
  string tenant_id = 1;

  // actor_id filters by actor (optional).
  string actor_id = 2;

  // action filters by action name (optional).
  string action = 3;

  // target_type filters by target type (optional).
  string target_type = 4;

  // limit is the maximum number of entries to return (default 100).
  int32 limit = 5;

  // offset is the pagination offset.
  int32 offset = 6;
}

// AuditLogEntry is a single row from the Postgres audit_log table.
message AuditLogEntry {
  // id is the unique audit event identifier.
  string id = 1;

  // actor_id is the subject that performed the action.
  string actor_id = 2;

  // actor_type is "user", "agent", or "system".
  string actor_type = 3;

  // action is the event name, e.g. "agent_registered".
  string action = 4;

  // target_type is the type of the affected resource.
  string target_type = 5;

  // target_id is the identifier of the affected resource.
  string target_id = 6;

  // decision is "allow", "deny", or "" for non-authz events.
  string decision = 7;

  // metadata is a JSON object with additional event context.
  bytes metadata = 8;

  // created_at is the event timestamp as a Unix epoch second.
  int64 created_at = 9;
}

// ListAuditLogResponse carries the paginated audit log entries.
message ListAuditLogResponse {
  // entries is the list of audit log entries.
  repeated AuditLogEntry entries = 1;

  // total is the total count before pagination.
  int32 total = 2;
}

// ---------------------------------------------------------------------------
// Tool catalog refresh RPC messages
// ---------------------------------------------------------------------------

// RefreshToolCatalogRequest carries optional knobs for forced catalog refresh.
message RefreshToolCatalogRequest {
  // force, when true, triggers a refresh even if one was completed very
  // recently. Currently advisory — the daemon always queues the signal
  // and the refresher coalesces back-to-back calls into a single tick.
  bool force = 1;
}

// RefreshToolCatalogResponse carries the refresh outcome.
message RefreshToolCatalogResponse {
  // queued is true when the refresh signal was accepted by the leader
  // replica. False when this replica is not the leader (the next leader
  // tick will refresh) or when the refresher is not running.
  bool queued = 1;

  // message is a human-readable explanation of the outcome.
  string message = 2;
}

// ---------------------------------------------------------------------------
// LLM Providers — introspection messages
// ---------------------------------------------------------------------------

// GetSupportedProvidersRequest has no fields; it's a capability query.
message GetSupportedProvidersRequest {}

// GetSupportedProvidersResponse lists every provider type the daemon can
// construct, with per-provider credential schemas and default model
// catalogues. The dashboard renders its provider-config form from this
// response — one entry per provider in the type dropdown, one form field
// per CredentialField under the selected entry.
message GetSupportedProvidersResponse {
  // providers is the ordered list of provider descriptors.
  repeated ProviderDescriptor providers = 1;
}

// ProviderDescriptor describes a single LLM provider type Gibson can
// construct — type identifier, human-facing metadata, credential form
// schema, and default model catalogue. Mirrors
// `internal/llm/providers.ProviderDescriptor` 1:1.
message ProviderDescriptor {
  // type is the provider type identifier (e.g. "bedrock", "openai").
  string type = 1;

  // display_name is the human-facing label shown in the dashboard dropdown
  // (e.g. "AWS Bedrock", "Anthropic (Claude)").
  string display_name = 2;

  // docs_url points at the upstream provider's credential/setup docs.
  string docs_url = 3;

  // self_hosted is true for providers running on operator-controlled
  // infrastructure (Ollama, Llamafile, Local) — the dashboard can omit
  // test-connection buttons and bill-tracking warnings for these.
  bool self_hosted = 4;

  // credentials is the form schema — one CredentialField per input the
  // operator must supply in the dashboard form.
  repeated CredentialField credentials = 5;

  // default_models is the catalogue the provider would report from
  // Models(), so the dashboard can populate a model picker without
  // constructing the provider.
  repeated ModelDescriptor default_models = 6;
}

// CredentialField describes a single credential input in the provider-config
// form. Mirrors `internal/llm.CredentialField` 1:1.
message CredentialField {
  // key is the ProviderConfig.Extra map key the daemon resolver reads (or
  // the typed field name: "api_key", "base_url").
  string key = 1;

  // label is the human-facing form label.
  string label = 2;

  // required flags the field as mandatory for successful construction.
  bool required = 3;

  // secret tells the dashboard to render a password input and mask the
  // value in any logs or audit records.
  bool secret = 4;

  // placeholder is an example value shown in the empty input.
  string placeholder = 5;

  // help is a short description rendered beneath the field (Markdown-free).
  string help = 6;
}

// ModelDescriptor describes a single model in a provider's catalogue.
// Mirrors `internal/llm.ModelInfo` shape.
message ModelDescriptor {
  // name is the model identifier passed through to the provider.
  string name = 1;

  // context_window is the maximum tokens the model can process.
  int32 context_window = 2;

  // max_output is the maximum tokens the model can generate.
  int32 max_output = 3;

  // features lists the capabilities this model supports
  // (chat, streaming, tools, vision, json_mode).
  repeated string features = 4;
}

// ---------------------------------------------------------------------------
// Entitlement tuple writes (spec agent-authoring-and-tenant-entitlements)
// ---------------------------------------------------------------------------

// AccessTuple is the wire form of an FGA relationship tuple. Mirrors
// authz.Tuple in the daemon's internal authz package.
message AccessTuple {
  string user = 1;     // "user:alice" | "tenant:acme#member" | …
  string relation = 2; // "can_read" | "tenant_execute_disabled" | …
  string object = 3;   // "component:plugin/gitlab" | "tenant:acme" | …
}

message WriteAccessTuplesRequest {
  repeated AccessTuple add = 1;
  repeated AccessTuple delete = 2;
  // reason is attached to the per-write audit event for operator traceability.
  string reason = 3;
}

message WriteAccessTuplesResponse {
  int32 added = 1;
  int32 deleted = 2;
}

message UpsertTenantQuotaRequest {
  string tenant_id = 1;
  int32 seats = 2;
  int32 concurrent_agents = 3;
  int32 storage_gb = 4;
  int32 retention_days = 5;
  int32 sandbox_launches_per_month = 6;
}

message UpsertTenantQuotaResponse {
  // updated_at is the new row's timestamp.
  string updated_at = 1;
}

message ListFeatureTuplesRequest {
  string tenant_id = 1;
}

message ListFeatureTuplesResponse {
  // tuples is the set of `tenant:{id}#has_*@tenant:{id}` tuples currently
  // present. Relation strings are the bare feature names ("has_sso",
  // "has_audit_logs", etc.).
  repeated string relations = 1;
}

message SeedCatalogTenantEnabledRequest {
  string tenant_id = 1;
}

message SeedCatalogTenantEnabledResponse {
  int32 tuples_written = 1;
}

// AuditEventMessage is the wire shape for EmitAuditEvent. Mirrors the
// in-memory audit.Event struct's exported fields. Empty strings in scalar
// fields indicate "not applicable".
message AuditEventMessage {
  // type is the event class: "access_tuple_change", "entitlements_reconcile",
  // "authz_deny", etc.
  string type = 1;

  // actor_subject is the caller identity (ignored on EmitAuditEvent — the
  // handler overwrites it with the SPIFFE identity of the emitting workload).
  string actor_subject = 2;

  // actor_source classifies the caller: "operator", "platform",
  // "tenant_admin", "user", "system", "unknown".
  string actor_source = 3;

  // tuple formatted as "{user}#{relation}@{object}"; empty for non-tuple
  // events such as reconcile summaries.
  string tuple = 4;

  // action_class is "read" | "write" | "execute" | "" (non-catalog).
  string action_class = 5;

  // scope_type is "tenant" | "team" | "user" | "component" | "feature" | "".
  string scope_type = 6;

  // operation is "write" | "delete" for tuple events.
  string operation = 7;

  // reason is an operator-supplied justification string; must not carry
  // secrets or PII (sanitisation is the caller's responsibility).
  string reason = 8;

  // timestamp RFC 3339; server overrides when empty.
  string timestamp = 9;

  // fields is a catch-all for event-type-specific payloads (e.g.,
  // reconcile-summary fields such as added_feature_tuples count).
  map<string, string> fields = 10;
}

message EmitAuditEventRequest {
  AuditEventMessage event = 1;
}

message EmitAuditEventResponse {}

// ---------------------------------------------------------------------------
// LLM Providers — CRUD + execution messages (spec 25)
// ---------------------------------------------------------------------------

// ProviderRecord is the read-side representation of a stored provider config.
// Credentials are always masked: {"api_key": "****abc"}.
message ProviderRecord {
  // id is the server-generated UUID for this provider record.
  string id = 1;

  // name is the tenant-scoped human name for this provider.
  string name = 2;

  // type is the provider type identifier (e.g. "anthropic", "openai", "bedrock").
  string type = 3;

  // default_model is the model name used when the caller does not specify one.
  string default_model = 4;

  // is_default indicates this provider is the tenant's default.
  bool is_default = 5;

  // enabled indicates whether this provider is active.
  bool enabled = 6;

  // credentials_masked holds masked credential values for display only.
  // Format: {"api_key": "****xyz"} — last 4 chars visible, rest masked.
  // Fields shorter than 8 characters are fully masked as "****".
  map<string, string> credentials_masked = 7;

  // created_at is the RFC 3339 creation timestamp.
  string created_at = 8;

  // updated_at is the RFC 3339 last-update timestamp.
  string updated_at = 9;
}

// ProviderConfigInput is the write-side shape accepted by CreateProvider and
// UpdateProvider. Credentials are plaintext on the wire; the daemon encrypts
// them immediately and never persists the plaintext.
message ProviderConfigInput {
  // name is the tenant-scoped human name for this provider.
  string name = 1;

  // type is the provider type identifier (e.g. "anthropic", "openai").
  string type = 2;

  // default_model is the model name to use when none is specified by the caller.
  string default_model = 3;

  // credentials holds plaintext credential values (e.g. {"api_key": "sk-..."}).
  // Daemon encrypts immediately via AES-256-GCM + KeyProvider. Never stored
  // or logged in plaintext.
  map<string, string> credentials = 4;

  // set_as_default, when true, atomically designates this provider as the
  // tenant's default after a successful create or update.
  bool set_as_default = 5;
}

// ResponseFormat controls the structure of the LLM's output.
message ResponseFormat {
  // type is "text", "json_object", or "json_schema".
  string type = 1;

  // name is the schema name (json_schema mode only).
  string name = 2;

  // schema_json is the JSON-encoded schema (json_schema mode only).
  string schema_json = 3;

  // strict enables strict schema adherence when supported by the provider.
  bool strict = 4;
}

// ToolCallDelta carries incremental tool-call information in a streaming response.
message ToolCallDelta {
  // index identifies which tool call this delta belongs to (0-based).
  int32 index = 1;

  // id is the tool call identifier (present on the first delta for this index).
  string id = 2;

  // name is the tool name (present on the first delta for this index).
  string name = 3;

  // arguments_delta is an incremental fragment of the JSON arguments string.
  string arguments_delta = 4;
}

// LLMTokenUsage reports token consumption for an LLM completion.
// Mirrors gibson.harness.v1.TokenUsage; defined locally to avoid
// cross-module proto imports in the buf build graph.
message LLMTokenUsage {
  int32 input_tokens = 1;
  int32 output_tokens = 2;
  int32 total_tokens = 3;
}

// LLMMessageContent is a single message in a conversation.
// Mirrors gibson.harness.v1.LLMMessage; defined locally for the same reason.
message LLMMessageContent {
  // role is "system", "user", "assistant", or "tool".
  string role = 1;

  // content is the text content of the message.
  string content = 2;

  // tool_calls are any tool calls requested by this message.
  repeated LLMToolCall tool_calls = 3;

  // tool_results are tool-call results included in this message.
  repeated LLMToolResult tool_results = 4;

  // name is the tool name, for tool-role messages.
  string name = 5;
}

// LLMToolCall describes a tool invocation requested by the LLM.
// Mirrors gibson.harness.v1.ToolCall.
message LLMToolCall {
  string id = 1;
  string name = 2;
  // arguments is a JSON-encoded string of the tool call arguments.
  string arguments = 3;
}

// LLMToolResult carries the output of a tool call.
// Mirrors gibson.harness.v1.ToolResult.
message LLMToolResult {
  string tool_call_id = 1;
  string content = 2;
  bool is_error = 3;
}

// LLMToolDef defines a tool the LLM may invoke.
// Mirrors gibson.harness.v1.ToolDef.
message LLMToolDef {
  string name = 1;
  string description = 2;
  // parameters_json is the JSON-encoded JSON Schema for the tool arguments.
  string parameters_json = 3;
}

// ProviderHarnessError carries an error from the LLM execution path.
// Mirrors gibson.harness.v1.HarnessError; defined locally for the same reason.
message ProviderHarnessError {
  // code is a numeric error code (maps to gibson.common.v1.ErrorCode values).
  int32 code = 1;
  string message = 2;
  bool retryable = 3;
}

// StreamFinish is emitted as the final chunk of a StreamLLM response.
message StreamFinish {
  // finish_reason is "stop", "length", "tool_calls", or "content_filter".
  string finish_reason = 1;

  // usage reports token consumption for the full streamed completion.
  LLMTokenUsage usage = 2;
}

// --- ListProviders ---

message ListProvidersRequest {}

message ListProvidersResponse {
  // providers is the list of provider configs for the calling tenant.
  repeated ProviderRecord providers = 1;
}

// --- GetProvider ---

message GetProviderRequest {
  // name is the tenant-scoped provider name to retrieve.
  string name = 1;
}

message GetProviderResponse {
  // provider is the matching provider config with masked credentials.
  ProviderRecord provider = 1;
}

// --- CreateProvider ---

message CreateProviderRequest {
  // input contains the provider config to create.
  ProviderConfigInput input = 1;
}

message CreateProviderResponse {
  // provider is the newly created config with masked credentials.
  ProviderRecord provider = 1;
}

// --- UpdateProvider ---

message UpdateProviderRequest {
  // name is the tenant-scoped provider name to update.
  string name = 1;

  // input contains the replacement config. Empty credential values mean
  // "retain the stored value"; non-empty values replace it.
  ProviderConfigInput input = 2;
}

message UpdateProviderResponse {
  // provider is the updated config with masked credentials.
  ProviderRecord provider = 1;
}

// --- DeleteProvider ---

message DeleteProviderRequest {
  // name is the tenant-scoped provider name to delete.
  string name = 1;
}

message DeleteProviderResponse {}

// --- TestProvider ---

message TestProviderRequest {
  // input contains the provider config to validate. Not persisted.
  ProviderConfigInput input = 1;
}

message TestProviderResponse {
  // ok is true when the upstream returned a successful response.
  bool ok = 1;

  // latency_ms is the round-trip time in milliseconds (always reported).
  int64 latency_ms = 2;

  // model is the model that was used for the test completion.
  string model = 3;

  // error is the cleaned upstream error message when ok is false.
  string error = 4;
}

// --- GetProviderHealth ---

message GetProviderHealthRequest {
  // name is the tenant-scoped provider name to check.
  string name = 1;
}

message GetProviderHealthResponse {
  // healthy is true when the provider's last health check succeeded.
  bool healthy = 1;

  // last_checked_at is the RFC 3339 timestamp of the last health check.
  string last_checked_at = 2;

  // error is set when healthy is false.
  string error = 3;
}

// --- GetDefaultProvider ---

message GetDefaultProviderRequest {}

message GetDefaultProviderResponse {
  // provider is the tenant's default provider config, or absent if none is set.
  ProviderRecord provider = 1;
}

// --- SetDefaultProvider ---

message SetDefaultProviderRequest {
  // name is the tenant-scoped provider name to designate as default.
  string name = 1;
}

message SetDefaultProviderResponse {
  // provider is the updated provider record (now is_default=true).
  ProviderRecord provider = 1;
}

// --- GetFallbackChain ---

message GetFallbackChainRequest {}

message GetFallbackChainResponse {
  // provider_names is the ordered list of provider names in the fallback chain.
  repeated string provider_names = 1;
}

// --- SetFallbackChain ---

message SetFallbackChainRequest {
  // provider_names is the new ordered fallback chain. All names must refer to
  // existing stored providers.
  repeated string provider_names = 1;
}

message SetFallbackChainResponse {
  // provider_names is the fallback chain as stored (mirrors the request).
  repeated string provider_names = 1;
}

// --- ExecuteLLM ---

// ExecuteLLMRequest carries a single (non-streaming) LLM completion request.
// The daemon resolves provider_name to a stored credential, decrypts it, and
// dispatches to the appropriate langchaingo provider. The plaintext credential
// never leaves daemon process memory.
message ExecuteLLMRequest {
  // provider_name resolves to a ProviderRecord in the tenant's credential store.
  string provider_name = 1;

  // model overrides the provider's default_model when set.
  string model = 2;

  // messages is the conversation history to send to the LLM.
  repeated LLMMessageContent messages = 3;

  // tools is the optional set of tool definitions to expose to the LLM.
  repeated LLMToolDef tools = 4;

  // response_format controls the structure of the LLM's output.
  optional ResponseFormat response_format = 5;

  // temperature controls the randomness of the output (0.0–2.0).
  optional double temperature = 6;

  // max_tokens is the maximum number of tokens to generate.
  optional int32 max_tokens = 7;

  // top_p is the nucleus-sampling probability mass (0.0–1.0).
  optional double top_p = 8;

  // stop is a list of sequences that cause the model to stop generating.
  repeated string stop = 9;
}

// ExecuteLLMResponse carries the result of a non-streaming LLM completion.
message ExecuteLLMResponse {
  // content is the text response from the LLM.
  string content = 1;

  // tool_calls is the list of tool calls the LLM requested.
  repeated LLMToolCall tool_calls = 2;

  // finish_reason is "stop", "length", "tool_calls", or "content_filter".
  string finish_reason = 3;

  // usage reports token consumption for this completion.
  LLMTokenUsage usage = 4;
}

// --- StreamLLM ---

// StreamLLMRequest carries a streaming LLM completion request.
// Fields are identical to ExecuteLLMRequest.
message StreamLLMRequest {
  // provider_name resolves to a ProviderRecord in the tenant's credential store.
  string provider_name = 1;

  // model overrides the provider's default_model when set.
  string model = 2;

  // messages is the conversation history to send to the LLM.
  repeated LLMMessageContent messages = 3;

  // tools is the optional set of tool definitions to expose to the LLM.
  repeated LLMToolDef tools = 4;

  // response_format controls the structure of the LLM's output.
  optional ResponseFormat response_format = 5;

  // temperature controls the randomness of the output (0.0–2.0).
  optional double temperature = 6;

  // max_tokens is the maximum number of tokens to generate.
  optional int32 max_tokens = 7;

  // top_p is the nucleus-sampling probability mass (0.0–1.0).
  optional double top_p = 8;

  // stop is a list of sequences that cause the model to stop generating.
  repeated string stop = 9;
}

// StreamLLMResponse is one chunk in a server-streaming LLM response.
// Exactly one of the payload variants is set per message.
message StreamLLMResponse {
  oneof payload {
    // text_delta is an incremental text fragment.
    string text_delta = 1;

    // tool_call_delta carries an incremental tool-call fragment.
    ToolCallDelta tool_call_delta = 2;

    // finish is the terminal chunk carrying finish_reason and usage.
    StreamFinish finish = 3;

    // error carries a harness error that terminates the stream.
    ProviderHarnessError error = 4;
  }
}
