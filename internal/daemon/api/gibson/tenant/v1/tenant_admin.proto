syntax = "proto3";

package gibson.tenant.v1;

option go_package = "github.com/zero-day-ai/gibson/internal/daemon/api/gibson/tenant/v1;tenantv1";

import "google/protobuf/timestamp.proto";

// TenantAdminService provides tenant-admin operations for managing agent identities
// and other tenant-scoped administrative tasks. This is the canonical tenant-admin
// gRPC service, authoritative as of admin-services-completion spec.
//
// All RPCs require the caller to hold the "admin" FGA relation on their tenant.
// Access is gated by the Envoy jwt_authn + ext_authz filter chain.
service TenantAdminService {
  // CreateAgentIdentity provisions a new machine identity for an agent, tool, or plugin.
  // Returns a one-time client_secret that cannot be recovered after this call.
  rpc CreateAgentIdentity(CreateAgentIdentityRequest) returns (CreateAgentIdentityResponse);

  // ListAgentIdentities returns all agent/tool/plugin identities provisioned in the
  // caller's tenant, with optional kind filtering and pagination.
  rpc ListAgentIdentities(ListAgentIdentitiesRequest) returns (ListAgentIdentitiesResponse);

  // RevokeAgentIdentity permanently revokes a machine identity. Existing JWTs stop
  // validating within the IdP token TTL (<=60 seconds). Idempotent on already-revoked
  // principals (returns NotFound).
  rpc RevokeAgentIdentity(RevokeAgentIdentityRequest) returns (RevokeAgentIdentityResponse);

  // ---------------------------------------------------------------------------
  // Observability — Langfuse credentials
  // ---------------------------------------------------------------------------

  // GetTenantLangfuseCredentials retrieves the Langfuse project credentials for a tenant.
  // Returns NOT_FOUND if no credentials have been configured for the tenant.
  rpc GetTenantLangfuseCredentials(GetTenantLangfuseCredentialsRequest) returns (GetTenantLangfuseCredentialsResponse);

  // SetTenantLangfuseCredentials stores or updates Langfuse project credentials for a tenant.
  rpc SetTenantLangfuseCredentials(SetTenantLangfuseCredentialsRequest) returns (SetTenantLangfuseCredentialsResponse);

  // DeleteTenantLangfuseCredentials removes the Langfuse project credentials for a tenant.
  rpc DeleteTenantLangfuseCredentials(DeleteTenantLangfuseCredentialsRequest) returns (DeleteTenantLangfuseCredentialsResponse);

  // ---------------------------------------------------------------------------
  // Onboarding
  // ---------------------------------------------------------------------------

  // GetOnboardingState queries the onboarding progress for a tenant.
  rpc GetOnboardingState(GetOnboardingStateRequest) returns (GetOnboardingStateResponse);

  // UpdateOnboardingState advances or modifies the onboarding state.
  rpc UpdateOnboardingState(UpdateOnboardingStateRequest) returns (UpdateOnboardingStateResponse);

  // ---------------------------------------------------------------------------
  // Quota — read (IMPLEMENT-NOW)
  // ---------------------------------------------------------------------------

  // GetTenantQuota retrieves the configured resource quotas for a tenant.
  // Returns zero values for any quota not explicitly set.
  // Requires FGA admin relation on the tenant.
  rpc GetTenantQuota(GetTenantQuotaRequest) returns (GetTenantQuotaResponse);

  // ---------------------------------------------------------------------------
  // Audit events (DEFER)
  // ---------------------------------------------------------------------------

  // ListAuditEvents returns audit events for a tenant.
  //
  // Unimplemented: <owner-pending>
  rpc ListAuditEvents(ListAuditEventsRequest) returns (ListAuditEventsResponse);

  // ---------------------------------------------------------------------------
  // Findings export (DEFER)
  // ---------------------------------------------------------------------------

  // ExportFindings exports findings to the requested format (json, csv, sarif).
  //
  // Unimplemented: <owner-pending>
  rpc ExportFindings(ExportFindingsRequest) returns (ExportFindingsResponse);

  // ---------------------------------------------------------------------------
  // Mission drafts (DEFER)
  // ---------------------------------------------------------------------------

  // SaveMissionDraft persists a mission YAML draft for later use.
  //
  // Unimplemented: <owner-pending>
  rpc SaveMissionDraft(SaveMissionDraftRequest) returns (SaveMissionDraftResponse);

  // ListMissionDrafts returns all saved mission drafts for a tenant.
  //
  // Unimplemented: <owner-pending>
  rpc ListMissionDrafts(ListMissionDraftsRequest) returns (ListMissionDraftsResponse);

  // ---------------------------------------------------------------------------
  // LLM Providers — tenant-admin CRUD operations (spec 25)
  // ---------------------------------------------------------------------------

  // ListProviders returns all provider configs for the calling tenant.
  rpc ListProviders(ListProvidersRequest) returns (ListProvidersResponse);

  // GetProvider returns a single provider config by name.
  rpc GetProvider(GetProviderRequest) returns (GetProviderResponse);

  // CreateProvider encrypts and stores a new provider config.
  rpc CreateProvider(CreateProviderRequest) returns (CreateProviderResponse);

  // UpdateProvider replaces an existing provider config.
  rpc UpdateProvider(UpdateProviderRequest) returns (UpdateProviderResponse);

  // DeleteProvider removes a provider config from the store.
  rpc DeleteProvider(DeleteProviderRequest) returns (DeleteProviderResponse);

  // TestProvider validates a proposed provider config by making a minimal live request.
  rpc TestProvider(TestProviderRequest) returns (TestProviderResponse);

  // GetSupportedProviders returns the daemon's static catalogue of LLM
  // provider types with their per-provider credential field schemas. Backs
  // the dashboard's Settings → Providers wizard. Spec: providers-wizard.
  rpc GetSupportedProviders(GetSupportedProvidersRequest) returns (GetSupportedProvidersResponse);

  // ListProviderModels fetches the live model catalogue for an already-
  // configured provider, looked up by name. Credentials are read from the
  // encrypted store; the caller does not pass them. Spec: providers-wizard.
  rpc ListProviderModels(ListProviderModelsRequest) returns (ListProviderModelsResponse);

  // GetProviderHealth returns the last-known health status of a stored provider.
  rpc GetProviderHealth(GetProviderHealthRequest) returns (GetProviderHealthResponse);

  // GetDefaultProvider returns the tenant's currently configured default provider.
  rpc GetDefaultProvider(GetDefaultProviderRequest) returns (GetDefaultProviderResponse);

  // SetDefaultProvider designates an existing stored provider as the default.
  rpc SetDefaultProvider(SetDefaultProviderRequest) returns (SetDefaultProviderResponse);

  // GetFallbackChain returns the ordered list of provider names.
  rpc GetFallbackChain(GetFallbackChainRequest) returns (GetFallbackChainResponse);

  // SetFallbackChain replaces the tenant's provider fallback chain.
  rpc SetFallbackChain(SetFallbackChainRequest) returns (SetFallbackChainResponse);

  // ---------------------------------------------------------------------------
  // LLM Providers — execution (spec 25)
  // ---------------------------------------------------------------------------

  // ExecuteLLM proxies a single (non-streaming) LLM completion.
  rpc ExecuteLLM(ExecuteLLMRequest) returns (ExecuteLLMResponse);

  // StreamLLM proxies a streaming LLM completion.
  rpc StreamLLM(StreamLLMRequest) returns (stream StreamLLMResponse);
}

// ---------------------------------------------------------------------------
// Agent identity messages (spec 1 — unchanged)
// ---------------------------------------------------------------------------

// PrincipalKind identifies the type of machine principal being provisioned.
enum PrincipalKind {
  PRINCIPAL_KIND_UNSPECIFIED = 0;
  PRINCIPAL_KIND_AGENT = 1;
  PRINCIPAL_KIND_TOOL = 2;
  PRINCIPAL_KIND_PLUGIN = 3;
}

// ComponentGrant describes an optional FGA capability grant to apply at creation time.
message ComponentGrant {
  // component_ref is the component reference, e.g. "tool:nmap" or "plugin:gitlab".
  string component_ref = 1;
  // relation is the FGA relation to grant, e.g. "can_invoke".
  string relation = 2;
}

// CreateAgentIdentityRequest is the input to TenantAdminService.CreateAgentIdentity.
message CreateAgentIdentityRequest {
  // name must match ^[a-z][a-z0-9-]{2,40}$
  string name = 1;
  // kind must not be UNSPECIFIED.
  PrincipalKind kind = 2;
  // description is optional, max 256 chars.
  string description = 3;
  // component_grants is an optional list of FGA capability grants to apply at creation.
  repeated ComponentGrant component_grants = 4;
}

// CreateAgentIdentityResponse carries the provisioned identity credentials.
// The client_secret is emitted exactly once and cannot be recovered.
message CreateAgentIdentityResponse {
  // principal_id is the FGA principal identifier (e.g. "agent_principal:uuid").
  string principal_id = 1;
  PrincipalKind kind = 2;
  string name = 3;
  // client_id is the OAuth2 client ID for the service account.
  string client_id = 4;
  // client_secret is the one-time secret. Store it immediately; it will not be shown again.
  string client_secret = 5;
  // gibson_url is the daemon's public Envoy URL for use in enroll_command.
  string gibson_url = 6;
  // enroll_command is a complete copy-pasteable shell invocation for agent enrollment.
  string enroll_command = 7;
}

// ListAgentIdentitiesRequest is the input to TenantAdminService.ListAgentIdentities.
message ListAgentIdentitiesRequest {
  // page_size defaults to 50, max 200.
  int32 page_size = 1;
  string page_token = 2;
  // kind_filter: UNSPECIFIED means return all kinds.
  PrincipalKind kind_filter = 3;
}

// AgentIdentity is a single entry in the list response.
message AgentIdentity {
  string principal_id = 1;
  PrincipalKind kind = 2;
  string name = 3;
  string description = 4;
  google.protobuf.Timestamp created_at = 5;
  // last_authenticated_at is null if never authenticated or unsupported by the IdP.
  google.protobuf.Timestamp last_authenticated_at = 6;
  bool revoked = 7;
  string created_by_subject = 8;
}

// ListAgentIdentitiesResponse is the output of TenantAdminService.ListAgentIdentities.
message ListAgentIdentitiesResponse {
  repeated AgentIdentity identities = 1;
  string next_page_token = 2;
}

// RevokeAgentIdentityRequest is the input to TenantAdminService.RevokeAgentIdentity.
message RevokeAgentIdentityRequest {
  string principal_id = 1;
}

// RevokeAgentIdentityResponse is the output of TenantAdminService.RevokeAgentIdentity.
message RevokeAgentIdentityResponse {}

// ---------------------------------------------------------------------------
// Langfuse credentials — request/response messages
// ---------------------------------------------------------------------------

// GetTenantLangfuseCredentialsRequest requests Langfuse credentials for a tenant.
message GetTenantLangfuseCredentialsRequest {
  // tenant_id is the unique identifier of the tenant
  string tenant_id = 1;
}

// GetTenantLangfuseCredentialsResponse returns the Langfuse project credentials.
message GetTenantLangfuseCredentialsResponse {
  // public_key is the Langfuse public key
  string public_key = 1;

  // secret_key is the Langfuse secret key
  string secret_key = 2;

  // host is the Langfuse host URL (e.g., "https://cloud.langfuse.com")
  string host = 3;

  // project_id is the Langfuse project identifier
  string project_id = 4;
}

// SetTenantLangfuseCredentialsRequest stores Langfuse project credentials for a tenant.
message SetTenantLangfuseCredentialsRequest {
  // tenant_id is the unique identifier of the tenant
  string tenant_id = 1;

  // public_key is the Langfuse public key
  string public_key = 2;

  // secret_key is the Langfuse secret key
  string secret_key = 3;

  // host is the Langfuse host URL (e.g., "https://cloud.langfuse.com")
  string host = 4;

  // project_id is the Langfuse project identifier
  string project_id = 5;
}

// SetTenantLangfuseCredentialsResponse confirms the credentials were stored.
message SetTenantLangfuseCredentialsResponse {}

// DeleteTenantLangfuseCredentialsRequest requests deletion of a tenant's Langfuse credentials.
message DeleteTenantLangfuseCredentialsRequest {
  // tenant_id is the unique identifier of the tenant
  string tenant_id = 1;
}

// DeleteTenantLangfuseCredentialsResponse confirms the credentials were deleted.
message DeleteTenantLangfuseCredentialsResponse {}

// ---------------------------------------------------------------------------
// Onboarding — request/response messages
// ---------------------------------------------------------------------------

// GetOnboardingStateRequest queries the onboarding progress for a tenant.
message GetOnboardingStateRequest {
  // tenant_id is the identifier of the tenant to query
  string tenant_id = 1;
}

// GetOnboardingStateResponse returns the current onboarding state.
message GetOnboardingStateResponse {
  // current_step is the name of the active onboarding step
  string current_step = 1;

  // completed_steps lists all steps that have been marked complete
  repeated string completed_steps = 2;

  // setup_tasks maps task names to their completion status ("true"/"false")
  map<string, string> setup_tasks = 3;

  // completed_at is the RFC 3339 timestamp when onboarding finished (empty if not done)
  string completed_at = 4;
}

// UpdateOnboardingStateRequest advances or modifies the onboarding state.
message UpdateOnboardingStateRequest {
  // tenant_id is the identifier of the tenant to update
  string tenant_id = 1;

  // current_step sets the active onboarding step
  string current_step = 2;

  // completed_steps replaces the list of completed steps
  repeated string completed_steps = 3;

  // setup_tasks merges into the existing task completion map
  map<string, string> setup_tasks = 4;
}

// UpdateOnboardingStateResponse confirms the update was applied.
message UpdateOnboardingStateResponse {}

// ---------------------------------------------------------------------------
// Quota — request/response messages
// ---------------------------------------------------------------------------

// TenantQuota defines the resource limits for a tenant.
message TenantQuota {
  // max_missions is the maximum number of concurrent running missions allowed.
  // Zero means no limit.
  int32 max_missions = 1;

  // max_agents is the maximum number of registered agents allowed.
  // Zero means no limit.
  int32 max_agents = 2;

  // max_findings is the maximum number of findings stored across all missions.
  // Zero means no limit.
  int64 max_findings = 3;

  // plan_tier identifies the subscription plan (e.g., "free", "pro", "enterprise").
  string plan_tier = 4;
}

// GetTenantQuotaRequest requests the quota configuration for a tenant.
message GetTenantQuotaRequest {
  // tenant_id is the target tenant. If empty, the caller's tenant is used.
  string tenant_id = 1;
}

// GetTenantQuotaResponse carries the tenant quota configuration plus the
// current usage snapshot sourced from Redis counters.
message GetTenantQuotaResponse {
  // quota contains the legacy runtime caps (max_missions/agents/findings).
  TenantQuota quota = 1;

  // Plan-based limits (mirroring UpsertTenantQuotaRequest).
  int32 seats = 2;
  int32 concurrent_agents = 3;
  int32 storage_gb = 4;
  int32 retention_days = 5;
  int32 sandbox_launches_per_month = 6;

  // updated_at is the Postgres row's last-written timestamp (RFC 3339).
  string updated_at = 7;

  // Usage snapshot fields — zero when the underlying counter is missing.
  int32 current_seats = 8;
  int32 current_concurrent_agents = 9;
  int32 current_storage_gb = 10;
  int32 current_sandbox_launches_this_month = 11;
}

// ---------------------------------------------------------------------------
// Audit events — request/response messages
// ---------------------------------------------------------------------------

// AuditEvent represents a single audit log entry.
message AuditEvent {
  // event_type is the action identifier, e.g. "component_grant_added"
  string event_type = 1;

  // timestamp is when the event occurred (RFC 3339 string)
  string timestamp = 2;

  // actor_user_id is the unique identifier of the user who performed the action
  string actor_user_id = 3;

  // actor_email is the email address of the actor
  string actor_email = 4;

  // tenant_id is the tenant this event belongs to
  string tenant_id = 5;

  // target_user_id is the user affected by the action, if any
  string target_user_id = 6;

  // target_resource is the resource affected, e.g. "team:my-team"
  string target_resource = 7;

  // details holds additional structured context about the event
  map<string, string> details = 8;

  // trace_id is the OTel trace ID for correlation with Grafana/Jaeger
  string trace_id = 9;
}

// ListAuditEventsRequest queries audit events for a tenant.
message ListAuditEventsRequest {
  // tenant_id is the tenant to query audit events for
  string tenant_id = 1;

  // event_types filters to specific event types (empty = all types)
  repeated string event_types = 2;

  // actor_user_id filters to events performed by a specific actor
  string actor_user_id = 3;

  // target_match is a text substring to match against target_resource
  string target_match = 4;

  // from_time restricts results to events at or after this time (RFC 3339 string)
  string from_time = 5;

  // to_time restricts results to events at or before this time (RFC 3339 string)
  string to_time = 6;

  // limit is the maximum number of events to return (default: 50, max: 500)
  int32 limit = 7;

  // cursor is the pagination cursor returned by the previous response
  string cursor = 8;
}

// ListAuditEventsResponse returns a page of audit events.
message ListAuditEventsResponse {
  // events is the list of audit events for this page
  repeated AuditEvent events = 1;

  // next_cursor is the cursor for fetching the next page (empty = last page)
  string next_cursor = 2;
}

// ---------------------------------------------------------------------------
// Findings export — request/response messages
// ---------------------------------------------------------------------------

// FindingFilters allows filtering the findings included in an export.
message FindingFilters {
  // severity filters by severity level (e.g., "critical", "high", "medium", "low", "info").
  repeated string severity = 1;

  // type filters by finding type or category.
  repeated string type = 2;

  // mission_id restricts the export to findings from a specific mission.
  string mission_id = 3;

  // search is a free-text search term applied across finding titles and descriptions.
  string search = 4;
}

// ExportFindingsRequest specifies the format and scope of a findings export.
message ExportFindingsRequest {
  // tenant_id is the tenant context for the export.
  string tenant_id = 1;

  // format is the desired output format: "json", "csv", or "sarif".
  string format = 2;

  // finding_ids restricts the export to specific findings by ID.
  // When empty, all findings matching filters are exported.
  repeated string finding_ids = 3;

  // filters provides additional filtering criteria.
  FindingFilters filters = 4;

  // include_remediation controls whether remediation guidance is included.
  bool include_remediation = 5;

  // include_evidence controls whether evidence details are included.
  bool include_evidence = 6;
}

// ExportFindingsResponse carries the serialized export content.
message ExportFindingsResponse {
  // data is the serialized export content in the requested format.
  bytes data = 1;

  // format is the format of the exported data (mirrors the request format).
  string format = 2;

  // filename is the suggested download filename for the export.
  string filename = 3;

  // count is the number of findings included in the export.
  int32 count = 4;
}

// ---------------------------------------------------------------------------
// Mission drafts — request/response messages
// ---------------------------------------------------------------------------

// SaveMissionDraftRequest persists a mission YAML draft.
message SaveMissionDraftRequest {
  // tenant_id is the tenant context for the draft.
  string tenant_id = 1;

  // name is the human-readable name for this draft.
  string name = 2;

  // yaml is the raw mission YAML content (maximum 512KB).
  string yaml = 3;

  // draft_id is the existing draft ID to update.
  // When empty, a new draft is created and its ID is returned.
  string draft_id = 4;
}

// SaveMissionDraftResponse returns the ID of the saved or updated draft.
message SaveMissionDraftResponse {
  // draft_id is the unique identifier of the saved draft.
  string draft_id = 1;
}

// ListMissionDraftsRequest queries the saved drafts for a tenant.
message ListMissionDraftsRequest {
  // tenant_id is the tenant context for the listing.
  string tenant_id = 1;
}

// MissionDraft carries the metadata for a saved mission draft.
message MissionDraft {
  // id is the unique identifier of the draft.
  string id = 1;

  // name is the human-readable name of the draft.
  string name = 2;

  // created_at is the RFC 3339 creation timestamp.
  string created_at = 3;

  // updated_at is the RFC 3339 last-update timestamp.
  string updated_at = 4;
}

// ListMissionDraftsResponse carries the list of mission drafts for a tenant.
message ListMissionDraftsResponse {
  // drafts is the list of saved mission drafts, ordered by update time descending.
  repeated MissionDraft drafts = 1;
}

// ---------------------------------------------------------------------------
// LLM Provider messages — spec 25
// ---------------------------------------------------------------------------

// ProviderRecord is the read-side representation of a stored provider config.
message ProviderRecord {
  string id = 1;
  string name = 2;
  string type = 3;
  string default_model = 4;
  bool is_default = 5;
  bool enabled = 6;
  map<string, string> credentials_masked = 7;
  string created_at = 8;
  string updated_at = 9;
}

// ProviderConfigInput is the write-side shape for CreateProvider and UpdateProvider.
message ProviderConfigInput {
  string name = 1;
  string type = 2;
  string default_model = 3;
  map<string, string> credentials = 4;
  bool set_as_default = 5;
}

// ResponseFormat controls the structure of the LLM output.
message ResponseFormat {
  string type = 1;
  string name = 2;
  string schema_json = 3;
  bool strict = 4;
}

// ToolCallDelta carries incremental tool-call information in a streaming response.
message ToolCallDelta {
  int32 index = 1;
  string id = 2;
  string name = 3;
  string arguments_delta = 4;
}

// LLMTokenUsage reports token consumption for an LLM completion.
message LLMTokenUsage {
  int32 input_tokens = 1;
  int32 output_tokens = 2;
  int32 total_tokens = 3;
}

// LLMToolCall describes a tool invocation requested by the LLM.
message LLMToolCall {
  string id = 1;
  string name = 2;
  string arguments = 3;
}

// LLMToolResult carries the output of a tool call.
message LLMToolResult {
  string tool_call_id = 1;
  string content = 2;
  bool is_error = 3;
}

// LLMToolDef defines a tool the LLM may invoke.
message LLMToolDef {
  string name = 1;
  string description = 2;
  string parameters_json = 3;
}

// LLMMessageContent is a single message in a conversation.
message LLMMessageContent {
  string role = 1;
  string content = 2;
  repeated LLMToolCall tool_calls = 3;
  repeated LLMToolResult tool_results = 4;
  string name = 5;
}

// ProviderHarnessError carries an error from the LLM execution path.
message ProviderHarnessError {
  int32 code = 1;
  string message = 2;
  bool retryable = 3;
}

// StreamFinish is emitted as the final chunk of a StreamLLM response.
message StreamFinish {
  string finish_reason = 1;
  LLMTokenUsage usage = 2;
}

message ListProvidersRequest {}

message ListProvidersResponse {
  repeated ProviderRecord providers = 1;
}

message GetProviderRequest {
  string name = 1;
}

message GetProviderResponse {
  ProviderRecord provider = 1;
}

message CreateProviderRequest {
  ProviderConfigInput input = 1;
}

message CreateProviderResponse {
  ProviderRecord provider = 1;
}

message UpdateProviderRequest {
  string name = 1;
  ProviderConfigInput input = 2;
}

message UpdateProviderResponse {
  ProviderRecord provider = 1;
}

message DeleteProviderRequest {
  string name = 1;
}

message DeleteProviderResponse {}

message TestProviderRequest {
  ProviderConfigInput input = 1;
}

message TestProviderResponse {
  bool ok = 1;
  int64 latency_ms = 2;
  string model = 3;
  string error = 4;
  // Live model catalogue returned by the provider's API for these credentials.
  // Empty when ok=false. Tier-restricted models surface here exactly as the
  // provider returns them. Spec: providers-wizard.
  repeated ModelDescriptor models = 5;
}

// ---------------------------------------------------------------------------
// Provider catalogue (spec: providers-wizard)
// ---------------------------------------------------------------------------

message GetSupportedProvidersRequest {}

message GetSupportedProvidersResponse {
  repeated SupportedProvider providers = 1;
}

message ListProviderModelsRequest {
  string name = 1;
}

message ListProviderModelsResponse {
  bool ok = 1;
  string error_message = 2;
  string error_class = 3;
  repeated ModelDescriptor models = 4;
  int64 latency_ms = 5;
}

// SupportedProvider describes one LLM provider type the daemon supports —
// the dashboard renders one row per provider in the wizard's type picker.
message SupportedProvider {
  string type = 1;
  string display_name = 2;
  string docs_url = 3;
  bool self_hosted = 4;
  repeated CredentialField credentials = 5;
  // Static catalogue surfaced when the daemon can enumerate models without
  // calling the provider's API (e.g. AWS Bedrock's region-locked list).
  // Empty for providers that require a live test+probe to discover models.
  repeated ModelDescriptor default_models = 6;
}

// CredentialField describes one input the operator must supply when
// configuring a provider — surfaced verbatim by the dashboard's dynamic
// credential form.
message CredentialField {
  string key = 1;
  string label = 2;
  bool required = 3;
  bool secret = 4;
  string placeholder = 5;
  string help = 6;
}

// ModelDescriptor describes one model offered by a provider.
message ModelDescriptor {
  string name = 1;
  string family = 2;
  int32 context_window = 3;
}

message GetProviderHealthRequest {
  string name = 1;
}

message GetProviderHealthResponse {
  bool healthy = 1;
  string last_checked_at = 2;
  string error = 3;
}

message GetDefaultProviderRequest {}

message GetDefaultProviderResponse {
  ProviderRecord provider = 1;
}

message SetDefaultProviderRequest {
  string name = 1;
}

message SetDefaultProviderResponse {
  ProviderRecord provider = 1;
}

message GetFallbackChainRequest {}

message GetFallbackChainResponse {
  repeated string provider_names = 1;
}

message SetFallbackChainRequest {
  repeated string provider_names = 1;
}

message SetFallbackChainResponse {
  repeated string provider_names = 1;
}

message ExecuteLLMRequest {
  string provider_name = 1;
  string model = 2;
  repeated LLMMessageContent messages = 3;
  repeated LLMToolDef tools = 4;
  optional ResponseFormat response_format = 5;
  optional double temperature = 6;
  optional int32 max_tokens = 7;
  optional double top_p = 8;
  repeated string stop = 9;
}

message ExecuteLLMResponse {
  string content = 1;
  repeated LLMToolCall tool_calls = 2;
  string finish_reason = 3;
  LLMTokenUsage usage = 4;
}

message StreamLLMRequest {
  string provider_name = 1;
  string model = 2;
  repeated LLMMessageContent messages = 3;
  repeated LLMToolDef tools = 4;
  optional ResponseFormat response_format = 5;
  optional double temperature = 6;
  optional int32 max_tokens = 7;
  optional double top_p = 8;
  repeated string stop = 9;
}

message StreamLLMResponse {
  oneof payload {
    string text_delta = 1;
    ToolCallDelta tool_call_delta = 2;
    StreamFinish finish = 3;
    ProviderHarnessError error = 4;
  }
}
