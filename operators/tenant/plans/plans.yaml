# Canonical Gibson plan registry.
#
# Source of truth for: operator reconcile (quotas), dashboard /pricing
# rendering, in-app quota UX, Stripe product mapping, Tenant CRD enum,
# validating webhook.
#
# Schema (spec plans-and-quotas-simplification):
#   - id            : team | org | enterprise | enterprise-deploy
#   - displayName   : marketing label
#   - tagline       : short marketing copy
#   - pricing       : { monthlyUSD?, annualUSD?, annualSavingsPct?, contactSales? }
#   - stripeProductId : Stripe product id (null until Stripe setup runs)
#   - trialDays     : card-first signup trial length (epic card-first-signup,
#                     tenant-operator#357). Required >0 on every self-serve
#                     paid tier; forbidden on contactSales plans (unbilled —
#                     no Stripe subscription, nothing to trial).
#   - quotas        : { concurrent_missions, concurrent_agents, concurrent_connectors }
#
# Quota value 0 means "unlimited" — the daemon treats 0 as no enforcement.
# This is the only convention; -1 (the legacy sentinel) is no longer used.
version: v1
plans:
  - id: team
    displayName: Team
    tagline: For small red teams getting started with continuous AI red teaming
    pricing:
      monthlyUSD: 799
    stripeProductId: prod_UUghrBirQfk8sn
    trialDays: 14
    quotas:
      concurrent_missions: 10
      concurrent_agents: 100
      concurrent_connectors: 5

  - id: org
    displayName: Org
    tagline: For security organisations running coverage across multiple AI surfaces
    pricing:
      monthlyUSD: 4999
    stripeProductId: prod_UUghpmfCDlbOyn
    trialDays: 14
    quotas:
      concurrent_missions: 50
      concurrent_agents: 250
      concurrent_connectors: 20

  - id: enterprise
    displayName: Enterprise
    tagline: For platform teams operating Gibson at scale across business units
    pricing:
      monthlyUSD: 9999
    stripeProductId: prod_UUghAQW2znkSrb
    trialDays: 14
    quotas:
      concurrent_missions: 75
      concurrent_agents: 0
      concurrent_connectors: 0

  - id: enterprise-deploy
    displayName: Enterprise (On-Prem & Federal)
    tagline: Self-hosted in your VPC, on-prem datacentre, or air-gapped enclave
    pricing:
      contactSales: true
    stripeProductId: null
    quotas:
      concurrent_missions: 0
      concurrent_agents: 0
      concurrent_connectors: 0
