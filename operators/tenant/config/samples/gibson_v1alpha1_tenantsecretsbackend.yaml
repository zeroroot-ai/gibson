apiVersion: gibson.zeroroot.ai/v1alpha1
kind: TenantSecretsBackend
metadata:
  name: acme-secrets
  namespace: tenant-acme
spec:
  tenantID: acme
  # mountPath and authRole are optional; when omitted the operator's
  # helm-chart defaults apply (KV mount "secret", role "gibson-plugin-<tenant>").
  mountPath: secret
  authRole: gibson-plugin-acme
