---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: tenantdataplanes.gibson.zeroroot.ai
spec:
  group: gibson.zeroroot.ai
  names:
    kind: TenantDataPlane
    listKind: TenantDataPlaneList
    plural: tenantdataplanes
    shortNames:
    - tdp
    singular: tenantdataplane
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.tenantID
      name: Tenant
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.ready
      name: Ready
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          TenantDataPlane is the Schema for the tenantdataplanes API. It declaratively
          composes the per-tenant CNPG Postgres, Neo4j, and Redis (plus the vector
          index and KEK init) stores for a single tenant. The controller reconciles
          the stores by delegating to the shared dataplane.Provisioner pipeline,
          drift-corrects on every reconcile, and tears the stores down on delete via
          a finalizer.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              TenantDataPlaneSpec defines the desired state of a TenantDataPlane.

              The CRD is a thin declarative wrapper over the existing
              dataplane.Provisioner pipeline: the controller reconciles the requested
              stores by delegating to the same pipeline the Tenant saga's
              DataPlaneProvisioned step uses. The pipeline is keyed entirely on the
              tenant id, so the spec carries that id plus the per-store toggles and the
              optional sizing overrides the saga already honours.
            properties:
              resources:
                description: |-
                  Resources optionally overrides per-tenant data-plane resource limits
                  (Postgres connection limit, Redis max-memory). When absent, the
                  operator's Helm-chart defaults apply — identical to the Tenant CR's
                  spec.resources semantics.
                properties:
                  postgresConnectionLimit:
                    description: |-
                      PostgresConnectionLimit overrides the default per-role Postgres connection
                      limit (ALTER ROLE ... CONNECTION LIMIT N). 0 = use operator default (50).
                    minimum: 0
                    type: integer
                  redisMaxMemoryBytes:
                    description: |-
                      RedisMaxMemoryBytes overrides the per-DB MAXMEMORY value in bytes for
                      Redis >= 7.4 that supports per-DB CONFIG SET. 0 = no explicit limit.
                    format: int64
                    minimum: 0
                    type: integer
                type: object
              stores:
                description: |-
                  Stores selects which per-tenant stores to provision. When absent, all
                  stores default to true — matching the current saga, which always
                  provisions the full set.
                properties:
                  neo4j:
                    default: true
                    description: Neo4j requests the per-tenant Neo4j StatefulSet and
                      schema migrations.
                    type: boolean
                  postgres:
                    default: true
                    description: |-
                      Postgres requests the per-tenant CNPG Postgres database, role, and
                      schema migrations.
                    type: boolean
                  redis:
                    default: true
                    description: Redis requests a per-tenant logical DB index in the
                      master Redis index.
                    type: boolean
                  vector:
                    default: true
                    description: |-
                      Vector requests the per-tenant RediSearch (vector) index. It rides on the
                      Redis allocation above.
                    type: boolean
                type: object
              tenantID:
                description: |-
                  TenantID is the canonical tenant identifier (the Tenant CR name). The
                  data-plane pipeline keys every store on this value. Immutable once set.
                maxLength: 253
                minLength: 1
                type: string
                x-kubernetes-validations:
                - message: tenantID is immutable
                  rule: self == oldSelf
            required:
            - tenantID
            type: object
          status:
            description: |-
              DataPlaneStatus defines the observed state of a TenantDataPlane. It carries
              a readiness condition per store plus an overall Ready condition, mirroring
              the scalar progress the pipeline records on the Tenant status. Named
              DataPlaneStatus (not the conventional TenantDataPlaneStatus) because that
              symbol is already taken by the legacy struct embedded in Tenant.status
              (Tenant.status.dataPlane) which the saga still writes.
            properties:
              conditions:
                description: |-
                  Conditions represent the current state of the TenantDataPlane resource.
                  Standard condition type: Ready.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastError:
                description: |-
                  LastError contains the most recent error message from the provisioning
                  pipeline. Cleared on a successful reconcile.
                type: string
              observedGeneration:
                description: ObservedGeneration reflects the generation most recently
                  reconciled.
                format: int64
                type: integer
              phase:
                description: Phase is the overall lifecycle phase of the data plane.
                enum:
                - Pending
                - Provisioning
                - Ready
                - Failed
                - Deprovisioning
                type: string
              ready:
                description: |-
                  Ready is true when every requested store is provisioned and the tenant
                  KEK has been initialised. The daemon's provisioning check reads this
                  (it previously read Tenant.status.dataPlane.ready).
                type: boolean
              stores:
                description: Stores carries the per-store provisioning state.
                items:
                  description: |-
                    TenantDataPlaneStoreCondition reports the provisioning state of a single
                    store. The aggregate Ready condition (and the scalar Ready field) is True
                    only when every requested store has reached state=ready.
                  properties:
                    lastUpdated:
                      description: LastUpdated is the time this store's state was
                        last written.
                      format: date-time
                      type: string
                    name:
                      description: 'Name identifies the store: postgres, neo4j, redis,
                        vector, or kek.'
                      enum:
                      - postgres
                      - neo4j
                      - redis
                      - vector
                      - kek
                      type: string
                    reason:
                      description: |-
                        Reason carries a human-readable description, especially when
                        state=failed.
                      type: string
                    state:
                      description: State is the current provisioning state of the
                        store.
                      enum:
                      - provisioning
                      - ready
                      - failed
                      type: string
                  required:
                  - name
                  - state
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
