---
# MutatingWebhookConfiguration — stamps ownerReferences on child CR CREATEs
# when the parent Tenant's UID annotation is present on the namespace.
# Failure-open (failurePolicy: Ignore) so a webhook outage cannot block
# tenant provisioning; the controller's reconcile-time backfill guarantees
# convergence within ~30 s.
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-owner-ref
  failurePolicy: Ignore
  name: mownerref.kb.io
  rules:
  - apiGroups:
    - gibson.zeroroot.ai
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    resources:
    - agentenrollments
    - tenantmembers
  sideEffects: None
---
# ValidatingWebhookConfiguration — enforces content invariants on Tenant CRs:
#   slug (metadata.name): DNS-safe, 1–60 chars, immutable after create
#   spec.owner (email): RFC-5322 format, immutable after create
#   spec.tier: one of {free, pro, enterprise}
#   spec.displayName: 1–120 chars
# Failure-closed (failurePolicy: Fail) because a webhook outage here means
# invalid Tenants could reach the controller. When the webhook is not deployed
# (webhook-cert-path flag unset) the server does not register the path and the
# API server will not route requests here — this configuration must only be
# applied when the operator is running with certs configured.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-tenant
  failurePolicy: Fail
  name: vtenant.kb.io
  rules:
  - apiGroups:
    - gibson.zeroroot.ai
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - tenants
  sideEffects: None
