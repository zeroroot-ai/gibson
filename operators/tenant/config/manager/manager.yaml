apiVersion: v1
kind: Namespace
metadata:
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: tenant-operator
    app.kubernetes.io/managed-by: kustomize
  name: system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: tenant-operator
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: tenant-operator
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: tenant-operator
    spec:
      # TODO(user): Uncomment the following code to configure the nodeAffinity expression
      # according to the platforms which are supported by your solution.
      # It is considered best practice to support multiple architectures. You can
      # build your manager image using the makefile target docker-buildx.
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #         - matchExpressions:
      #           - key: kubernetes.io/arch
      #             operator: In
      #             values:
      #               - amd64
      #               - arm64
      #               - ppc64le
      #               - s390x
      #           - key: kubernetes.io/os
      #             operator: In
      #             values:
      #               - linux
      securityContext:
        # Projects are configured by default to adhere to the "restricted" Pod Security Standards.
        # This ensures that deployments meet the highest security requirements for Kubernetes.
        # For more details, see: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
        - /manager
        args:
          - --leader-elect
          - --health-probe-bind-address=:8081
        # Placeholder image name `controller`; the helm chart sets
        # `image: {{ .Values.tenantOperator.image.repository }}:{{ ... }}` in
        # its own template (this file is only consumed by `kustomize build
        # config/default`, used by `make deploy` and the E2E suite). The
        # Makefile's `deploy` target runs `kustomize edit set image
        # controller=${IMG}` to swap this placeholder for the real image
        # (kubebuilder convention). The override only takes effect when the
        # image name in the manifest matches the kustomize edit key, fixing
        # the previous `ghcr.io/zeroroot-ai/gibson-tenant-operator` literal
        # which silently bypassed the override and left kubelet anonymously
        # pulling the private GHCR image (tenant-operator#149).
        image: controller:latest
        imagePullPolicy: IfNotPresent
        name: manager
        ports: []
        env:
        # tenant-operator#195 made GIBSON_VAULT_JWT_BOUND_ISSUER fail-loud in
        # main.go (operator exits 1 at startup when empty, per
        # feedback_no_skippable_steps_for_required_artifacts). Production
        # wiring is in the Helm chart; this kustomize bundle is consumed by
        # `make test-e2e`, which deploys into a temporary kind cluster.
        # Without this env var the e2e pod CrashLoopBackOff'd and the test
        # timed out on "Controller pod not ready". The placeholder value is
        # e2e-only; the fail-loud guard for real deploys is unchanged.
        - name: GIBSON_VAULT_JWT_BOUND_ISSUER
          value: "https://e2e-test.invalid"
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        # TODO(user): Configure the resources accordingly based on the project requirements.
        # More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        volumeMounts: []
      volumes: []
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
