---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: platformbootstraps.gibson.zeroroot.ai
spec:
  group: gibson.zeroroot.ai
  names:
    kind: PlatformBootstrap
    listKind: PlatformBootstrapList
    plural: platformbootstraps
    singular: platformbootstrap
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PlatformBootstrap is the cluster-scoped orchestrator for the gibson
          platform's bootstrap handshakes. One per cluster.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PlatformBootstrapSpec is the desired state of the platform.
            properties:
              fgaModel:
                description: |-
                  FGAModel describes the OpenFGA model load. Required — OpenFGA is
                  structural infrastructure (ADR-0003 one-code-path); no skip toggle.
                properties:
                  apiEndpoint:
                    description: APIEndpoint is the OpenFGA HTTP base URL.
                    pattern: ^https?://
                    type: string
                  modelConfigMapRef:
                    description: |-
                      ModelConfigMapRef points at the ConfigMap + key holding the FGA
                      model definition (DSL or JSON).
                    properties:
                      key:
                        description: Key is the entry within the ConfigMap's data
                          map.
                        minLength: 1
                        type: string
                      name:
                        description: Name is the ConfigMap name.
                        minLength: 1
                        type: string
                      namespace:
                        description: Namespace overrides the default namespace.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  storeNameRef:
                    description: |-
                      StoreNameRef points at the Secret + key where the OpenFGA store ID
                      is persisted after creation (so subsequent reconciles detect the
                      existing store).
                    properties:
                      key:
                        description: Key is the entry within the Secret's data map.
                        minLength: 1
                        type: string
                      name:
                        description: Name is the Secret name.
                        minLength: 1
                        type: string
                      namespace:
                        description: Namespace overrides the default namespace.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                required:
                - apiEndpoint
                - modelConfigMapRef
                - storeNameRef
                type: object
              masterKey:
                description: |-
                  MasterKey describes the cluster-wide master-key Secret the operator
                  owns. Required — the master-kek wrap is structural; no skip toggle.
                properties:
                  key:
                    description: Key is the entry within the Secret's data map. Defaults
                      to "master-key".
                    type: string
                  namespace:
                    description: Namespace is the namespace the Secret lives in. Defaults
                      to "gibson".
                    type: string
                  secretName:
                    description: SecretName is the K8s Secret name the operator manages.
                    minLength: 1
                    type: string
                required:
                - secretName
                type: object
              oidcClients:
                description: |-
                  OIDCClients is the list of clients the orchestrator reconciles as
                  child OIDCClient CRs.
                items:
                  description: |-
                    OIDCClientReference describes one OIDC client the orchestrator will
                    reconcile as a child OIDCClient CR.
                  properties:
                    accessTokenLifetimeSeconds:
                      description: |-
                        AccessTokenLifetimeSeconds threads onto the child OIDCClient's
                        per-application access-token lifetime. 0/unset leaves the Zitadel
                        instance default. Set to 900 (15m) for the CLI device-grant app to
                        bound the gibson#622 session-revocation window.
                      format: int32
                      minimum: 0
                      type: integer
                    applicationType:
                      description: |-
                        ApplicationType controls the OAuth client class minted in Zitadel.
                        Empty defaults to WEB when RedirectURIs is non-empty, else SERVICE.
                        Use MACHINE_USER for daemon/operator IDP admin clients that perform
                        OAuth2 client_credentials grants — Zitadel only honors that grant
                        for Service Users, not OIDC Apps.
                      enum:
                      - WEB
                      - NATIVE
                      - USER_AGENT
                      - SERVICE
                      - MACHINE_USER
                      type: string
                    grantTypes:
                      description: |-
                        GrantTypes overrides the OAuth grant types minted in Zitadel. When
                        empty the orchestrator derives a default from RedirectURIs
                        (AUTHORIZATION_CODE+REFRESH_TOKEN when present, else CLIENT_CREDENTIALS).
                        Set explicitly for the gibson CLI device-grant app, e.g.
                        ["DEVICE_CODE","AUTHORIZATION_CODE","REFRESH_TOKEN"].
                      items:
                        description: OIDCGrantType enumerates the OAuth grant types
                          Zitadel supports.
                        enum:
                        - AUTHORIZATION_CODE
                        - IMPLICIT
                        - REFRESH_TOKEN
                        - CLIENT_CREDENTIALS
                        - DEVICE_CODE
                        type: string
                      type: array
                    name:
                      description: |-
                        Name is the K8s name of the OIDCClient CR created by the
                        orchestrator. Also the Zitadel client display name.
                      pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                      type: string
                    postLogoutRedirectURIs:
                      description: PostLogoutRedirectURIs are the OAuth post-logout
                        redirect URIs.
                      items:
                        type: string
                      type: array
                    redirectURIs:
                      description: |-
                        RedirectURIs are the OAuth redirect URIs registered with Zitadel.
                        Required for applicationType WEB; may be empty for service / machine
                        clients.
                      items:
                        type: string
                      type: array
                    roles:
                      description: |-
                        Roles is the set of Zitadel role keys granted to the minted machine
                        user. Only honored for MACHINE_USER entries; threaded onto the child
                        OIDCClient CR's spec.roles. IAM_-prefixed roles become instance IAM
                        members; ORG_-prefixed roles become org members. Empty defaults to
                        ["IAM_OWNER"] in the child reconciler.
                      items:
                        type: string
                      type: array
                    secretRef:
                      description: |-
                        SecretRef points at the Secret where the minted client secret is
                        materialised. The reconciler writes both clientID + clientSecret
                        into this Secret.
                      properties:
                        key:
                          description: Key is the entry within the Secret's data map.
                          minLength: 1
                          type: string
                        name:
                          description: Name is the Secret name.
                          minLength: 1
                          type: string
                        namespace:
                          description: Namespace overrides the default namespace.
                          type: string
                      required:
                      - key
                      - name
                      type: object
                  required:
                  - name
                  - secretRef
                  type: object
                type: array
              planSync:
                description: PlanSync describes the plan-sync step.
                properties:
                  plansConfigMapRef:
                    description: |-
                      PlansConfigMapRef points at the ConfigMap + key holding the gibson
                      plans data. The reconciler hashes the content and re-syncs only
                      when the hash changes.
                    properties:
                      key:
                        description: Key is the entry within the ConfigMap's data
                          map.
                        minLength: 1
                        type: string
                      name:
                        description: Name is the ConfigMap name.
                        minLength: 1
                        type: string
                      namespace:
                        description: Namespace overrides the default namespace.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                required:
                - plansConfigMapRef
                type: object
              postgresBundle:
                description: |-
                  PostgresBundle describes the CNPG database ownership + public-schema
                  grants the operator enforces. Required — postgres is structural
                  infrastructure; no skip toggle.
                properties:
                  cluster:
                    description: Cluster identifies the CNPG cluster + superuser credentials.
                    properties:
                      host:
                        description: |-
                          Host is the in-cluster RW Service hostname (e.g.
                          "platform-postgres-rw.cnpg-system.svc.cluster.local").
                        minLength: 1
                        type: string
                      port:
                        description: Port is the service port. Defaults to 5432.
                        format: int32
                        type: integer
                      superuserSecretRef:
                        description: |-
                          SuperuserSecretRef points at the postgres superuser Secret with
                          CNPG-layout keys (`username` + `password`).
                        properties:
                          key:
                            description: Key is the entry within the Secret's data
                              map.
                            minLength: 1
                            type: string
                          name:
                            description: Name is the Secret name.
                            minLength: 1
                            type: string
                          namespace:
                            description: Namespace overrides the default namespace.
                            type: string
                        required:
                        - key
                        - name
                        type: object
                    required:
                    - host
                    - superuserSecretRef
                    type: object
                  databases:
                    description: |-
                      Databases is the list of per-database ownership entries the
                      reconciler enforces.
                    items:
                      description: |-
                        DatabaseRoleOwnership declares that DB Name should be owned by Owner,
                        optionally with public-schema USAGE+CREATE grants to Grants entries.
                      properties:
                        grants:
                          description: |-
                            Grants is an optional list of roles that should receive
                            USAGE+CREATE on the database's public schema.
                          items:
                            type: string
                          type: array
                        name:
                          description: Name is the database to ALTER.
                          minLength: 1
                          type: string
                        owner:
                          description: Owner is the role to ALTER DATABASE ... OWNER
                            TO.
                          minLength: 1
                          type: string
                      required:
                      - name
                      - owner
                      type: object
                    minItems: 1
                    type: array
                required:
                - cluster
                - databases
                type: object
              vaultTransit:
                description: |-
                  VaultTransit describes the Vault transit init. Required — Vault
                  transit + master-kek is structural infrastructure and no `.enabled`
                  toggle exists.
                properties:
                  address:
                    description: Address is the Vault HTTP base URL.
                    pattern: ^https?://
                    type: string
                  keyName:
                    default: master-kek
                    description: |-
                      KeyName is the name of the transit key the platform owns.
                      Defaults to "master-kek".
                    type: string
                  tokenRef:
                    description: TokenRef points at the Secret + key holding the Vault
                      admin token.
                    properties:
                      key:
                        description: Key is the entry within the Secret's data map.
                        minLength: 1
                        type: string
                      name:
                        description: Name is the Secret name.
                        minLength: 1
                        type: string
                      namespace:
                        description: Namespace overrides the default namespace.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                required:
                - address
                - tokenRef
                type: object
              zitadel:
                description: Zitadel collects IdP-facing configuration.
                properties:
                  adminTokenRef:
                    description: |-
                      AdminTokenRef points at the Secret + key holding the IAM_OWNER
                      PAT used to authenticate admin-API calls.
                    properties:
                      key:
                        description: Key is the entry within the Secret's data map.
                        minLength: 1
                        type: string
                      name:
                        description: Name is the Secret name.
                        minLength: 1
                        type: string
                      namespace:
                        description: Namespace overrides the default namespace.
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  externalDomain:
                    description: |-
                      ExternalDomain is the public hostname (e.g. "app.example.com:30443")
                      forged onto the Host header on every Zitadel API request. Allows the
                      operator to dial Zitadel's in-cluster Service name while satisfying
                      Zitadel's instance router until all consumers are migrated. Equivalent
                      to the ZITADEL_EXTERNAL_DOMAIN env used by the OIDCClient reconciler.
                    type: string
                  issuer:
                    description: |-
                      Issuer is the OIDC issuer URL the platform uses for both browser
                      and in-cluster traffic (forge Host header as needed).
                    pattern: ^https?://
                    type: string
                  project:
                    description: Project is the per-cluster Zitadel project the platform
                      owns.
                    properties:
                      ensureExists:
                        default: true
                        description: |-
                          EnsureExists triggers idempotent project creation. When false, the
                          reconciler verifies the project exists but does not create it.
                        type: boolean
                      name:
                        description: Name is the human-readable project name in Zitadel.
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                  serviceUsers:
                    description: |-
                      ServiceUsers is the list of machine users the platform mints + the
                      roles each carries.
                    items:
                      description: |-
                        ZitadelServiceUserSpec describes one machine user the platform mints
                        at bootstrap.
                      properties:
                        name:
                          description: Name is the Zitadel username for the service
                            account.
                          minLength: 1
                          type: string
                        patSecretRef:
                          description: |-
                            PATSecretRef points at the Secret + key where the minted Personal
                            Access Token is materialised.
                          properties:
                            key:
                              description: Key is the entry within the Secret's data
                                map.
                              minLength: 1
                              type: string
                            name:
                              description: Name is the Secret name.
                              minLength: 1
                              type: string
                            namespace:
                              description: Namespace overrides the default namespace.
                              type: string
                          required:
                          - key
                          - name
                          type: object
                        roles:
                          description: |-
                            Roles is the list of Zitadel role keys assigned to this user
                            (e.g. ["IAM_USER_MANAGER"]).
                          items:
                            type: string
                          minItems: 1
                          type: array
                      required:
                      - name
                      - patSecretRef
                      - roles
                      type: object
                    type: array
                  systemClient:
                    description: |-
                      SystemClient configures the System API client used to register the
                      cluster-internal Zitadel Service hostname as an additional trusted
                      domain. When nil, the TrustedDomainReady step is skipped (for existing
                      clusters without a system-bot user provisioned).
                    properties:
                      keyPath:
                        description: |-
                          KeyPath is the file-system path of the RSA private key PEM file
                          provisioned by the chart for the SYSTEM_OWNER user. Falls back to
                          ZITADEL_SYSTEM_KEY_PATH env, then "/etc/zitadel-system/private-key.pem".
                          The chart guarantees this mount; the operator fails at startup when
                          the file is absent.
                        type: string
                      systemUserName:
                        default: gibson-system-bot
                        description: |-
                          SystemUserName is the Zitadel SYSTEM_OWNER machine user name.
                          The JWT iss and sub claims are set to this value.
                          Defaults to "gibson-system-bot".
                        type: string
                      trustedClusterDomain:
                        description: |-
                          TrustedClusterDomain is the cluster-internal Service hostname to
                          register as an additional trusted domain on the Zitadel instance.
                          When empty the controller derives it from the CR name and the
                          operator's namespace: "<cr-name>-zitadel.<namespace>.svc.cluster.local".
                        type: string
                    type: object
                required:
                - adminTokenRef
                - issuer
                - project
                type: object
            required:
            - fgaModel
            - masterKey
            - postgresBundle
            - vaultTransit
            - zitadel
            type: object
          status:
            description: PlatformBootstrapStatus is the observed state.
            properties:
              conditions:
                description: |-
                  Conditions is the standard metav1.Condition slice. Top-level Ready
                  rolls up every sub-step condition.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: |-
                  ObservedGeneration mirrors metadata.generation; used to detect
                  "spec changed, not yet reconciled".
                format: int64
                type: integer
              oidcClients:
                description: OIDCClients summarises each child OIDCClient's Ready
                  state.
                items:
                  description: |-
                    OIDCClientStatusEntry mirrors a child OIDCClient's status onto the
                    parent for quick `kubectl describe` aggregation.
                  properties:
                    clientID:
                      description: ClientID is the Zitadel client ID once minted.
                      type: string
                    name:
                      description: Name matches OIDCClientReference.Name.
                      type: string
                    ready:
                      description: Ready mirrors the child's Ready condition.
                      type: boolean
                  required:
                  - name
                  - ready
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
