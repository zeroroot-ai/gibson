# Gibson Framework Configuration
# This is an example configuration file showing all available options.
# Copy this to ~/.gibson/config.yaml and customize for your environment.

# Core application settings
core:
  home_dir: ~/.gibson              # Gibson installation directory
  data_dir: ~/.gibson/data         # Directory for data storage
  cache_dir: ~/.gibson/cache       # Directory for cached data
  parallel_limit: 10               # Maximum parallel operations
  timeout: 5m                      # Global operation timeout
  debug: false                     # Enable debug mode

# Security settings
security:
  encryption_algorithm: aes-256-gcm  # Encryption algorithm for secrets
  key_derivation: scrypt             # Key derivation function
  ssl_validation: true               # Enable SSL certificate validation
  audit_logging: true                # Enable audit logging for sensitive operations

  # Key provider configuration - required for credential encryption
  key_provider:
    # Provider type: kubernetes, vault, aws, azure, gcp
    type: kubernetes

    # Kubernetes Secrets provider configuration
    kubernetes:
      secret_name: gibson-master-key
      secret_namespace: ""  # Empty = use pod's namespace
      secret_key: master-key

    # HashiCorp Vault provider (uncomment to use)
    # vault:
    #   address: https://vault.example.com:8200
    #   mount_path: secret
    #   secret_path: gibson/master-key
    #   key_field: key
    #   role: gibson

    # AWS Secrets Manager provider (uncomment to use)
    # aws:
    #   region: us-east-1
    #   secret_arn: arn:aws:secretsmanager:us-east-1:123456789:secret:gibson-master-key

    # Azure Key Vault provider (uncomment to use)
    # azure:
    #   vault_url: https://gibson-vault.vault.azure.net/
    #   secret_name: master-key

    # GCP Secret Manager provider (uncomment to use)
    # gcp:
    #   project_id: my-project
    #   secret_name: gibson-master-key
    #   version: latest

# ============================================================================
# Authentication & Authorization Configuration
# ============================================================================
# Gibson supports multiple authentication mechanisms for securing the gRPC API:
#   - OIDC federation with enterprise identity providers (Okta, Auth0, Azure AD)
#   - GitHub Actions OIDC tokens for CI/CD pipelines
#   - GitLab CI OIDC tokens for CI/CD pipelines
#   - Kubernetes ServiceAccount tokens for in-cluster workloads
#   - Local static tokens for development (NOT FOR PRODUCTION)
#
# Authentication is always required. A valid auth mode must be configured.
#
# Role-Based Access Control (RBAC):
#   Roles are bound to identities based on token claims (groups, repository, etc.)
#   Roles determine what actions users can perform (mission:execute, findings:read, admin, etc.)
#
# Configuration Options:
auth:
  # enabled controls whether authentication is enforced on gRPC API calls
  # When false (default), all requests are allowed without authentication
  # When true, all requests must include a valid Bearer token
  # Default: false
  # Environment variable: GIBSON_AUTH_ENABLED
  enabled: "${GIBSON_AUTH_ENABLED:-false}"

  # trust_localhost skips authentication for connections from 127.0.0.1 or ::1
  # Useful for local development with external tools (curl, grpcurl, etc.)
  # Only applies when enabled is true
  # Default: false
  # Environment variable: GIBSON_AUTH_TRUST_LOCALHOST
  trust_localhost: "${GIBSON_AUTH_TRUST_LOCALHOST:-false}"

  # clock_skew is the maximum allowed time difference when validating token expiry
  # Accommodates clock drift between Gibson and identity providers
  # Default: 30s
  clock_skew: 30s

  # ──────────────────────────────────────────────────────────────────────────
  # OIDC Provider Configuration
  # ──────────────────────────────────────────────────────────────────────────
  # Configure one or more OIDC identity providers for token validation.
  # Tokens are matched to providers by their "iss" (issuer) claim.
  # Multiple providers can be configured for federation across organizations.

  # Example: Dex OIDC Provider (Identity Broker)
  # Dex acts as a federated identity broker, allowing Gibson to accept tokens
  # from multiple upstream identity providers (Okta, Azure AD, GitHub, LDAP, etc.)
  # through a single OIDC issuer. This is the RECOMMENDED approach for production.
  # oidc:
  #   - issuer: "https://dex.gibson-system.svc.cluster.local:5556"  # In-cluster
  #     # issuer: "https://dex.your-domain.com"                    # Via ingress
  #     audience: "gibson"
  #     jwks_ttl: 1h
  #     claims_mapping:
  #       groups: groups    # Dex passes through groups from upstream IdP
  #       email: email
  #       federated_claims: federated_claims  # Optional: upstream IdP info
  #     role_bindings:
  #       # Map groups (from upstream IdP via Dex) to Gibson roles
  #       security-admins: ["admin"]
  #       security-team: ["mission:execute", "findings:*"]
  #       developers: ["findings:read"]
  #       # GitHub org/team format (if using GitHub connector in Dex)
  #       "your-org:security-team": ["mission:execute"]

  # Example: Okta OIDC Provider (Direct - bypasses Dex)
  # oidc:
  #   - issuer: "https://your-company.okta.com"
  #     audience: "gibson-prod"
  #     jwks_ttl: 1h
  #     claims_mapping:
  #       groups: groups    # Map "groups" claim to Identity.Groups
  #       email: email      # Map "email" claim to Identity.Email
  #     role_bindings:
  #       # Map OIDC groups to Gibson roles
  #       security-admins: ["admin"]
  #       security-team: ["mission:execute", "findings:*"]
  #       developers: ["findings:read"]

  # Example: GitHub Actions OIDC
  # oidc:
  #   - issuer: "https://token.actions.githubusercontent.com"
  #     audience: "https://github.com/your-org"  # Or use sts.amazonaws.com
  #     jwks_ttl: 1h
  #     claims_mapping:
  #       repository: repo       # GitHub repository (e.g., "myorg/myrepo")
  #       ref: branch           # Git ref (e.g., "refs/heads/main")
  #       workflow: workflow    # Workflow name
  #     role_bindings:
  #       # Map repository+branch to Gibson roles (supports wildcards)
  #       "myorg/security-ci:refs/heads/main": ["mission:execute"]
  #       "myorg/security-ci:refs/heads/prod": ["mission:execute", "findings:export"]
  #       "myorg/*:refs/heads/main": ["findings:read"]

  # Example: GitLab CI OIDC
  # oidc:
  #   - issuer: "https://gitlab.com"
  #     audience: "https://gitlab.com"
  #     jwks_ttl: 1h
  #     claims_mapping:
  #       project_path: project   # GitLab project path (e.g., "myorg/myrepo")
  #       ref: branch            # Git ref (e.g., "main")
  #       pipeline_source: source # Pipeline source (push, web, schedule)
  #     role_bindings:
  #       # Map project+branch to Gibson roles
  #       "myorg/security-pipeline:main": ["mission:*"]
  #       "myorg/security-pipeline:staging": ["mission:execute"]

  # Example: Azure AD / Microsoft Entra ID
  # oidc:
  #   - issuer: "https://login.microsoftonline.com/{tenant-id}/v2.0"
  #     audience: "api://{application-id}"
  #     jwks_ttl: 1h
  #     claims_mapping:
  #       groups: groups
  #       preferred_username: email
  #     role_bindings:
  #       "{security-group-id}": ["admin"]
  #       "{developers-group-id}": ["mission:execute", "findings:read"]

  # Example: Auth0
  # oidc:
  #   - issuer: "https://your-tenant.auth0.com/"
  #     audience: "https://gibson.your-company.com"
  #     jwks_ttl: 1h
  #     claims_mapping:
  #       "https://gibson.your-company.com/roles": roles  # Custom claim namespace
  #       email: email
  #     role_bindings:
  #       security-admin: ["admin"]
  #       security-analyst: ["mission:execute", "findings:*"]

  # ──────────────────────────────────────────────────────────────────────────
  # Kubernetes ServiceAccount Token Validation
  # ──────────────────────────────────────────────────────────────────────────
  # Enable validation of Kubernetes ServiceAccount tokens using TokenReview API.
  # Useful for in-cluster CI/CD workloads (Argo Workflows, Tekton, GitLab Runner, etc.)

  # kubernetes:
  #   enabled: true
  #   role_bindings:
  #     # Map namespace:serviceaccount to Gibson roles (supports wildcards)
  #     "ci-cd:security-scanner": ["mission:execute"]
  #     "ci-cd:findings-exporter": ["findings:*"]
  #     "ci-cd:*": ["findings:read"]              # All SAs in ci-cd namespace
  #     "production:admin": ["admin"]             # admin SA in production namespace
  #     "*:gibson-admin": ["admin"]               # gibson-admin SA in any namespace
  #   # kubeconfig_path: "/path/to/kubeconfig"    # Optional: for out-of-cluster testing
  #                                               # Defaults to in-cluster config when running in K8s

  # ──────────────────────────────────────────────────────────────────────────
  # Local Static Token Authentication (DEVELOPMENT ONLY)
  # ──────────────────────────────────────────────────────────────────────────
  # WARNING: This stores tokens in plaintext configuration.
  # NEVER use in production - for local development only.

  # local:
  #   users:
  #     - name: "local-dev"
  #       token: "dev-token-12345"      # Bearer token value (plaintext!)
  #       roles: ["admin"]              # Roles granted to this token
  #     - name: "ci-test"
  #       token: "test-token-67890"
  #       roles: ["mission:execute", "findings:read"]

# Notes:
# - Authentication is performed by gRPC interceptors before request handlers execute
# - Token format: "Bearer <token>" in "authorization" gRPC metadata header
# - Identity is injected into request context and available in all handlers
# - JWKS responses are cached with configurable TTL to reduce IdP load
# - Metrics are exported for auth attempts, latency, and cache performance
# - Audit logs record all authentication events (success, failure, permission denied)
# - Auth is always required; a valid auth mode must be configured

# ============================================================================
# Complete Example: Production Configuration with Dex (Recommended)
# ============================================================================
# Dex federates all identity providers (Okta, Azure AD, GitHub, LDAP, etc.)
# so Gibson only needs to trust a single issuer. This simplifies configuration
# and centralizes identity management.
#
# auth:
#   enabled: true
#   trust_localhost: false
#   clock_skew: 30s
#   oidc:
#     # All authentication via Dex (federated identity broker)
#     - issuer: "https://dex.gibson-system.svc.cluster.local:5556"
#       audience: "gibson"
#       jwks_ttl: 1h
#       claims_mapping:
#         groups: groups
#         email: email
#       role_bindings:
#         # Groups come from upstream IdPs via Dex
#         security-admins: ["admin"]
#         security-team: ["mission:execute", "findings:*"]
#         developers: ["findings:read"]
#         # GitHub org/team (if using Dex GitHub connector)
#         "your-org:security-team": ["mission:execute"]
#
#   # In-cluster workloads (ServiceAccount tokens)
#   kubernetes:
#     enabled: true
#     role_bindings:
#       "ci-cd:security-scanner": ["mission:execute"]
#       "monitoring:findings-exporter": ["findings:*"]

# ============================================================================
# Alternative: Direct IdP Configuration (bypasses Dex)
# ============================================================================
# Use this if you want Gibson to validate tokens directly from each IdP.
# Not recommended - prefer Dex for centralized identity management.
#
# auth:
#   enabled: true
#   trust_localhost: false
#   clock_skew: 30s
#   oidc:
#     # Enterprise SSO via Okta (direct)
#     - issuer: "https://company.okta.com"
#       audience: "gibson-prod"
#       jwks_ttl: 1h
#       claims_mapping:
#         groups: groups
#         email: email
#       role_bindings:
#         security-admins: ["admin"]
#         security-team: ["mission:execute", "findings:*"]
#         developers: ["findings:read"]
#
#     # CI/CD via GitHub Actions (direct)
#     - issuer: "https://token.actions.githubusercontent.com"
#       audience: "https://github.com/your-org"
#       jwks_ttl: 1h
#       claims_mapping:
#         repository: repo
#         ref: branch
#       role_bindings:
#         "your-org/security-ci:refs/heads/main": ["mission:execute", "findings:export"]
#         "your-org/*:refs/heads/main": ["findings:read"]
#
#   # In-cluster workloads
#   kubernetes:
#     enabled: true
#     role_bindings:
#       "ci-cd:security-scanner": ["mission:execute"]
#       "monitoring:findings-exporter": ["findings:*"]

# ============================================================================
# Complete Example: Local Development Configuration
# ============================================================================
# auth:
#   enabled: true
#   trust_localhost: true        # Allow unauthenticated localhost access
#   clock_skew: 30s
#   local:
#     users:
#       - name: "dev"
#         token: "dev-local-12345"
#         roles: ["admin"]

# ============================================================================
# End of Authentication Configuration
# ============================================================================

# LLM provider configuration
llm:
  default_provider: ""             # Default LLM provider (anthropic, openai, ollama)
  # Configure specific providers via environment variables:
  # - ANTHROPIC_API_KEY for Anthropic Claude
  # - OPENAI_API_KEY for OpenAI GPT
  # - OLLAMA_HOST for Ollama (default: http://localhost:11434)

# Logging configuration
logging:
  level: info                      # Log level: debug, info, warn, error, fatal
  format: json                     # Log format: json or text

# Distributed tracing (OpenTelemetry)
tracing:
  enabled: "${OTEL_TRACING_ENABLED:-false}"          # Enable distributed tracing
  endpoint: "${OTEL_EXPORTER_OTLP_ENDPOINT}"         # OTLP collector endpoint

# Metrics export (Prometheus)
metrics:
  enabled: false                   # Enable metrics collection
  port: 9090                       # Prometheus metrics port

# Service registry (etcd-based service discovery)
registry:
  type: embedded                                      # Registry type: embedded or etcd
  data_dir: ~/.gibson/etcd-data                       # Directory for embedded etcd data
  listen_address: "${GIBSON_ETCD_ADDRESS:-0.0.0.0:2379}"  # Listen address for embedded etcd
  namespace: gibson                                   # Service namespace prefix
  ttl: 30s                                            # Service registration TTL
  tls:
    enabled: false                 # Enable TLS for etcd connections
    cert_file: ""                  # Client certificate file
    key_file: ""                   # Client private key file
    ca_file: ""                    # Certificate authority file

# Daemon configuration
daemon:
  grpc_address: "${GIBSON_GRPC_ADDRESS:-0.0.0.0:50002}"   # gRPC API server address

# Health endpoint configuration
health:
  port: ${GIBSON_HEALTH_PORT:-8080}   # HTTP port for /healthz and /readyz endpoints

# Graceful shutdown configuration
shutdown:
  timeout: ${GIBSON_SHUTDOWN_TIMEOUT:-30s}                    # Total shutdown timeout
  drain_timeout: ${GIBSON_SHUTDOWN_DRAIN_TIMEOUT:-10s}        # Request drain timeout
  checkpoint_timeout: ${GIBSON_SHUTDOWN_CHECKPOINT_TIMEOUT:-5s}  # Per-mission checkpoint timeout
  agent_timeout: ${GIBSON_SHUTDOWN_AGENT_TIMEOUT:-15s}        # Agent disconnect timeout

# ============================================================================
# Redis Configuration (State Storage & Tool Execution)
# ============================================================================
# Redis is the primary state storage backend for Gibson, replacing SQLite.
# Supports standalone, cluster, and sentinel deployment modes with comprehensive
# timeout, pooling, and TLS configuration options.
#
# Deployment Modes:
#   - Standalone: Single Redis instance (default, simplest setup)
#   - Cluster: Redis Cluster for horizontal scalability and high availability
#   - Sentinel: Redis Sentinel for automatic failover and monitoring
#
# Configuration Options:
redis:
  # ──────────────────────────────────────────────────────────────────────────
  # Basic Connection Settings (Standalone Mode)
  # ──────────────────────────────────────────────────────────────────────────
  url: "${REDIS_URL:-redis://redis:6379}"    # Redis connection URL (K8s service name)
  password: "${REDIS_PASSWORD}"              # Redis password from environment
  database: 0                      # Redis database number (0-15, cluster mode ignores this)

  # ──────────────────────────────────────────────────────────────────────────
  # Connection Pooling
  # ──────────────────────────────────────────────────────────────────────────
  pool_size: 10                    # Maximum number of connections in the pool
                                   # Default: 10 (recommended: 10 * number of CPUs)

  # ──────────────────────────────────────────────────────────────────────────
  # Timeouts
  # ──────────────────────────────────────────────────────────────────────────
  connect_timeout: 5s              # Timeout for establishing new connections
  read_timeout: 3s                 # Timeout for read operations
  write_timeout: 3s                # Timeout for write operations

  # ──────────────────────────────────────────────────────────────────────────
  # Retry Settings
  # ──────────────────────────────────────────────────────────────────────────
  max_retries: 3                   # Maximum number of retries before giving up

  # ──────────────────────────────────────────────────────────────────────────
  # Cluster Mode Configuration
  # ──────────────────────────────────────────────────────────────────────────
  # Enable this for Redis Cluster deployments (horizontal scalability)
  cluster_mode: false              # Set to true to enable cluster mode
  # cluster_addrs:                 # List of cluster node addresses (required when cluster_mode: true)
  #   - "node1:6379"
  #   - "node2:6379"
  #   - "node3:6379"

  # ──────────────────────────────────────────────────────────────────────────
  # Sentinel Mode Configuration
  # ──────────────────────────────────────────────────────────────────────────
  # Enable this for Redis Sentinel deployments (automatic failover)
  sentinel_master: ""              # Name of the master instance (e.g., "mymaster")
  # sentinel_addrs:                # List of Sentinel addresses (required when sentinel_master is set)
  #   - "sentinel1:26379"
  #   - "sentinel2:26379"
  #   - "sentinel3:26379"

  # ──────────────────────────────────────────────────────────────────────────
  # TLS/SSL Configuration
  # ──────────────────────────────────────────────────────────────────────────
  # Enable this for encrypted Redis connections (recommended for production)
  tls_enabled: false               # Set to true to enable TLS
  # tls_cert_file: ""              # Path to client certificate file
  # tls_key_file: ""               # Path to client private key file
  # tls_ca_file: ""                # Path to certificate authority file

# ──────────────────────────────────────────────────────────────────────────
# Example Configurations
# ──────────────────────────────────────────────────────────────────────────

# Example 1: Standalone Redis with Authentication
# redis:
#   url: redis://localhost:6379
#   password: "${REDIS_PASSWORD}"    # Use environment variable for security
#   database: 0
#   pool_size: 20
#   connect_timeout: 5s
#   read_timeout: 3s
#   write_timeout: 3s
#   max_retries: 3

# Example 2: Redis Cluster
# redis:
#   cluster_mode: true
#   cluster_addrs:
#     - "redis-node1:6379"
#     - "redis-node2:6379"
#     - "redis-node3:6379"
#   password: "${REDIS_PASSWORD}"
#   pool_size: 20
#   connect_timeout: 5s
#   read_timeout: 3s
#   write_timeout: 3s
#   max_retries: 3

# Example 3: Redis Sentinel with TLS
# redis:
#   sentinel_master: "mymaster"
#   sentinel_addrs:
#     - "sentinel1:26379"
#     - "sentinel2:26379"
#     - "sentinel3:26379"
#   password: "${REDIS_PASSWORD}"
#   tls_enabled: true
#   tls_cert_file: "/path/to/client-cert.pem"
#   tls_key_file: "/path/to/client-key.pem"
#   tls_ca_file: "/path/to/ca-cert.pem"
#   pool_size: 20
#   connect_timeout: 5s
#   read_timeout: 3s
#   write_timeout: 3s
#   max_retries: 3

# Example 4: AWS ElastiCache (Cluster Mode Disabled)
# redis:
#   url: "redis://your-elasticache-endpoint.cache.amazonaws.com:6379"
#   password: "${REDIS_PASSWORD}"
#   tls_enabled: true              # ElastiCache supports TLS
#   pool_size: 20
#   connect_timeout: 5s
#   read_timeout: 3s
#   write_timeout: 3s
#   max_retries: 3

# Example 5: AWS ElastiCache (Cluster Mode Enabled)
# redis:
#   cluster_mode: true
#   cluster_addrs:
#     - "your-cluster.cache.amazonaws.com:6379"
#   password: "${REDIS_PASSWORD}"
#   tls_enabled: true
#   pool_size: 20
#   connect_timeout: 5s
#   read_timeout: 3s
#   write_timeout: 3s
#   max_retries: 3

# ============================================================================
# End of Redis Configuration
# ============================================================================

# Embedder configuration (for semantic search and GraphRAG)
embedder:
  provider: native                 # Embedder provider: native, openai
  model: all-minilm-l6-v2         # Model name (native provider)
  # For OpenAI embedder:
  # provider: openai
  # model: text-embedding-3-small
  # api_key: ${OPENAI_API_KEY}

# ============================================================================
# Checkpoint Configuration
# ============================================================================
# Checkpoints enable mission pause/resume, recovery from failures, and thread
# branching for exploring alternative execution paths. They capture complete
# mission state including workflow position, memory, findings, and LLM history.
#
# Configuration Options:
checkpoint:
  # enabled controls whether checkpointing is active
  # When false, missions cannot be paused or resumed
  # Default: true
  enabled: true

  # auto_checkpoint enables automatic checkpoint creation at super-steps
  # Super-steps are major execution milestones (e.g., LLM interactions)
  # When false, only explicit checkpoint requests create checkpoints
  # Default: true
  auto_checkpoint: true

  # key_prefix is the Redis key prefix for checkpoint storage
  # Default: gibson:checkpoint
  key_prefix: "gibson:checkpoint"

  # format specifies the serialization format (msgpack or json)
  # msgpack is more compact and faster, json is human-readable
  # Default: msgpack
  format: "msgpack"

  # compression controls checkpoint compression to reduce storage costs
  compression:
    # enabled determines if compression is active
    # Default: true
    enabled: true

    # threshold is the minimum size (in bytes) before compression is applied
    # Checkpoints smaller than this are stored uncompressed
    # Default: 10485760 (10MB)
    threshold: 10485760

  # encryption controls checkpoint encryption at rest
  encryption:
    # enabled determines if encryption is active
    # Default: false
    enabled: false

    # key_provider specifies where encryption keys are stored
    # Options: kubernetes, vault, aws_kms, azure, gcp
    # Default: kubernetes
    key_provider: "kubernetes"

    # key_secret_name is the name of the Kubernetes secret containing the encryption key
    # Only used when key_provider is kubernetes
    # Default: ""
    key_secret_name: ""

  # retention controls checkpoint retention policies
  retention:
    # default_mode specifies the default retention strategy
    # Options:
    #   - final_only: Keep only the final checkpoint, delete all intermediate ones
    #   - all: Keep all checkpoints (subject to TTL and max count)
    #   - error_only: Keep all checkpoints for failed missions, final only for successful
    #   - none: Delete all checkpoints immediately after mission completion
    #   - labeled: Keep only explicitly labeled checkpoints and the final one
    # Default: final_only
    default_mode: "final_only"

    # default_ttl is the time-to-live for checkpoints
    # After this duration, checkpoints are eligible for deletion
    # 0 means no TTL (keep indefinitely)
    # Default: 168h (7 days)
    default_ttl: 168h

    # max_checkpoints_per_thread limits the maximum number of checkpoints per thread
    # When exceeded, oldest checkpoints are deleted (subject to retention mode)
    # 0 means unlimited
    # Default: 100
    max_checkpoints_per_thread: 100

  # max_checkpoint_size is the maximum allowed size for a checkpoint (in bytes)
  # Checkpoints exceeding this size will fail to save
  # Default: 104857600 (100MB)
  max_checkpoint_size: 104857600

  # large_object_threshold is the size threshold (in bytes) for external blob storage
  # Data larger than this is stored separately from the checkpoint
  # Default: 1048576 (1MB)
  large_object_threshold: 1048576

  # require_checkpoints determines if checkpoint failures should fail the mission
  # When true, checkpoint save errors cause mission failure
  # When false, checkpoint errors are logged but execution continues
  # Default: false
  require_checkpoints: false

  # approval_timeout is the default timeout for human-in-the-loop approval requests
  # After this duration, approval requests expire and return control to the agent
  # Default: 24h
  approval_timeout: 24h

# Notes:
# - Checkpoints are stored in Redis with TTL-based expiration
# - Large objects (logs, binary data) are stored in Redis blob storage
# - Checkpoints are automatically created before approval requests
# - Thread branching creates a new checkpoint at the branch point
# - Retention policies are applied asynchronously, not during checkpoint creation
# - Encryption requires a key provider to be configured in the security section

# ============================================================================
# Example Configurations
# ============================================================================

# Example 1: Development (Keep all checkpoints, no encryption)
# checkpoint:
#   enabled: true
#   auto_checkpoint: true
#   format: "json"  # Human-readable for debugging
#   compression:
#     enabled: false
#   encryption:
#     enabled: false
#   retention:
#     default_mode: "all"
#     default_ttl: 24h
#     max_checkpoints_per_thread: 50

# Example 2: Production (Minimal storage, encryption enabled)
# checkpoint:
#   enabled: true
#   auto_checkpoint: true
#   format: "msgpack"
#   compression:
#     enabled: true
#     threshold: 10485760
#   encryption:
#     enabled: true
#     key_provider: "kubernetes"
#     key_secret_name: "gibson-checkpoint-key"
#   retention:
#     default_mode: "error_only"  # Keep checkpoints only for failed missions
#     default_ttl: 168h           # 7 days
#     max_checkpoints_per_thread: 10
#   require_checkpoints: true     # Fail missions if checkpoint save fails

# Example 3: High-Security (Encryption, labeled retention)
# checkpoint:
#   enabled: true
#   auto_checkpoint: false  # Only explicit checkpoints
#   format: "msgpack"
#   compression:
#     enabled: true
#     threshold: 5242880  # 5MB
#   encryption:
#     enabled: true
#     key_provider: "vault"
#     key_secret_name: ""
#   retention:
#     default_mode: "labeled"  # Keep only labeled milestones
#     default_ttl: 720h        # 30 days
#     max_checkpoints_per_thread: 20
#   approval_timeout: 12h       # Shorter approval window

# ============================================================================
# End of Checkpoint Configuration
# ============================================================================

# GraphRAG configuration (Neo4j knowledge graph)
graphrag:
  enabled: true                    # Enable GraphRAG knowledge graph
  neo4j:
    uri: "${NEO4J_URI:-bolt://neo4j:7687}"       # Neo4j connection URI (K8s service name)
    username: "${NEO4J_USERNAME:-neo4j}"         # Neo4j username from environment
    password: "${NEO4J_PASSWORD}"                # Neo4j password from environment
    max_connections: 10                          # Maximum connection pool size
    connection_timeout: 30s                      # Connection timeout

# ============================================================================
# Langfuse Observability Integration
# ============================================================================
# Langfuse provides mission-aware LLM observability and tracing for Gibson.
# It captures orchestrator decisions, agent executions, tool calls, and LLM
# interactions in a hierarchical trace structure.
#
# Trace Hierarchy:
#   - Trace: mission-{mission_id}
#     ├── Generation: orchestrator-decision-1 (LLM reasoning)
#     │   ├── input: full prompt with graph state
#     │   ├── output: Decision JSON
#     │   └── metadata: {tokens, latency, graph_snapshot}
#     ├── Span: agent-execution-{id}
#     │   ├── Span: tool-call-nmap
#     │   ├── Span: tool-call-httpx
#     │   └── Generation: agent-llm-call (agent's internal LLM usage)
#     ├── Generation: orchestrator-decision-2
#     └── Span: mission-complete
#         └── metadata: {summary, total_tokens, duration}
#
# Use Cases:
#   - Debug orchestrator decision-making process
#   - Monitor LLM token usage and costs per mission
#   - Analyze agent execution patterns and performance
#   - Trace tool execution sequences and dependencies
#   - Correlate findings with decision provenance
#   - Audit mission execution for compliance
#
# Getting Started with Langfuse:
#   1. Sign up at https://cloud.langfuse.com or self-host
#   2. Create a project and get API keys
#   3. Set environment variables (recommended):
#      export LANGFUSE_PUBLIC_KEY="pk-lf-..."
#      export LANGFUSE_SECRET_KEY="sk-lf-..."
#      export LANGFUSE_HOST="https://cloud.langfuse.com"
#   4. Enable Langfuse in this config file
#   5. Run a mission and view traces in Langfuse UI
#
# Configuration Options:
langfuse:
  # enabled controls whether Langfuse tracing is active
  # Default: false
  # When disabled, no traces are sent and there is zero performance overhead
  enabled: "${LANGFUSE_ENABLED:-false}"

  # host is the Langfuse API URL (cloud or self-hosted)
  # Cloud: https://cloud.langfuse.com
  # Self-hosted: https://your-langfuse-instance.com
  # Default: ""
  # Environment variable: LANGFUSE_HOST
  host: "${LANGFUSE_HOST}"

  # public_key is your Langfuse project public key (starts with pk-lf-)
  # Get this from the Langfuse project settings
  # Default: ""
  # Environment variable: LANGFUSE_PUBLIC_KEY
  public_key: "${LANGFUSE_PUBLIC_KEY}"

  # secret_key is your Langfuse project secret key (starts with sk-lf-)
  # Get this from the Langfuse project settings
  # Default: ""
  # Environment variable: LANGFUSE_SECRET_KEY
  # IMPORTANT: Never commit this to version control - use environment variables
  secret_key: "${LANGFUSE_SECRET_KEY}"

  # Optional: Advanced Configuration
  # These settings have sensible defaults and rarely need to be changed

  # flush_interval controls how often events are batched and sent to Langfuse
  # Lower values = more real-time, higher network overhead
  # Higher values = better batching, slight delay in UI updates
  # Default: 10s
  # Uncomment to customize:
  # flush_interval: 10s

  # batch_size controls the maximum number of events sent in a single batch
  # Langfuse API has a maximum batch size limit (typically 100-500 events)
  # Default: 100
  # Uncomment to customize:
  # batch_size: 100

# Notes:
# - Langfuse tracing is fire-and-forget - mission execution never fails due to tracing errors
# - Failed trace exports are logged as warnings but do not block operations
# - Traces are sent immediately (no local buffering) for real-time observability
# - Each mission creates a new trace with unique trace ID: mission-{mission_id}
# - Orchestrator decisions are logged as Langfuse "generations" (LLM calls)
# - Agent executions and tool calls are logged as Langfuse "spans"
# - Agent-level LLM calls (within harness) are also traced as generations
# - GraphRAG knowledge graph node IDs are included in metadata for correlation
# - OpenTelemetry trace IDs (otel_trace_id) are added for cross-system correlation

# Example: Enable Langfuse for Development
# langfuse:
#   enabled: true
#   host: "https://cloud.langfuse.com"
#   public_key: "pk-lf-your-key-here"
#   secret_key: "sk-lf-your-secret-here"

# Example: Enable Langfuse with Environment Variables (Recommended)
# langfuse:
#   enabled: true
#   host: "${LANGFUSE_HOST}"
#   public_key: "${LANGFUSE_PUBLIC_KEY}"
#   secret_key: "${LANGFUSE_SECRET_KEY}"

# Example: Self-Hosted Langfuse
# langfuse:
#   enabled: true
#   host: "https://langfuse.your-company.com"
#   public_key: "${LANGFUSE_PUBLIC_KEY}"
#   secret_key: "${LANGFUSE_SECRET_KEY}"

# ============================================================================
# End of Langfuse Configuration
# ============================================================================

# ============================================================================
# Observability Dashboard Configuration
# ============================================================================
# Configuration for observability dashboard integrations including Neo4j
# Browser links and Langfuse dashboard URLs. These settings enable deep linking
# from Langfuse traces to Neo4j graph visualizations.
#
# Configuration Options:
observability:
  # neo4j_browser_url is the base URL for Neo4j Browser UI
  # Used to generate deep links from Langfuse traces to knowledge graph views
  # Default: http://localhost:7474
  # Environment variable: GIBSON_OBSERVABILITY_NEO4J_BROWSER_URL
  neo4j_browser_url: "${GIBSON_OBSERVABILITY_NEO4J_BROWSER_URL:-http://localhost:7474}"

  # langfuse_dashboard_url is the URL for the Langfuse UI
  # Used for generating links to Langfuse dashboards from Gibson UI/logs
  # Default: http://localhost:3000
  # Environment variable: GIBSON_OBSERVABILITY_LANGFUSE_DASHBOARD_URL
  langfuse_dashboard_url: "${GIBSON_OBSERVABILITY_LANGFUSE_DASHBOARD_URL:-http://localhost:3000}"

# Notes:
# - Neo4j Browser links are automatically generated for graph write spans
# - Links include pre-populated Cypher queries for mission context
# - URLs must be accessible from wherever Langfuse UI is accessed (browser context)
# - For Kubernetes deployments, use ingress URLs or NodePort addresses
# - For cloud deployments, ensure Neo4j Browser is properly secured

# Example: Local Development
# observability:
#   neo4j_browser_url: "http://localhost:7474"
#   langfuse_dashboard_url: "http://localhost:3000"

# Example: Kubernetes with Ingress
# observability:
#   neo4j_browser_url: "https://neo4j.example.com"
#   langfuse_dashboard_url: "https://langfuse.example.com"

# Example: Environment Variables (Recommended)
# observability:
#   neo4j_browser_url: "${GIBSON_OBSERVABILITY_NEO4J_BROWSER_URL}"
#   langfuse_dashboard_url: "${GIBSON_OBSERVABILITY_LANGFUSE_DASHBOARD_URL}"

# ============================================================================
# End of Observability Dashboard Configuration
# ============================================================================

# Agent registration server (optional)
# Allows agents to dynamically announce themselves to Gibson
registration:
  enabled: false                   # Enable registration server
  port: 50100                      # Registration gRPC port
  auth_token: ""                   # Optional authentication token
  heartbeat_timeout: 30s           # Agent heartbeat timeout

# Callback server configuration (for agent-to-Gibson communication)
callback:
  enabled: true                    # Enable callback server
  listen_address: 0.0.0.0:50001    # Listen address for callbacks
  advertise_address: ""            # Public address agents should connect to (optional)

# Plugin-specific configuration
# Each plugin can have its own configuration section
# plugins:
#   example-plugin:
#     api_key: "${EXAMPLE_API_KEY}"
#     endpoint: "https://api.example.com"
